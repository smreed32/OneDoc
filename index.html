function RFQTab({ state, setState, quoteFolderBaseUrl, projectFolderBaseUrl }) {
  const { rfq } = state;
  const updateRfq = (key, val) => setState(p => ({...p, rfq:{...p.rfq, [key]:val}}));

  // State for duplicate-machine copy dialog
  const [dupeCopyDialog, setDupeCopyDialog] = React.useState(null); // { slotIdx, model, sourceSlot }

  function selectMachine(slotIdx, model) {
    if (!model) {
      setState(p => {
        const machines = p.rfq.machines.map((m, i) => i !== slotIdx ? m : { ...m, selectedModel: null, configuration: null });
        return {...p, rfq:{...p.rfq, machines}};
      });
      return;
    }
    // Check if another slot already has the same model with config data
    const existingSlot = state.rfq.machines.find((m, i) => i !== slotIdx && m.selectedModel === model && m.configuration);
    if (existingSlot) {
      // Show the copy dialog
      setDupeCopyDialog({ slotIdx, model, sourceSlot: existingSlot });
    } else {
      applyMachineSelection(slotIdx, model, false, null);
    }
  }

  function applyMachineSelection(slotIdx, model, copyFrom, sourceSlot) {
    setState(p => {
      const machines = p.rfq.machines.map((m, i) => {
        if (i !== slotIdx) return m;
        if (copyFrom && sourceSlot && sourceSlot.configuration) {
          // Deep clone the source configuration
          const clonedConfig = JSON.parse(JSON.stringify(sourceSlot.configuration));
          return { ...m, selectedModel: model, configuration: clonedConfig };
        }
        return { ...m, selectedModel: model, configuration: { templateType: getModelToTemplate(p.machineRegistry)[model], model } };
      });
      return {...p, rfq:{...p.rfq, machines}};
    });
  }

  function removeMachine(slotIdx) {
    setState(p => {
      const removedSlot = p.rfq.machines[slotIdx];
      const removedTabId = removedSlot ? `machine-${removedSlot.slotNumber}` : null;
      const machines = p.rfq.machines.filter((_, i) => i !== slotIdx);
      // Renumber remaining slots
      const renumbered = machines.map((m, i) => ({ ...m, slotNumber: i + 1 }));
      // Ensure at least 1 slot
      const final = renumbered.length === 0 ? [{ slotNumber:1, selectedModel:null, configuration:null }] : renumbered;
      // Fix activeTab: if removed tab was active go to RFQ, otherwise remap to new slot number
      let newActive = p.activeTab;
      if (newActive === removedTabId) {
        newActive = 'rfq';
      } else if (newActive && newActive.startsWith('machine-')) {
        const activeSlotNum = parseInt(newActive.split('-')[1]);
        // Find the machine that was at this slot and get its new number
        const origIdx = p.rfq.machines.findIndex(m => m.slotNumber === activeSlotNum);
        if (origIdx > -1) {
          const newIdx = origIdx > slotIdx ? origIdx - 1 : origIdx;
          if (newIdx < final.length) {
            newActive = `machine-${final[newIdx].slotNumber}`;
          } else {
            newActive = 'rfq';
          }
        }
      }
      return {...p, rfq:{...p.rfq, machines: final}, activeTab: newActive};
    });
  }

  function addMachineSlot() {
    setState(p => {
      const machines = [...p.rfq.machines];
      const nextSlot = machines.length > 0 ? Math.max(...machines.map(m => m.slotNumber)) + 1 : 1;
      machines.push({ slotNumber: nextSlot, selectedModel: null, configuration: null });
      return {...p, rfq:{...p.rfq, machines}};
    });
  }

  function moveMachine(fromIdx, direction) {
    const toIdx = fromIdx + direction;
    setState(p => {
      const machines = [...p.rfq.machines];
      if (toIdx < 0 || toIdx >= machines.length) return p;
      // Swap the two machines
      [machines[fromIdx], machines[toIdx]] = [machines[toIdx], machines[fromIdx]];
      // Renumber slot numbers to match new order
      const renumbered = machines.map((m, i) => ({ ...m, slotNumber: i + 1 }));
      // Fix activeTab if user is viewing one of the swapped machines
      let newActive = p.activeTab;
      if (newActive === `machine-${fromIdx + 1}`) {
        newActive = `machine-${toIdx + 1}`;
      } else if (newActive === `machine-${toIdx + 1}`) {
        newActive = `machine-${fromIdx + 1}`;
      }
      return {...p, rfq:{...p.rfq, machines: renumbered}, activeTab: newActive};
    });
  }

  return (
    <div className="space-y-4">
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <Card title="Quote Information">
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-4">
            <FormField label="Opportunity Number" required>
              <TextInput value={rfq.opportunityNumber} onChange={v => updateRfq('opportunityNumber', v.replace(/[^0-9]/g, ''))} required placeholder="Enter opportunity number" />
              {(quoteFolderBaseUrl || projectFolderBaseUrl) && (
                <div className="flex flex-wrap gap-x-3 gap-y-1 mt-1">
                  {quoteFolderBaseUrl && (
                    <a
                      href={(() => {
                        var base = quoteFolderBaseUrl;
                        var opp = (rfq.opportunityNumber || '').trim();
                        if (!opp) return base;
                        var formsIdx = base.indexOf('/Forms/');
                        if (formsIdx >= 0) {
                          var folderPath = base.substring(base.indexOf('/sites/'), formsIdx);
                          return base + (base.indexOf('?') >= 0 ? '&' : '?') + 'id=' + encodeURIComponent(folderPath + '/' + opp);
                        }
                        return base.replace(/\/?$/, '/') + opp;
                      })()}
                      target="_blank"
                      rel="noopener noreferrer"
                      className="inline-flex items-center gap-1 text-[11px] font-heading font-semibold text-p-orange hover:text-p-orange/80 hover:underline transition-colors"
                    >
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                      Quotes DC
                      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    </a>
                  )}
                  {projectFolderBaseUrl && (
                    <a
                      href={(() => {
                        var base = projectFolderBaseUrl;
                        var opp = (rfq.opportunityNumber || '').trim();
                        if (!opp) return base;
                        // Use SharePoint search scoped to the Projects DC library
                        // Extract the site URL (everything up to and including /sites/XXX)
                        var siteMatch = base.match(/^(https?:\/\/[^\/]+\/sites\/[^\/]+)/);
                        if (siteMatch) {
                          var siteUrl = siteMatch[1];
                          // Extract the library path (e.g., /sites/DC/Project)
                          var formsIdx = base.indexOf('/Forms/');
                          var libPath = formsIdx >= 0 ? base.substring(base.indexOf('/sites/'), formsIdx) : '';
                          return siteUrl + '/_layouts/15/search.aspx?q=' + encodeURIComponent('P-' + opp) + (libPath ? '&scope=' + encodeURIComponent(libPath) : '');
                        }
                        // Fallback: just open the base URL
                        return base;
                      })()}
                      target="_blank"
                      rel="noopener noreferrer"
                      className="inline-flex items-center gap-1 text-[11px] font-heading font-semibold text-p-teal hover:text-p-teal/80 hover:underline transition-colors"
                    >
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                      Projects DC
                      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    </a>
                  )}
                </div>
              )}
            </FormField>
            <FormField label="Company Name" required>
              <TextInput value={rfq.customerName} onChange={v => updateRfq('customerName',v)} required placeholder="Enter company name" />
            </FormField>
            <FormField label="RSM Name">
              <SelectInput value={rfq.rsmName} onChange={v => updateRfq('rsmName',v)} options={['Kevin Dudziak','Ken Jenkins','Miles Kroner','Jake Pruehs','Scott Reed','Jake Vogelsang','Rob Werchas','Brian Whittaker']} />
            </FormField>
            <FormField label="Quote Contact">
              <TextInput value={rfq.quoteContact} onChange={v => updateRfq('quoteContact',v)} />
            </FormField>
            <FormField label="Quote Type">
              <SelectInput value={rfq.quoteType} onChange={v => updateRfq('quoteType',v)} options={['Budget','Firm','Rebid']} />
            </FormField>
            <FormField label="Contact Email">
              <TextInput value={rfq.contactEmail} onChange={v => updateRfq('contactEmail',v)} type="email" />
            </FormField>
            <FormField label="RFQ Revision Number">
              <TextInput value={rfq.rfqRevisionNumber} onChange={v => updateRfq('rfqRevisionNumber',v)} />
            </FormField>
            <FormField label="Contact Phone">
              <TextInput value={rfq.contactPhone} onChange={v => updateRfq('contactPhone',v)} type="tel" />
            </FormField>
            <FormField label="Partner Name">
              <TextInput value={rfq.partnerName} onChange={v => updateRfq('partnerName',v)} />
            </FormField>
            <FormField label="Plant Location (City, State)">
              <TextInput value={rfq.plantLocation} onChange={v => updateRfq('plantLocation',v)} placeholder="City, State" />
            </FormField>
            <FormField label="Partner Adjust %">
              <div className="relative">
                <TextInput value={rfq.partnerAdjustPercent} onChange={v => updateRfq('partnerAdjustPercent', v===''?null:Number(v))} type="number" />
                <span className="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-p-light">%</span>
              </div>
            </FormField>
            <FormField label="Country">
              <TextInput value={rfq.country} onChange={v => updateRfq('country',v)} placeholder="Enter country" />
            </FormField>
          </div>
        </Card>

        <Card title="Document Status">
          <div className="space-y-1">
            <Toggle checked={rfq.specPackage} onChange={v => updateRfq('specPackage',v)} label="Spec Package?" />
            <Toggle checked={rfq.specsFinalized} onChange={v => updateRfq('specsFinalized',v)} label="Specs Finalized?" />
            <Toggle checked={rfq.booked} onChange={v => updateRfq('booked',v)} label="Booked?" />
            <Toggle checked={rfq.customerTandCs} onChange={v => updateRfq('customerTandCs',v)} label="Customer T&Cs?" />
            <Toggle checked={rfq.tandCsSigned} onChange={v => updateRfq('tandCsSigned',v)} label="T&Cs Finalized?" />
          </div>
          <div className="mt-4 p-3 bg-p-alt rounded-btn text-xs border border-gray-100">
            <p className="font-heading font-semibold mb-1.5 text-p-blurple">Status summary</p>
            <p className="flex items-center gap-1.5 mb-1">
              {rfq.specsFinalized
                ? <span className="w-4 h-4 rounded-full bg-p-sage/30 text-p-forest flex items-center justify-center font-bold text-[10px]">✓</span>
                : <span className="w-4 h-4 rounded-full bg-p-red/10 text-p-red flex items-center justify-center font-bold text-[10px]">✗</span>}
              Specifications: {rfq.specsFinalized ? <span className="text-p-forest font-medium">Finalized</span> : <span className="text-p-red">Pending</span>}
            </p>
            <p className="flex items-center gap-1.5 mb-1">
              {rfq.booked
                ? <span className="w-4 h-4 rounded-full bg-p-sage/30 text-p-forest flex items-center justify-center font-bold text-[10px]">✓</span>
                : <span className="w-4 h-4 rounded-full bg-p-red/10 text-p-red flex items-center justify-center font-bold text-[10px]">✗</span>}
              Booking: {rfq.booked ? <span className="text-p-forest font-medium">Booked</span> : <span className="text-p-red">Not booked</span>}
            </p>
            <p className="flex items-center gap-1.5">
              {rfq.tandCsSigned
                ? <span className="w-4 h-4 rounded-full bg-p-sage/30 text-p-forest flex items-center justify-center font-bold text-[10px]">✓</span>
                : <span className="w-4 h-4 rounded-full bg-p-red/10 text-p-red flex items-center justify-center font-bold text-[10px]">✗</span>}
              T&Cs: {rfq.tandCsSigned ? <span className="text-p-forest font-medium">Finalized</span> : <span className="text-p-red">Pending</span>}
            </p>
          </div>
        </Card>
      </div>

      <ExecutiveSummaryCard state={state} setState={setState} />

      <Card title="Requested Equipment">
        <div className="space-y-2">
          {rfq.machines.map((slot, idx) => (
            <div key={idx} className="flex items-center gap-2 py-1">
              {/* Reorder buttons */}
              <div className="flex flex-col gap-0.5 shrink-0">
                <button
                  onClick={() => moveMachine(idx, -1)}
                  disabled={idx === 0}
                  className={`w-5 h-5 flex items-center justify-center rounded text-[10px] transition-colors ${idx === 0 ? 'text-gray-300 cursor-not-allowed' : 'text-p-gray hover:text-p-blurple hover:bg-gray-100'}`}
                  title="Move up"
                >
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
                </button>
                <button
                  onClick={() => moveMachine(idx, 1)}
                  disabled={idx === rfq.machines.length - 1}
                  className={`w-5 h-5 flex items-center justify-center rounded text-[10px] transition-colors ${idx === rfq.machines.length - 1 ? 'text-gray-300 cursor-not-allowed' : 'text-p-gray hover:text-p-blurple hover:bg-gray-100'}`}
                  title="Move down"
                >
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
              </div>
              <span className="text-sm font-heading font-semibold shrink-0 text-p-blurple">#{slot.slotNumber}</span>
              <div className="flex-1">

                  placeholder="-- Select Machine --"
                />

              {slot.selectedModel && (
                <span className="text-xs font-heading text-p-orange bg-orange-50 px-2 py-1 rounded hidden sm:block">{getModelToTemplate(state.machineRegistry)[slot.selectedModel]}</span>
              )}
              <Btn size="sm" variant="danger" onClick={() => removeMachine(idx)} title="Remove machine slot">✕</Btn>
            </div>
          ))}
          <button

            className="flex items-center gap-2 mt-2 px-3 py-2 text-sm font-heading font-semibold text-p-orange hover:text-p-orange-hover bg-orange-50 hover:bg-orange-100 border border-dashed border-p-orange/30 rounded-btn transition-colors w-full justify-center"

      {/* Duplicate Machine Copy Dialog */}

        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{backgroundColor:'rgba(0,0,0,0.5)'}}>

            <div className="flex gap-3">
              <button

      <Card title="Integration Complexity Level">
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
          {INTEGRATION_LEVELS.map(il => (
            <div
              key={il.level}
              onClick={() => setState(p => ({...p, integrationLevel: p.integrationLevel === il.level ? null : il.level}))}
              className={`p-4 rounded-card border-2 cursor-pointer transition-all ${
                state.integrationLevel === il.level

            </div>
          ))}

      </Card>

      <div className="bg-orange-50 border border-p-orange/20 rounded-card p-4 text-sm">
        <span className="font-heading font-semibold text-p-orange">*</span>
        {' '}Firm proposal requires samples. Ship to: <strong>Attn: SSR, Pearson Packaging Systems, 8120 W. Sunset Hwy, Spokane WA 99224</strong>
      </div>
    </div>

function CPPDataGrid({ title, gridId, columns, rows, updateRow, onAddRow, onDeleteRows, measurementUnit, weightUnit, onMeasurementChange, onWeightChange, showMeasurement, showWeight, collapsed, onToggleCollapse }) {
  const [selected, setSelected] = React.useState(new Set());
  const selCount = selected.size;
  const allSelected = rows.length > 0 && selCount === rows.length;
  const someSelected = selCount > 0 && !allSelected;

  function toggleOne(idx) {
    setSelected(prev => {
      const next = new Set(prev);
      next.has(idx) ? next.delete(idx) : next.add(idx);
      return next;
    });
  }
  function toggleAll() {
    setSelected(allSelected ? new Set() : new Set(rows.map((_,i) => i)));
  }
  function deleteSelected() {
    if (selCount === 0) return;
    if (selCount === rows.length) {
      if (!confirm('Delete all rows? At least one empty row will remain.')) return;
    }
    onDeleteRows([...selected]);
    setSelected(new Set());
  }

  React.useEffect(() => { setSelected(new Set()); }, [rows.length]);

  return (
    <div id={gridId} className="bg-white rounded-card border border-gray-200 shadow-sm mb-4">
      {/* Grid section header — always blurple */}
      <div
        className="grid-section-header flex flex-wrap items-center justify-between gap-2 px-3 sm:px-4 py-2.5 rounded-t-card"
        style={{background: selCount > 0 ? '#e04426' : '#343551'}}
        onClick={() => !selCount && onToggleCollapse && onToggleCollapse()}
      >
        {selCount > 0 ? (
          <React.Fragment>
            <div className="flex items-center gap-3">
              <span className="font-heading font-semibold text-sm text-white">{selCount} row{selCount > 1 ? 's' : ''} selected</span>
              <button onClick={e => { e.stopPropagation(); setSelected(new Set()); }} className="text-xs text-white/80 hover:text-white underline underline-offset-2 font-body">Clear</button>
            </div>
            <button onClick={e => { e.stopPropagation(); deleteSelected(); }} className="flex items-center gap-1.5 text-xs text-white bg-white/20 border border-white/30 rounded px-3 py-1 hover:bg-white/30 transition-colors font-heading font-semibold">
              <span>✕</span> Delete Selected
            </button>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <div className="flex items-center gap-2">
              {onToggleCollapse && (
                <span className={`text-white/60 transition-transform duration-200 ${collapsed ? '' : 'rotate-90'}`}>
                  <Icons.chevronRight />
                </span>
              )}
              <h3 className="font-heading font-semibold text-sm text-white tracking-wide">
                {title}
                <span className="text-white/50 font-body font-normal text-xs ml-2">({rows.length} {rows.length === 1 ? 'row' : 'rows'})</span>
              </h3>
            </div>
            <div className="flex flex-wrap items-center gap-2 sm:gap-3" onClick={e => e.stopPropagation()}>
              {showMeasurement && (
                <label className="flex items-center gap-1.5 text-xs text-white/80 font-body">
                  <span>Units:</span>
                  <select value={measurementUnit} onChange={e => onMeasurementChange(e.target.value)} className="bg-white/15 text-white text-xs border border-white/25 rounded px-2 py-1 focus:outline-none focus:border-white/60">
                    <option value="inches" className="text-p-charcoal">inches</option>
                    <option value="mm" className="text-p-charcoal">mm</option>
                    <option value="cm" className="text-p-charcoal">cm</option>
                  </select>
                </label>
              )}
              {showWeight && (
                <label className="flex items-center gap-1.5 text-xs text-white/80 font-body">
                  <span>Weight:</span>
                  <select value={weightUnit} onChange={e => onWeightChange(e.target.value)} className="bg-white/15 text-white text-xs border border-white/25 rounded px-2 py-1 focus:outline-none focus:border-white/60">
                    <option value="lbs" className="text-p-charcoal">lbs</option>
                    <option value="kg" className="text-p-charcoal">kg</option>
                  </select>
                </label>
              )}
              <button onClick={onAddRow} className="flex items-center gap-1 text-xs text-white/90 bg-white/15 border border-white/25 rounded px-3 py-1 hover:bg-white/25 transition-colors font-heading font-semibold">
                + Add Row
              </button>
            </div>
          </React.Fragment>
        )}
      </div>

      {/* Collapsible body */}
      {!collapsed && (
        <div className="grid-scroll">
          <table className="text-[13px] border-collapse w-full" style={{minWidth: columns.reduce((s,c) => s + parseInt(c.w), 0) + 36 + 'px'}}>
            <thead>
              <tr className="bg-p-blurple/90">
                <th className="px-1 py-2.5 text-center border-r border-white/10" style={{width:'36px', minWidth:'36px'}}>
                  <input type="checkbox" checked={allSelected} ref={el => { if (el) el.indeterminate = someSelected; }} onChange={toggleAll} className="w-3.5 h-3.5 rounded border-white/40 accent-p-orange cursor-pointer" title="Select all" />
                </th>
                {columns.map(c => (
                  <th key={c.key} className="text-white font-heading font-semibold px-3 py-2.5 text-center text-xs border-r border-white/10 whitespace-nowrap" style={{minWidth:c.w, width:c.w}}>
                    {c.label}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map((row, ri) => {
                const isSel = selected.has(ri);
                return (
                  <tr key={ri} className={`${isSel ? 'bg-orange-50/60' : (ri%2===0?'bg-white':'bg-p-alt')} hover:bg-orange-50/30 transition-colors`} style={{height:'40px'}}>
                    <td className={`px-1 py-1 text-center border-r border-gray-100 ${isSel ? 'bg-orange-50/80' : 'bg-gray-50'}`} style={{width:'36px', minWidth:'36px'}}>
                      <input type="checkbox" checked={isSel} onChange={() => toggleOne(ri)} className="w-3.5 h-3.5 rounded accent-p-orange cursor-pointer" />
                    </td>
                    {columns.map(col => {
                      if (col.type === 'auto') {
                        return <td key={col.key} className={`px-3 py-2 text-center border-r border-gray-100 text-p-gray/70 ${isSel ? 'bg-orange-50/40' : 'bg-gray-50'} text-[13px]`}>{row[col.key]??''}</td>;
                      }
                      if (col.type === 'autoCalc') {
                        const val = col.display ? col.display(row) : (row[col.key] ?? '');
                        return <td key={col.key} className="px-3 py-2 text-center border-r border-gray-100 text-p-gray/70 bg-amber-50/40 text-[13px] font-medium">{val}</td>;
                      }
                      if (col.type === 'calc') {
                        return (
                          <td key={col.key} className="px-1 py-1 border-r border-gray-100">
                            <input
                              type="number"
                              value={row[col.key]||''}
                              onChange={e => updateRow(ri, col.key, e.target.value)}
                              className={`w-full px-2 py-1.5 text-[13px] border rounded text-center ${row[col.key+'Override']?'border-p-orange bg-orange-50':'border-transparent bg-transparent'} focus:border-p-orange focus:ring-1 focus:ring-p-orange/20 focus:bg-white`}
                              title={row[col.key+'Override'] ? 'Manually overridden (edit to change)' : 'Auto-calculated (edit to override)'}
                            />
                          </td>
                        );
                      }
                      if (col.type === 'select') {
                        return (
                          <td key={col.key} className="px-1 py-1 border-r border-gray-100">
                            <select value={row[col.key]||''} onChange={e => updateRow(ri, col.key, e.target.value||null)} className="w-full px-1.5 py-1.5 text-[13px] border border-transparent rounded bg-transparent focus:border-p-orange focus:ring-1 focus:ring-p-orange/20 focus:bg-white cursor-pointer">
                              <option value="">—</option>
                              {col.options.map(o => <option key={o} value={o}>{o}</option>)}
                            </select>
                          </td>
                        );
                      }
                      if (col.type === 'num') {
                        return (
                          <td key={col.key} className="px-1 py-1 border-r border-gray-100">
                            <input type="number" step="any" value={row[col.key]??''} onChange={e => updateRow(ri, col.key, e.target.value)} className="w-full px-2 py-1.5 text-[13px] border border-transparent rounded bg-transparent text-center focus:border-p-orange focus:ring-1 focus:ring-p-orange/20 focus:bg-white" />
                          </td>
                        );
                      }
                      return (
                        <td key={col.key} className="px-1 py-1 border-r border-gray-100">
                          <input type="text" value={row[col.key]||''} onChange={e => updateRow(ri, col.key, e.target.value)} className="w-full px-2 py-1.5 text-[13px] border border-transparent rounded bg-transparent focus:border-p-orange focus:ring-1 focus:ring-p-orange/20 focus:bg-white" />
                        </td>
                      );
                    })}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function CPPTab({ state, setState }) {
  const { caseProductPallet: cpp } = state;
  const [collapsedGrids, setCollapsedGrids] = React.useState({});

  const TEXT_FIELDS = ['description','caseStyle','caseHand','incomingOrientation','packPattern','forkliftEntry','palletType','incomingCaseOrientation','baseSheet','layerSheet','topCover','caseNotes','productNotes','packingNotes','palletNotes','patternNotes'];

  // Dimension/weight field sets for snapshot invalidation
  const _dimFieldSet = new Set(['length','width','depth','openDepth','kdl','kdw','productLength','productWidth','productHeight','palletLength','palletWidth','palletHeight']);
  const _wtFieldSet = new Set(['caseWeight','productWeight']);

  // Clear snapshots for the current unit when user edits a value
  function invalidateSnapshots(cpp, field) {
    if (_dimFieldSet.has(field)) {
      const curUnit = cpp.measurementUnit || 'inches';
      if (cpp._dimSnapshots && cpp._dimSnapshots[curUnit]) {
        const s = {...cpp._dimSnapshots};
        delete s[curUnit];
        cpp._dimSnapshots = s;
      }
    }
    if (_wtFieldSet.has(field)) {
      const curUnit = cpp.weightUnit || 'lbs';
      if (cpp._wtSnapshots && cpp._wtSnapshots[curUnit]) {
        const s = {...cpp._wtSnapshots};
        delete s[curUnit];
        cpp._wtSnapshots = s;
      }
    }
  }

  // Clear all snapshots (when rows are added/deleted)
  function clearAllSnapshots(cpp) {
    if (cpp._dimSnapshots) cpp._dimSnapshots = {};
    if (cpp._wtSnapshots) cpp._wtSnapshots = {};
  }

  function makeGridUpdater(gridKey) {
    return (rowIdx, field, value) => {
      setState(prev => {
        const cpp = {...prev.caseProductPallet};
        const rows = [...cpp[gridKey]];
        const row = {...rows[rowIdx]};
        if (field === 'kdl' || field === 'kdw') {
          row[field] = value === '' ? 0 : Number(value);
          row[field+'Override'] = true;
        } else {
          row[field] = value === '' ? null : (typeof value === 'string' && !isNaN(value) && value !== '' && !TEXT_FIELDS.includes(field) ? Number(value) : value);
        }
        if (gridKey === 'caseRows') {
          if (!row.kdlOverride) row.kdl = (row.length||0) + (row.width||0);
          if (!row.kdwOverride) row.kdw = (row.width||0) + (row.depth||0);
          if (row.caseStyle === 'RSC' && row.depth != null && row.width != null) {
            row.openDepth = Math.round(((row.depth || 0) + ((row.width || 0) / 2)) * 10000) / 10000;
          } else {
            row.openDepth = null;
          }
        }
        if (gridKey === 'packingRows') {
          row.productsPerCase = (row.patternRows||0) * (row.patternColumns||0) * (row.layersPerCase||0);
        }
        rows[rowIdx] = row;
        cpp[gridKey] = rows;
        invalidateSnapshots(cpp, field);
        return {...prev, caseProductPallet: cpp};
      });
    };
  }

  function makeGridAdder(gridKey, factory) {
    return () => {
      setState(prev => {
        const cpp = {...prev.caseProductPallet};
        cpp[gridKey] = [...cpp[gridKey], factory(cpp[gridKey].length + 1)];
        clearAllSnapshots(cpp);
        return {...prev, caseProductPallet: cpp};
      });
    };
  }

  function makeGridDeleter(gridKey, factory) {
    return (indices) => {
      setState(prev => {
        const cpp = {...prev.caseProductPallet};
        const idxSet = new Set(indices);
        let rows = cpp[gridKey].filter((_,i) => !idxSet.has(i));
        if (rows.length === 0) rows = [factory(1)];
        rows = rows.map((r,i) => ({...r, rowNumber: i+1}));
        cpp[gridKey] = rows;
        clearAllSnapshots(cpp);
        return {...prev, caseProductPallet: cpp};
      });
    };
  }

  const updateCaseRow = makeGridUpdater('caseRows');
  const updateProductRow = makeGridUpdater('productRows');
  const updatePackingRow = makeGridUpdater('packingRows');
  const updatePalletRow = makeGridUpdater('palletRows');
  const updatePatternRow = makeGridUpdater('patternRows');

  const addCaseRow = makeGridAdder('caseRows', createCaseRow);
  const addProductRow = makeGridAdder('productRows', createProductRow);
  const addPackingRow = makeGridAdder('packingRows', createPackingRow);
  const addPalletRow = makeGridAdder('palletRows', createPalletRow);
  const addPatternRow = makeGridAdder('patternRows', createPatternRow);

  const deleteCaseRows = makeGridDeleter('caseRows', createCaseRow);
  const deleteProductRows = makeGridDeleter('productRows', createProductRow);
  const deletePackingRows = makeGridDeleter('packingRows', createPackingRow);
  const deletePalletRows = makeGridDeleter('palletRows', createPalletRow);
  const deletePatternRows = makeGridDeleter('patternRows', createPatternRow);

  const caseDataCols = [
    {key:'rowNumber',label:'No.',w:'40px',type:'auto'},
    {key:'description',label:'Description',w:'150px',type:'text'},
    {key:'caseStyle',label:'Case Style',w:'90px',type:'select',options:['RSC','HSC','Bliss','AFM','OSC','FOL','Tablock','Breaker']},
    {key:'caseHand',label:'Case Hand',w:'85px',type:'select',options:['Left','Right']},
    {key:'length',label:'Length',w:'75px',type:'num'},
    {key:'width',label:'Width',w:'75px',type:'num'},
    {key:'depth',label:'Depth',w:'75px',type:'num'},
    {key:'openDepth',label:'Open Depth',w:'90px',type:'autoCalc', display: r => r.caseStyle === 'RSC' ? (r.openDepth != null ? r.openDepth : '—') : 'NA'},
    {key:'kdl',label:'KDL',w:'75px',type:'calc'},
    {key:'kdw',label:'KDW',w:'75px',type:'calc'},
    {key:'caseRate',label:'Case Rate (CPM)',w:'105px',type:'num'},
    {key:'caseWeight',label:'Case Weight',w:'90px',type:'num'},
    {key:'caseNotes',label:'Notes',w:'160px',type:'text'},
  ];

  const productDataCols = [
    {key:'rowNumber',label:'No.',w:'40px',type:'auto'},
    {key:'description',label:'Description',w:'150px',type:'text'},
    {key:'productWeight',label:'Product Weight',w:'100px',type:'num'},
    {key:'productLength',label:'Product Length',w:'100px',type:'num'},
    {key:'productWidth',label:'Product Width',w:'100px',type:'num'},
    {key:'productHeight',label:'Product Height',w:'100px',type:'num'},
    {key:'incomingOrientation',label:'Incoming Orientation',w:'130px',type:'select',options:['A','B','VA','VB','AOE','BOE','AI','BI']},
    {key:'productNotes',label:'Notes',w:'160px',type:'text'},
  ];

  const packingDataCols = [
    {key:'rowNumber',label:'No.',w:'40px',type:'auto'},
    {key:'description',label:'Description',w:'150px',type:'text'},
    {key:'packPattern',label:'Pack Pattern',w:'120px',type:'text'},
    {key:'patternRows',label:'Pattern Rows',w:'95px',type:'num'},
    {key:'patternColumns',label:'Pattern Columns',w:'110px',type:'num'},
    {key:'layersPerCase',label:'Layers per Case',w:'110px',type:'num'},
    {key:'productsPerCase',label:'Products/Case',w:'100px',type:'autoCalc'},
    {key:'packingNotes',label:'Notes',w:'160px',type:'text'},
  ];

  const palletInfoCols = [
    {key:'rowNumber',label:'No.',w:'40px',type:'auto'},
    {key:'description',label:'Description',w:'150px',type:'text'},
    {key:'palletLength',label:'Pallet Length',w:'100px',type:'num'},
    {key:'palletWidth',label:'Pallet Width',w:'100px',type:'num'},
    {key:'palletHeight',label:'Pallet Height',w:'100px',type:'num'},
    {key:'forkliftEntry',label:'Forklift Entry',w:'100px',type:'select',options:['2-Way','4-Way']},
    {key:'palletType',label:'Pallet Type',w:'100px',type:'select',options:['Block','iGPS','Chep','GMA','PICO','Other']},
    {key:'incomingCaseOrientation',label:'Incoming Case Orient.',w:'140px',type:'select',options:['EW','HW']},
    {key:'palletNotes',label:'Notes',w:'160px',type:'text'},
  ];

  const palletPatternCols = [
    {key:'rowNumber',label:'No.',w:'40px',type:'auto'},
    {key:'description',label:'Description',w:'150px',type:'text'},
    {key:'casesPerLayer',label:'Cases per Layer',w:'110px',type:'num'},
    {key:'numberOfLayers',label:'Number of Layers',w:'115px',type:'num'},
    {key:'baseSheet',label:'Base Sheet',w:'130px',type:'select',options:['N/A','Same as layer sheet','Other']},
    {key:'layerSheet',label:'Layer Sheet',w:'140px',type:'select',options:['N/A','Every layer','Every other layer','Other']},
    {key:'topCover',label:'Top Cover',w:'155px',type:'select',options:['N/A','Same as layer sheet','Formed top cap','Unformed top cap','Other']},
    {key:'patternNotes',label:'Notes',w:'160px',type:'text'},
  ];

  // Unit conversion
  const lengthToBase = {inches:1, mm:1/25.4, cm:1/2.54};
  const lengthFromBase = {inches:1, mm:25.4, cm:2.54};
  const weightToBase = {lbs:1, kg:1/0.453592};
  const weightFromBase = {lbs:1, kg:0.453592};

  const dimensionFields = ['length','width','depth','openDepth','kdl','kdw','productLength','productWidth','productHeight','palletLength','palletWidth','palletHeight'];
  const weightFields = ['caseWeight','productWeight'];
  const gridKeys = ['caseRows','productRows','packingRows','palletRows','patternRows'];

  function convertVal(val, fromFactor, toFactor) {
    if (val == null || val === '' || isNaN(Number(val))) return val;
    const base = Number(val) * fromFactor;
    return Math.round(base * toFactor * 100) / 100;
  }

  function convertGridRows(rows, fields, fromFactor, toFactor) {
    return rows.map(row => {
      const r = {...row};
      fields.forEach(f => { r[f] = convertVal(r[f], fromFactor, toFactor); });
      return r;
    });
  }

  // Snapshot grid fields for a unit so we can restore exactly
  function snapshotGrids(cpp, fields, gKeys) {
    const snap = {};
    gKeys.forEach(gk => {
      if (cpp[gk]) {
        snap[gk] = cpp[gk].map(row => {
          const s = {};
          fields.forEach(f => { if (row[f] != null && row[f] !== '') s[f] = row[f]; });
          return s;
        });
      }
    });
    return snap;
  }

  // Restore grid fields from a snapshot
  function restoreFromSnapshot(cpp, snap, gKeys) {
    gKeys.forEach(gk => {
      if (cpp[gk] && snap[gk]) {
        cpp[gk] = cpp[gk].map((row, ri) => {
          if (!snap[gk][ri]) return row;
          const r = {...row};
          Object.keys(snap[gk][ri]).forEach(f => { r[f] = snap[gk][ri][f]; });
          return r;
        });
      }
    });
  }

  const setMeasurement = newUnit => setState(p => {
    const oldUnit = p.caseProductPallet.measurementUnit || 'inches';
    if (newUnit === oldUnit) return p;
    const cpp = {...p.caseProductPallet, measurementUnit: newUnit};
    // Save snapshot of current values under the old unit
    const snapshots = {...(cpp._dimSnapshots || {})};
    snapshots[oldUnit] = snapshotGrids(cpp, dimensionFields, gridKeys);
    cpp._dimSnapshots = snapshots;
    // If we have a snapshot for the new unit, restore from it
    if (snapshots[newUnit]) {
      restoreFromSnapshot(cpp, snapshots[newUnit], gridKeys);
    } else {
      // Convert via math
      const toB = lengthToBase[oldUnit];
      const fromB = lengthFromBase[newUnit];
      gridKeys.forEach(gk => {
        if (cpp[gk]) cpp[gk] = convertGridRows(cpp[gk], dimensionFields, toB, fromB);
      });
    }
    return {...p, caseProductPallet: cpp};
  });

  const setWeight = newUnit => setState(p => {
    const oldUnit = p.caseProductPallet.weightUnit || 'lbs';
    if (newUnit === oldUnit) return p;
    const wGridKeys = ['caseRows','productRows'];
    const cpp = {...p.caseProductPallet, weightUnit: newUnit};
    const snapshots = {...(cpp._wtSnapshots || {})};
    snapshots[oldUnit] = snapshotGrids(cpp, weightFields, wGridKeys);
    cpp._wtSnapshots = snapshots;
    if (snapshots[newUnit]) {
      restoreFromSnapshot(cpp, snapshots[newUnit], wGridKeys);
    } else {
      const toB = weightToBase[oldUnit];
      const fromB = weightFromBase[newUnit];
      wGridKeys.forEach(gk => {
        if (cpp[gk]) cpp[gk] = convertGridRows(cpp[gk], weightFields, toB, fromB);
      });
    }
    return {...p, caseProductPallet: cpp};
  });

  function toggleGrid(key) {
    setCollapsedGrids(prev => ({...prev, [key]: !prev[key]}));
  }

  function scrollTo(id) {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }

  const anchors = [
    {id:'grid-case', label:'Case'},
    {id:'grid-product', label:'Product'},
    {id:'grid-packing', label:'Packing'},
    {id:'grid-pallet', label:'Pallet'},
    {id:'grid-pattern', label:'Pattern'},
  ];

  return (
    <div>
      {/* Anchor nav strip */}
      <div className="cpp-anchor-nav flex items-center gap-1 mb-4 bg-white rounded-card border border-gray-200 px-3 py-2 no-print">
        <span className="text-xs font-heading font-semibold text-p-blurple/50 mr-2 flex-shrink-0">Jump to:</span>
        {anchors.map((a, i) => (
          <React.Fragment key={a.id}>
            {i > 0 && <span className="text-gray-300 text-xs">|</span>}
            <button
              onClick={() => scrollTo(a.id)}
              className="text-xs font-heading font-semibold text-p-blurple hover:text-p-orange transition-colors px-1.5 py-0.5 rounded hover:bg-p-alt whitespace-nowrap"
            >
              {a.label}
            </button>
          </React.Fragment>
        ))}
      </div>

      {/* Legend */}
      <div className="flex items-center gap-6 text-xs text-p-gray px-1 mb-4">
        <span className="flex items-center gap-1.5"><span className="inline-block w-3 h-3 rounded bg-amber-50 border border-amber-200"></span> Auto-calculated</span>
        <span className="flex items-center gap-1.5"><span className="inline-block w-3 h-3 rounded bg-orange-50 border border-p-orange"></span> Manually overridden</span>
        <span className="flex items-center gap-1.5"><span className="inline-block w-3 h-3 rounded bg-gray-50 border border-gray-200"></span> Read-only</span>
      </div>

      <CPPDataGrid title="Case Data" gridId="grid-case"
        columns={caseDataCols} rows={cpp.caseRows} updateRow={updateCaseRow}
        accentColor="#343551"
        onAddRow={addCaseRow} onDeleteRows={deleteCaseRows}
        collapsed={collapsedGrids.case} onToggleCollapse={() => toggleGrid('case')}
        measurementUnit={cpp.measurementUnit} weightUnit={cpp.weightUnit}
        onMeasurementChange={setMeasurement} onWeightChange={setWeight}
        showMeasurement={true} showWeight={true}
      />

      <CPPDataGrid title="Product Data" gridId="grid-product"
        columns={productDataCols} rows={cpp.productRows} updateRow={updateProductRow}
        accentColor="#343551"
        onAddRow={addProductRow} onDeleteRows={deleteProductRows}
        collapsed={collapsedGrids.product} onToggleCollapse={() => toggleGrid('product')}
        measurementUnit={cpp.measurementUnit} weightUnit={cpp.weightUnit}
        onMeasurementChange={setMeasurement} onWeightChange={setWeight}
        showMeasurement={true} showWeight={true}
      />

      <CPPDataGrid title="Packing Data" gridId="grid-packing"
        columns={packingDataCols} rows={cpp.packingRows} updateRow={updatePackingRow}
        accentColor="#343551"
        onAddRow={addPackingRow} onDeleteRows={deletePackingRows}
        collapsed={collapsedGrids.packing} onToggleCollapse={() => toggleGrid('packing')}
        measurementUnit={cpp.measurementUnit} weightUnit={cpp.weightUnit}
        onMeasurementChange={setMeasurement} onWeightChange={setWeight}
        showMeasurement={false} showWeight={false}
      />

      <CPPDataGrid title="Pallet Data" gridId="grid-pallet"
        columns={palletInfoCols} rows={cpp.palletRows} updateRow={updatePalletRow}
        accentColor="#343551"
        onAddRow={addPalletRow} onDeleteRows={deletePalletRows}
        collapsed={collapsedGrids.pallet} onToggleCollapse={() => toggleGrid('pallet')}
        measurementUnit={cpp.measurementUnit} weightUnit={cpp.weightUnit}
        onMeasurementChange={setMeasurement} onWeightChange={setWeight}
        showMeasurement={true} showWeight={false}
      />

      <CPPDataGrid title="Pallet Pattern Data" gridId="grid-pattern"
        columns={palletPatternCols} rows={cpp.patternRows} updateRow={updatePatternRow}
        accentColor="#343551"
        onAddRow={addPatternRow} onDeleteRows={deletePatternRows}
        collapsed={collapsedGrids.pattern} onToggleCollapse={() => toggleGrid('pattern')}
        measurementUnit={cpp.measurementUnit} weightUnit={cpp.weightUnit}
        onMeasurementChange={setMeasurement} onWeightChange={setWeight}
        showMeasurement={true} showWeight={true}
      />
    </div>
  );
}

function SpecsTab({ state, setState }) {
  const specs = state.specifications || {};
  const specType = specs.specType || '';
  const textareaRef = React.useRef(null);
  const STANDARD_TEXT = 'No customer specifications provided. Standard Pearson build accepted.';
  const CUSTOMER_TEXT = 'Customer specifications required. All customer specification documents and associated specification review are provided in the attachments section.';

  function autoResize() {
    const el = textareaRef.current;
    if (!el) return;
    el.style.height = '0';
    const padH = 20; // py-2 top+bottom
    el.style.height = Math.max(el.scrollHeight, 56) + 'px';
  }

  React.useEffect(() => { autoResize(); }, [specs.content, specType]);

  function handleSpecTypeChange(val) {
    const updates = { specType: val };
    if (val === 'standard') {
      updates.content = STANDARD_TEXT;
    } else if (val === 'customer') {
      const cur = (specs.content || '').trim();
      if (!cur || cur === STANDARD_TEXT) {
        updates.content = CUSTOMER_TEXT;
      }
    }
    setState(p => ({...p, specifications: {...p.specifications, ...updates}}));
  }

  return (
    <Card title="Specifications" accent>
      <div className="mb-4">
        <FormField label="Specification Type">
          <SelectInput
            value={specType}
            onChange={handleSpecTypeChange}
            options={['Standard Build', 'Customer Specifications']}
            optionValues={['standard', 'customer']}
          />
        </FormField>
      </div>
      <textarea
        ref={textareaRef}
        value={specs.content || ''}
        onChange={e => { setState(p=>({...p, specifications:{...p.specifications, content:e.target.value}})); }}
        rows={1}
        placeholder={specType === 'standard' ? '' : 'Paste specifications here...'}
        readOnly={specType === 'standard'}
        className={`w-full px-3 py-2 border border-p-light rounded-btn text-sm ${specType === 'standard' ? 'bg-p-alt/50 text-p-gray cursor-default' : 'font-mono'}`}
        style={{overflow: 'hidden', resize: specType === 'customer' ? 'vertical' : 'none', minHeight: '56px'}}
      />
    </Card>
  );
}

function MachineTab({ state, setState, slotNumber }) {
  const slot = state.rfq.machines.find(m => m.slotNumber === slotNumber);
  if (!slot || !slot.selectedModel) return <div className="text-center py-10 text-p-gray">No machine selected</div>;

  const model = slot.selectedModel;
  const templateType = getModelToTemplate(state.machineRegistry)[model];
  const config = slot.configuration || { templateType, model };
  const limits = getEquipmentLimits(state.machineRegistry)[model] || {};

  // Determine unit label for duplicate models
  const sameModelSlots = state.rfq.machines.filter(m => m.selectedModel === model).sort((a,b) => a.slotNumber - b.slotNumber);
  const unitIndex = sameModelSlots.findIndex(m => m.slotNumber === slotNumber) + 1;
  const isDuplicate = sameModelSlots.length > 1;

  function updateConfig(path, value) {
    setState(prev => {
      const machines = prev.rfq.machines.map(m => {
        if (m.slotNumber !== slotNumber) return m;
        const mc = {...m};
        if (!path.includes('.')) {
          mc.configuration = {...(mc.configuration || {}), [path]: value};
        } else {
          const keys = path.split('.');
          const newConf = {...(mc.configuration || {})};
          let obj = newConf;
          for (let i = 0; i < keys.length - 1; i++) {
            obj[keys[i]] = {...(obj[keys[i]] || {})};
            obj = obj[keys[i]];
          }
          obj[keys[keys.length-1]] = value;
          mc.configuration = newConf;
        }
        return mc;
      });
      return {...prev, rfq:{...prev.rfq, machines}};
    });
  }

  var configContent = null;
  if (['CaseErector','CaseSealer','BlissFormer','CompactPal','BagInserter','BagUncuffer'].includes(templateType)) {
    configContent = <StandardMachineConfig model={model} templateType={templateType} config={config} updateConfig={updateConfig} limits={limits} state={state} />;
  } else if (templateType === 'Pack' || templateType === 'Insert' || templateType === 'RPCMX') {
    configContent = <PackMachineConfig model={model} templateType={templateType} config={config} updateConfig={updateConfig} limits={limits} state={state} />;
  } else if (templateType === 'OEM') {
    configContent = <OEMConfig model={model} config={config} updateConfig={updateConfig} />;
  } else if (templateType === 'Conveyance') {
    configContent = <ConveyanceConfig model={model} config={config} updateConfig={updateConfig} />;
  } else {
    configContent = <div className="text-center py-10">Machine template: {templateType}</div>;
  }

  return (
    <div>
      {isDuplicate && (
        <div className="mb-4 flex items-center gap-2">
          <span className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-btn text-xs font-heading font-semibold text-white bg-p-blurple">
            <Icons.machine />
            {model} — Unit {unitIndex} of {sameModelSlots.length}
          </span>
        </div>
      )}
      {configContent}
    </div>
  );
}

function CaseTableCheckerPanel({ model, limits, state }) {
  const rows = (state.caseProductPallet.caseRows || []).filter(r => r.description || r.length || r.width || r.depth);
  if (rows.length === 0) {
    return (
      <div className="rounded-xl border border-gray-200 shadow-sm overflow-hidden">
        <div className="bg-p-blurple px-4 py-2.5"><h3 className="font-heading font-semibold text-sm text-white tracking-wide">Case Table Checker</h3></div>
        <div className="px-4 py-6 text-sm text-p-gray/60 text-center">No case data entered. Add data in the Case/Product/Pallet tab.</div>
      </div>
    );
  }
  function checkVal(val, min, max) {
    if (val == null || val === '') return 'none';
    const num = Number(val);
    if (isNaN(num)) return 'none';
    if (num === 0 && min == null && max == null) return 'none';
    if (min != null && num < min) return 'fail';
    if (max != null && num > max) return 'fail';
    if (min != null && num <= min * 1.05) return 'warn';
    if (max != null && num >= max * 0.95) return 'warn';
    return 'pass';
  }
  const cellColor = (s) => s==='pass'?'bg-p-sage/30 text-p-forest':s==='fail'?'bg-p-red/15 text-p-red font-bold':s==='warn'?'bg-orange-100 text-p-orange':'';
  const dims = [
    {key:'length',label:'Length',min:limits.lengthMin,max:limits.lengthMax},
    {key:'width',label:'Width',min:limits.widthMin,max:limits.widthMax},
    {key:'depth',label:'Depth',min:limits.depthMin,max:limits.depthMax},
    {key:'openDepth',label:'Open Depth',min:limits.openDepthMin,max:limits.openDepthMax},
    {key:'kdl',label:'KDL',min:limits.kdlMin,max:limits.kdlMax},
    {key:'kdw',label:'KDW',min:limits.kdwMin,max:limits.kdwMax},
    {key:'caseWeight',label:'Case Wt',min:limits.weightMin,max:limits.weightMax},
    {key:'caseRate',label:'Rate',min:limits.rateMin,max:limits.rateMax},
  ];
  return (
    <div className="rounded-xl border border-gray-200 shadow-sm overflow-hidden">
      <div className="bg-p-blurple px-4 py-2.5 flex items-center justify-between flex-wrap gap-2">
        <h3 className="font-heading font-semibold text-sm text-white tracking-wide">
          Case Table Checker
          <span className="text-white/50 font-body font-normal text-xs ml-2">— {model} ({rows.length} {rows.length === 1 ? 'case' : 'cases'})</span>
        </h3>
        <div className="flex items-center gap-3 text-xs">
          <span className="inline-flex items-center gap-1.5 text-white/80"><span className="w-3 h-3 rounded bg-p-sage/60"></span> In Spec</span>
          <span className="inline-flex items-center gap-1.5 text-white/80"><span className="w-3 h-3 rounded bg-orange-300"></span> Near Limit</span>
          <span className="inline-flex items-center gap-1.5 text-white/80"><span className="w-3 h-3 rounded bg-red-400"></span> Out of Spec</span>
        </div>
      </div>
      <div className="grid-scroll">
        <table className="w-full text-[13px] border-collapse" style={{minWidth:'700px'}}>
          <thead>
            <tr className="bg-p-blurple/90">
              <th className="px-3 py-2.5 text-center font-heading font-semibold text-xs text-white border-r border-white/10" style={{width:'46px'}}>#</th>
              <th className="px-3 py-2.5 text-left font-heading font-semibold text-xs text-white border-r border-white/10" style={{minWidth:'140px'}}>Description</th>
              {dims.map(d => (
                <th key={d.key} className="px-3 py-2.5 text-center font-heading font-semibold text-xs text-white border-r border-white/10 whitespace-nowrap">
                  {d.label}
                  {(d.min != null || d.max != null) && (
                    <div className="text-[10px] font-body font-normal text-white/60 mt-0.5">{d.min??'—'} – {d.max??'—'}</div>
                  )}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map((row, i) => (
              <tr key={i} className={`${i%2===0?'bg-white':'bg-p-alt'} hover:bg-orange-50/30 transition-colors`} style={{height:'40px'}}>
                <td className="px-3 py-2 text-center border-r border-gray-100 text-p-gray/70 bg-gray-50 text-[13px]">{row.rowNumber}</td>
                <td className="px-3 py-2 border-r border-gray-100 text-p-gray">{row.description || '—'}</td>
                {dims.map(d => {
                  const val = row[d.key];
                  const s = checkVal(val, d.min, d.max);
                  const titleStr = (d.min!=null||d.max!=null) ? ('Valid: ' + (d.min??'—') + ' – ' + (d.max??'—')) : '';
                  return (
                    <td key={d.key} className={`px-3 py-2 text-center border-r border-gray-100 ${cellColor(s)}`} title={titleStr}>
                      {val ?? '—'}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function RevisionsTab({ state, setState }) {
  const [unlocked, setUnlocked] = React.useState(__adminUnlocked);
  const [pwInput, setPwInput] = React.useState('');
  const [pwError, setPwError] = React.useState(false);
  const [showPw, setShowPw] = React.useState(false);
  const [adding, setAdding] = React.useState(false);
  const [newRev, setNewRev] = React.useState({ revisionNumber:'', revisionDate:'', user:'', description:'' });

  async function handleUnlockRevisions(e) {
    if (e) e.preventDefault();
    const ok = await __checkAdminPw(pwInput);
    if (ok) {
      __adminUnlocked = true;
      setUnlocked(true);
      setPwError(false);
    } else {
      setPwError(true);
    }
  }

  if (!unlocked) {
    return (
      <div className="flex items-center justify-center" style={{minHeight:'60vh'}}>
        <div className="bg-white rounded-card border border-gray-200 shadow-sm p-8 w-full" style={{maxWidth:'380px'}}>
          <div className="flex justify-center mb-4">
            <div className="w-12 h-12 rounded-lg flex items-center justify-center text-white" style={{background:'#343551'}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
            </div>
          </div>
          <h3 className="font-heading font-bold text-base text-p-blurple text-center mb-1">Revision History</h3>
          <p className="text-sm text-p-gray text-center mb-5">Enter the admin password to continue.</p>
          <form onSubmit={handleUnlockRevisions}>
            <div className="relative mb-3">
              <input
                type={showPw ? 'text' : 'password'}
                value={pwInput}
                onChange={e => { setPwInput(e.target.value); setPwError(false); }}
                placeholder="Password"
                autoFocus
                className={`w-full px-3 py-2.5 pr-10 border rounded-btn text-sm ${pwError ? 'border-red-500 bg-red-50' : 'border-p-light bg-white'}`}
              />
              <button type="button" onClick={() => setShowPw(!showPw)} tabIndex={-1}
                className="absolute right-2.5 top-1/2 -translate-y-1/2 text-p-gray/50 hover:text-p-gray transition-colors"
                aria-label={showPw ? 'Hide password' : 'Show password'}>
                {showPw ? (
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                ) : (
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                )}
              </button>
            </div>
            {pwError && <p className="text-xs text-red-600 mb-3 text-center">Incorrect password. Please try again.</p>}
            <button type="submit"
              className="w-full px-4 py-2.5 text-sm font-heading font-semibold rounded-btn text-white transition-colors"
              style={{background:'#e54102'}}
              onMouseOver={e => e.currentTarget.style.background='#c73802'}
              onMouseOut={e => e.currentTarget.style.background='#e54102'}
            >Unlock</button>
          </form>
        </div>
      </div>
    );
  }

  function addRevision() {
    if (!newRev.revisionNumber || !newRev.description) return;
    setState(p => ({...p, revisions:[...p.revisions, {...newRev, revisionDate: newRev.revisionDate || new Date().toISOString().slice(0,10)}]}));
    setNewRev({ revisionNumber:'', revisionDate:'', user:'', description:'' });
    setAdding(false);
  }

  return (
    <Card title="Revision History" accent>
      <table className="w-full text-sm border-collapse mb-4">
        <thead>
          <tr className="bg-p-blurple text-white">
            <th className="px-4 py-2 text-left font-heading font-semibold text-xs w-24">Rev #</th>
            <th className="px-4 py-2 text-left font-heading font-semibold text-xs w-32">Date</th>
            <th className="px-4 py-2 text-left font-heading font-semibold text-xs w-32">User</th>
            <th className="px-4 py-2 text-left font-heading font-semibold text-xs">Description</th>
          </tr>
        </thead>
        <tbody>
          {state.revisions.map((rev, i) => (
            <tr key={i} className={i%2===0?'bg-white':'bg-p-alt'}>
              <td className="px-4 py-2 font-heading font-semibold text-p-orange">{rev.revisionNumber}</td>
              <td className="px-4 py-2">{rev.revisionDate}</td>
              <td className="px-4 py-2">{rev.user}</td>
              <td className="px-4 py-2">{rev.description}</td>
            </tr>
          ))}
        </tbody>
      </table>

      {adding ? (
        <div className="bg-p-alt p-4 rounded-card space-y-3">
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <FormField label="Rev Number"><TextInput value={newRev.revisionNumber} onChange={v => setNewRev(p=>({...p,revisionNumber:v}))} required placeholder="e.g. 1.3.0" /></FormField>
            <FormField label="Date"><TextInput type="date" value={newRev.revisionDate} onChange={v => setNewRev(p=>({...p,revisionDate:v}))} /></FormField>
            <FormField label="User"><TextInput value={newRev.user} onChange={v => setNewRev(p=>({...p,user:v}))} /></FormField>
          </div>
          <FormField label="Description"><textarea value={newRev.description} onChange={e => setNewRev(p=>({...p,description:e.target.value}))} rows={2} className="w-full px-3 py-2 border border-p-light rounded-btn text-sm resize-y" /></FormField>
          <div className="flex gap-2">
            <Btn onClick={addRevision} size="sm">Save Revision</Btn>
            <Btn variant="secondary" size="sm" onClick={() => setAdding(false)}>Cancel</Btn>
          </div>
        </div>
      ) : (
        <Btn onClick={() => setAdding(true)} size="sm">+ Add Revision</Btn>
      )}
    </Card>
  );
}
