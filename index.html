function AdminToast({ message, onDismiss }) {
  const [exiting, setExiting] = React.useState(false);
  React.useEffect(() => {
    if (!message) return;
    const t1 = setTimeout(() => setExiting(true), 3500);
    const t2 = setTimeout(() => { onDismiss(); setExiting(false); }, 3800);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, [message]);
  if (!message) return null;
  const isError = message.type === 'error';
  return (
    <div
      className={`fixed bottom-5 right-5 z-[200] flex items-center gap-2.5 px-4 py-3 rounded-card shadow-xl text-white text-sm font-body font-medium max-w-sm ${isError ? 'bg-red-600' : 'bg-p-forest'} ${exiting ? 'toast-exit' : 'toast-enter'}`}
      style={{minWidth:'240px'}}
    >
      <span className="flex-1">{message.text}</span>
      <button onClick={() => { setExiting(true); setTimeout(onDismiss, 300); }} className="text-white/70 hover:text-white ml-1 flex-shrink-0" style={{fontSize:'16px',lineHeight:1}}>&times;</button>
    </div>
  );
}

// Admin unlock flag — always re-lock when leaving protected areas
let __adminUnlocked = false;
const __ADMIN_HASH = '2390a1819633ceb1ade6d471d8f69e39d82bbaa43489c593c7e5dffab85f4466';
async function __checkAdminPw(pw) {
  const enc = new TextEncoder().encode(pw);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  return hex === __ADMIN_HASH;
}

function MachineAdminTab({ state, setState, quoteFolderBaseUrl, setQuoteFolderBaseUrlState, projectFolderBaseUrl, setProjectFolderBaseUrlState }) {
  const [unlocked, setUnlocked] = React.useState(__adminUnlocked);
  const [pwInput, setPwInput] = React.useState('');
  const [pwError, setPwError] = React.useState(false);
  const [showPw, setShowPw] = React.useState(false);
  const [searchTerm, setSearchTerm] = React.useState('');
  const [editingModel, setEditingModel] = React.useState(null);
  const [editingBuiltIn, setEditingBuiltIn] = React.useState(false);
  const [showForm, setShowForm] = React.useState(false);
  const [toast, setToast] = React.useState(null);
  const [confirmDelete, setConfirmDelete] = React.useState(null);

  // Folder URL local editing state
  const [quoteFolderInput, setQuoteFolderInput] = React.useState(quoteFolderBaseUrl || '');
  const [quoteFolderSaved, setQuoteFolderSaved] = React.useState(false);
  React.useEffect(function() { setQuoteFolderInput(quoteFolderBaseUrl || ''); }, [quoteFolderBaseUrl]);

  const [projectFolderInput, setProjectFolderInput] = React.useState(projectFolderBaseUrl || '');
  const [projectFolderSaved, setProjectFolderSaved] = React.useState(false);
  React.useEffect(function() { setProjectFolderInput(projectFolderBaseUrl || ''); }, [projectFolderBaseUrl]);

  const emptyForm = { model:'', category:'', customCategory:'', templateType:'', limits:{} };
  const [form, setForm] = React.useState(emptyForm);

  const allCategories = React.useMemo(() => {
    const cats = DEFAULT_MACHINE_GROUPS.map(g => g.label);
    const customs = (state.machineRegistry && state.machineRegistry.customMachines) || [];
    customs.forEach(cm => { if (cm.category && !cats.includes(cm.category)) cats.push(cm.category); });
    return cats;
  }, [state.machineRegistry]);

  const allMachines = React.useMemo(() => {
    const customs = (state.machineRegistry && state.machineRegistry.customMachines) || [];
    const customModels = new Set(customs.map(c => c.model));
    const defaultModels = new Set();
    DEFAULT_MACHINE_GROUPS.forEach(group => { group.models.forEach(model => defaultModels.add(model)); });
    const machines = [];
    DEFAULT_MACHINE_GROUPS.forEach(group => {
      group.models.forEach(model => {
        if (!customModels.has(model)) {
          machines.push({
            model, category: group.label,
            templateType: DEFAULT_MODEL_TO_TEMPLATE[model] || '',
            limits: DEFAULT_EQUIPMENT_LIMITS[model] || {},
            source: 'Built-in'
          });
        }
      });
    });
    customs.forEach(cm => {
      machines.push({
        model: cm.model, category: cm.category,
        templateType: cm.templateType,
        limits: cm.limits || {},
        source: defaultModels.has(cm.model) ? 'Modified' : 'Custom'
      });
    });
    return machines;
  }, [state.machineRegistry]);

  const filteredMachines = React.useMemo(() => {
    if (!searchTerm.trim()) return allMachines;
    const term = searchTerm.toLowerCase();
    return allMachines.filter(m =>
      m.model.toLowerCase().includes(term) ||
      m.category.toLowerCase().includes(term) ||
      m.templateType.toLowerCase().includes(term)
    );
  }, [allMachines, searchTerm]);

  // --- Password gate ---
  async function handleUnlock(e) {
    if (e) e.preventDefault();
    const ok = await __checkAdminPw(pwInput);
    if (ok) {
      __adminUnlocked = true;
      setUnlocked(true);
      setPwError(false);
    } else {
      setPwError(true);
    }
  }

  if (!unlocked) {
    return (
      <div className="flex items-center justify-center" style={{minHeight:'60vh'}}>
        <div className="bg-white rounded-card border border-gray-200 shadow-sm p-8 w-full" style={{maxWidth:'380px'}}>
          <div className="flex justify-center mb-4">
            <div className="w-12 h-12 rounded-lg flex items-center justify-center text-white" style={{background:'#343551'}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
            </div>
          </div>
          <h3 className="font-heading font-bold text-base text-p-blurple text-center mb-1">Machine Setup</h3>
          <p className="text-sm text-p-gray text-center mb-5">Enter the admin password to continue.</p>
          <form onSubmit={handleUnlock}>
            <div className="relative mb-3">
              <input
                type={showPw ? 'text' : 'password'}
                value={pwInput}
                onChange={e => { setPwInput(e.target.value); setPwError(false); }}
                placeholder="Password"
                autoFocus
                className={`w-full px-3 py-2.5 pr-10 border rounded-btn text-sm ${pwError ? 'border-red-500 bg-red-50' : 'border-p-light bg-white'}`}
              />
              <button type="button" onClick={() => setShowPw(!showPw)} tabIndex={-1}
                className="absolute right-2.5 top-1/2 -translate-y-1/2 text-p-gray/50 hover:text-p-gray transition-colors"
                aria-label={showPw ? 'Hide password' : 'Show password'}>
                {showPw ? (
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                ) : (
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                )}
              </button>
            </div>
            {pwError && <p className="text-xs text-red-600 mb-3 text-center">Incorrect password. Please try again.</p>}
            <button type="submit"
              className="w-full px-4 py-2.5 text-sm font-heading font-semibold rounded-btn text-white transition-colors"
              style={{background:'#e54102'}}
              onMouseOver={e => e.currentTarget.style.background='#c73802'}
              onMouseOut={e => e.currentTarget.style.background='#e54102'}
            >Unlock</button>
          </form>
        </div>
      </div>
    );
  }

  // --- Admin page (unlocked) ---

  function getTemplateLabel(v) {
    const o = TEMPLATE_TYPE_OPTIONS.find(x => x.value === v);
    return o ? o.label : (v || '—');
  }

  function formatLimit(limits, minK, maxK) {
    const mn = limits[minK], mx = limits[maxK];
    if (mn == null && mx == null) return '—';
    if (mn != null && mx != null) return mn + ' – ' + mx;
    if (mn != null) return '≥ ' + mn;
    return '≤ ' + mx;
  }

  function openAddForm() {
    setForm(emptyForm);
    setEditingModel(null);
    setShowForm(true);
  }

  function openEditForm(m) {
    setForm({ model: m.model, category: m.category, customCategory:'', templateType: m.templateType, limits:{...m.limits} });
    setEditingModel(m.model);
    setEditingBuiltIn(m.source === 'Built-in' || m.source === 'Modified');
    setShowForm(true);
  }

  function cancelForm() {
    setForm(emptyForm);
    setEditingModel(null);
    setEditingBuiltIn(false);
    setShowForm(false);
  }

  function validateForm() {
    if (!form.model.trim()) return 'Model name is required.';
    const cat = form.category === '__new__' ? form.customCategory.trim() : form.category;
    if (!cat) return 'Category is required.';
    if (!form.templateType) return 'Configuration template is required.';
    const existing = allMachines.map(m => m.model.toUpperCase());
    const checkName = form.model.trim().toUpperCase();
    if (editingModel) {
      if (existing.filter(n => n !== editingModel.toUpperCase()).includes(checkName))
        return 'A machine with model name "' + form.model.trim() + '" already exists.';
    } else {
      if (existing.includes(checkName))
        return 'A machine with model name "' + form.model.trim() + '" already exists.';
    }
    for (const pair of LIMITS_PAIRS) {
      const mnV = form.limits[pair.key], mxV = form.limits[pair.pair];
      if (mnV != null && mnV !== '' && mxV != null && mxV !== '') {
        if (Number(mnV) > Number(mxV)) return pair.group + ': Min value cannot exceed Max value.';
      }
    }
    return null;
  }

  function saveMachine() {
    const err = validateForm();
    if (err) { setToast({ type:'error', text: err }); return; }
    const cat = form.category === '__new__' ? form.customCategory.trim() : form.category;
    const cleanLimits = {};
    Object.entries(form.limits).forEach(([k,v]) => { if (v != null && v !== '') cleanLimits[k] = Number(v); });
    const newM = { model: form.model.trim(), category: cat, templateType: form.templateType, limits: cleanLimits };
    setState(prev => {
      const reg = {...(prev.machineRegistry || { customMachines:[] })};
      let customs = [...(reg.customMachines || [])];
      if (editingModel) {
        const existsInCustom = customs.some(cm => cm.model === editingModel);
        if (existsInCustom) {
          customs = customs.map(cm => cm.model === editingModel ? newM : cm);
        } else {
          customs.push(newM);
        }
      } else {
        customs.push(newM);
      }
      return {...prev, machineRegistry: {...reg, customMachines: customs}};
    });
    setToast({ type:'success', text: editingModel ? '"' + newM.model + '" updated successfully.' : '"' + newM.model + '" added successfully.' });
    cancelForm();
  }

  function deleteMachine(model) {
    const wasModified = allMachines.find(m => m.model === model && m.source === 'Modified');
    setState(prev => {
      const reg = {...(prev.machineRegistry || { customMachines:[] })};
      const customs = (reg.customMachines || []).filter(cm => cm.model !== model);
      return {...prev, machineRegistry: {...reg, customMachines: customs}};
    });
    setToast({ type:'success', text: wasModified ? '"' + model + '" reverted to built-in defaults.' : '"' + model + '" deleted.' });
    setConfirmDelete(null);
  }

  function updateLimit(key, value) {
    setForm(prev => ({...prev, limits: {...prev.limits, [key]: value === '' ? '' : value}}));
  }

  return (
    <div className="space-y-4">
      {/* Page header */}
      <Card>
        <div className="flex items-start gap-3">
          <div className="flex-shrink-0 w-10 h-10 rounded-lg flex items-center justify-center text-white" style={{background:'#343551'}}>
            {Icons.settings()}
          </div>
          <div>
            <h2 className="font-heading font-bold text-lg text-p-blurple mb-1">Machine Setup</h2>
            <p className="text-sm font-body text-p-gray leading-relaxed">
              Add new machine models or review existing ones. Each machine needs a model name, category
              assignment, configuration template, and Case Table Checker limits. When you add a machine
              here, it becomes available in the machine dropdowns on the RFQ tab and the Case Table Checker
              will validate case dimensions against the limits you define.
            </p>
          </div>
        </div>
      </Card>

      {/* App Settings */}
      <Card title="App Settings">
        <p className="text-[11px] font-body text-p-gray/50 mb-4">Configure SharePoint document center links. All users will see quick-access links on the RFQ tab below the Opportunity Number field.</p>
        <div className="space-y-5">
          {/* Quotes DC */}
          <div>
            <label className="block text-xs font-heading font-semibold text-p-blurple mb-1">
              <span className="inline-flex items-center gap-1.5"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e54102" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg> Quotes DC Base URL</span>
            </label>
            <p className="text-[10px] font-body text-p-gray/40 mb-1.5">Folders named by Opportunity Number (e.g., 188123)</p>
            <div className="flex gap-2">
              <input
                type="text"
                value={quoteFolderInput}
                onChange={e => { setQuoteFolderInput(e.target.value); setQuoteFolderSaved(false); }}
                placeholder="https://yourcompany.sharepoint.com/sites/quotes/Quotes/Forms/AllItems.aspx"
                className="flex-1 px-3 py-2 border border-gray-200 rounded-btn text-sm font-body text-p-gray focus:border-p-orange focus:ring-1 focus:ring-p-orange/20 transition-colors"
                style={{outline:'none'}}
              />
              <button
                onClick={() => {
                  setQuoteFolderBaseUrl(quoteFolderInput.trim());
                  setQuoteFolderBaseUrlState(quoteFolderInput.trim());
                  setQuoteFolderSaved(true);
                  setToast({ type: 'success', text: 'Quotes DC URL saved.' });
                  setTimeout(() => setQuoteFolderSaved(false), 3000);
                }}
                className={'px-4 py-2 rounded-btn text-sm font-heading font-semibold transition-colors ' + (quoteFolderSaved ? 'bg-p-forest text-white' : 'bg-p-blurple text-white hover:bg-p-blurple/90')}
              >{quoteFolderSaved ? '✓ Saved' : 'Save'}</button>
            </div>
          </div>

          <div className="border-t border-gray-100"></div>

          {/* Projects DC */}
          <div>
            <label className="block text-xs font-heading font-semibold text-p-blurple mb-1">
              <span className="inline-flex items-center gap-1.5"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6790a0" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg> Projects DC Base URL</span>
            </label>
            <p className="text-[10px] font-body text-p-gray/40 mb-1.5">Folders named as "Company Name P-OppNumber" (e.g., Kleen Test P-188123)</p>
            <div className="flex gap-2">
              <input
                type="text"
                value={projectFolderInput}
                onChange={e => { setProjectFolderInput(e.target.value); setProjectFolderSaved(false); }}
                placeholder="https://yourcompany.sharepoint.com/sites/DC/Project/Forms/AllItems.aspx"
                className="flex-1 px-3 py-2 border border-gray-200 rounded-btn text-sm font-body text-p-gray focus:border-p-orange focus:ring-1 focus:ring-p-orange/20 transition-colors"
                style={{outline:'none'}}
              />
              <button
                onClick={() => {
                  setProjectFolderBaseUrl(projectFolderInput.trim());
                  setProjectFolderBaseUrlState(projectFolderInput.trim());
                  setProjectFolderSaved(true);
                  setToast({ type: 'success', text: 'Projects DC URL saved.' });
                  setTimeout(() => setProjectFolderSaved(false), 3000);
                }}
                className={'px-4 py-2 rounded-btn text-sm font-heading font-semibold transition-colors ' + (projectFolderSaved ? 'bg-p-forest text-white' : 'bg-p-blurple text-white hover:bg-p-blurple/90')}
              >{projectFolderSaved ? '✓ Saved' : 'Save'}</button>
            </div>
          </div>
        </div>
      </Card>

      {/* Existing Machines Table */}
      <Card title="All Machine Models">
        <div className="flex flex-col sm:flex-row gap-3 mb-4">
          <div className="flex-1 relative">
            <input
              type="text" value={searchTerm}
              onChange={e => setSearchTerm(e.target.value)}
              placeholder="Search by model, category, or template..."
              className="w-full px-3 py-2 pl-9 border border-p-light rounded-btn text-sm bg-white"
            />
            <svg className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
          </div>
          <Btn onClick={openAddForm} size="sm">+ Add Machine</Btn>
        </div>

        <div className="overflow-x-auto -mx-4 px-4">
          <table className="w-full text-sm border-collapse" style={{minWidth:'880px'}}>
            <thead>
              <tr className="bg-p-blurple text-white">
                <th className="px-3 py-2.5 text-left font-heading font-semibold text-xs">Model</th>
                <th className="px-3 py-2.5 text-left font-heading font-semibold text-xs">Category</th>
                <th className="px-3 py-2.5 text-left font-heading font-semibold text-xs">Template</th>
                <th className="px-3 py-2.5 text-center font-heading font-semibold text-xs">Length</th>
                <th className="px-3 py-2.5 text-center font-heading font-semibold text-xs">Width</th>
                <th className="px-3 py-2.5 text-center font-heading font-semibold text-xs">Depth</th>
                <th className="px-3 py-2.5 text-center font-heading font-semibold text-xs">Rate</th>
                <th className="px-3 py-2.5 text-center font-heading font-semibold text-xs">Source</th>
                <th className="px-3 py-2.5 text-center font-heading font-semibold text-xs w-28">Actions</th>
              </tr>
            </thead>
            <tbody>
              {filteredMachines.length === 0 ? (
                <tr><td colSpan={9} className="px-3 py-8 text-center text-p-gray text-sm">
                  {searchTerm ? 'No machines match your search.' : 'No machines configured.'}
                </td></tr>
              ) : (
                filteredMachines.map((m, i) => (
                  <tr key={m.model} className={i % 2 === 0 ? 'bg-white' : 'bg-p-alt'}>
                    <td className="px-3 py-2 font-heading font-semibold text-p-blurple">{m.model}</td>
                    <td className="px-3 py-2 font-body">{m.category}</td>
                    <td className="px-3 py-2 font-body">{getTemplateLabel(m.templateType)}</td>
                    <td className="px-3 py-2 text-center font-mono text-xs">{formatLimit(m.limits,'lengthMin','lengthMax')}</td>
                    <td className="px-3 py-2 text-center font-mono text-xs">{formatLimit(m.limits,'widthMin','widthMax')}</td>
                    <td className="px-3 py-2 text-center font-mono text-xs">{formatLimit(m.limits,'depthMin','depthMax')}</td>
                    <td className="px-3 py-2 text-center font-mono text-xs">{formatLimit(m.limits,'rateMin','rateMax')}</td>
                    <td className="px-3 py-2 text-center">
                      <span className={'inline-block px-2 py-0.5 rounded-full text-xs font-medium ' + (
                        m.source === 'Custom'
                          ? 'bg-orange-50 text-p-orange border border-orange-200'
                          : m.source === 'Modified'
                            ? 'bg-blue-50 text-blue-700 border border-blue-200'
                            : 'bg-gray-50 text-p-gray border border-gray-200'
                      )}>{m.source}</span>
                    </td>
                    <td className="px-3 py-2 text-center">
                      <div className="flex items-center justify-center gap-1">
                        <button onClick={() => openEditForm(m)}
                          className="px-2 py-1 text-xs rounded border border-p-blurple/20 text-p-blurple hover:bg-p-blurple hover:text-white transition-colors"
                        >Edit</button>
                        {m.source === 'Custom' && (
                          <button onClick={() => setConfirmDelete(m.model)}
                            className="px-2 py-1 text-xs rounded border border-red-200 text-red-600 hover:bg-red-600 hover:text-white transition-colors"
                          >Delete</button>
                        )}
                        {m.source === 'Modified' && (
                          <button onClick={() => setConfirmDelete(m.model)}
                            className="px-2 py-1 text-xs rounded border border-amber-200 text-amber-600 hover:bg-amber-600 hover:text-white transition-colors"
                            title="Revert to built-in defaults"
                          >Revert</button>
                        )}
                      </div>
                    </td>
                  </tr>
                ))
              )}
            </tbody>
          </table>
        </div>
        <div className="mt-3 text-xs text-p-gray">
          Showing {filteredMachines.length} of {allMachines.length} machines
          {(state.machineRegistry?.customMachines?.length || 0) > 0 && (
            <span> &middot; {state.machineRegistry.customMachines.length} custom</span>
          )}
        </div>
      </Card>

      {/* Delete / Revert Confirmation */}
      {confirmDelete && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/40" onClick={() => setConfirmDelete(null)}>
          <div className="bg-white rounded-card shadow-xl p-6 max-w-sm w-full mx-4" onClick={e => e.stopPropagation()}>
            <h3 className="font-heading font-bold text-base text-p-blurple mb-2">
              {allMachines.find(m => m.model === confirmDelete && m.source === 'Modified') ? 'Revert Machine' : 'Delete Machine'}
            </h3>
            <p className="text-sm text-p-gray mb-4">
              {allMachines.find(m => m.model === confirmDelete && m.source === 'Modified')
                ? <span>Are you sure you want to revert <strong>{confirmDelete}</strong> to its built-in defaults? Your custom changes will be removed.</span>

function Toast({ message, onDismiss }) {
  const [exiting, setExiting] = React.useState(false);

  React.useEffect(() => {
    if (!message) return;
    const exitTimer = setTimeout(() => setExiting(true), 2700);
    const dismissTimer = setTimeout(() => { onDismiss(); setExiting(false); }, 3000);
    return () => { clearTimeout(exitTimer); clearTimeout(dismissTimer); };
  }, [message]);

  if (!message) return null;
  const isError = message && message.type === 'error';
  const text = (message && typeof message === 'object') ? message.text : message;

  return (
    <div
      className={`fixed bottom-5 right-5 z-[200] flex items-center gap-2.5 px-4 py-3 rounded-card shadow-xl text-white text-sm font-body font-medium max-w-xs ${isError ? 'bg-p-red' : 'bg-p-forest'} ${exiting ? 'toast-exit' : 'toast-enter'}`}
      style={{minWidth:'220px'}}
    >
      <span className="flex-1">{text}</span>
      <button onClick={() => { setExiting(true); setTimeout(onDismiss, 300); }} className="text-white/70 hover:text-white ml-1 flex-shrink-0" style={{fontSize:'16px',lineHeight:1}}>&times;</button>
    </div>
  );
}

// ============================================================================
// ONEDOC COMPLETION CALCULATOR & PROGRESS RING
// ============================================================================

function calculateCompletion(fd) {
  if (!fd) return 0;
  var rfq = fd.rfq || {};
  var cpp = fd.caseProductPallet || {};
  var facility = fd.facilityInfo || {};
  var booking = fd.booking || {};
  var specs = fd.specifications || {};
  var tandc = fd.termsAndConditions || {};
  var machines = (rfq.machines || []).filter(function(m) { return m.selectedModel; });

  // Helper: count how many of these values are truthy, return ratio 0-1
  function ratio(checks) {
    if (checks.length === 0) return 0;
    return checks.filter(Boolean).length / checks.length;
  }

  // ---------------------------------------------------------------
  // TIER 1: Critical project identifiers  (50% of total weight)
  // ---------------------------------------------------------------
  var tier1 = [
    !!rfq.customerName,               // Company Name
    !!rfq.opportunityNumber,           // Opportunity Number
    !!rfq.rsmName,                     // RSM
    !!rfq.quoteType,                   // Quote Type
    machines.length > 0                // At least 1 machine selected
  ];
  var tier1Score = ratio(tier1);

  // ---------------------------------------------------------------
  // TIER 2: Configuration & data  (35% of total weight)
  // This tier is subdivided: machine configs get half, other data the other half.
  // ---------------------------------------------------------------

  // -- 2A: Per-machine configuration completeness (avg across all machines) --
  function scoreMachineConfig(m) {
    if (!m.configuration || typeof m.configuration !== 'object') return 0;
    var c = m.configuration;
    var mc = c.machineConstruction || {};
    var fields = [];
    // Universal fields applicable to all standard/pack templates
    fields.push(!!mc.constructionLevel || !!c.constructionLevel);  // Construction level
    fields.push(!!mc.voltageOption || !!c.voltageRequirement);     // Voltage
    fields.push(!!mc.operatorStation);                              // Operator station
    fields.push(!!mc.electricalEnclosureNEMARating);               // NEMA rating
    // Template-specific core fields
    var tt = c.templateType || '';
    if (tt === 'CaseErector') {
      fields.push(!!mc.caseType);                // Case Type (RSC/HSC)
      fields.push(!!mc.caseHand);                // Case Hand
      fields.push(!!mc.magazineOrientation);     // Magazine Orientation
    } else if (tt === 'CaseSealer') {
      fields.push(!!(c.machineSpeed && c.machineSpeed.casesPerMinute)); // Speed
    } else if (tt === 'CompactPal') {
      fields.push(!!(c.robotInformation && c.robotInformation.numberOfEndOfArmTools));
      fields.push(!!(c.infeedInformation && c.infeedInformation.caseOrientation));
    } else if (tt === 'BlissFormer') {
      fields.push(!!(c.caseStyle && c.caseStyle.caseCornerStyle));
    } else if (tt === 'Pack' || tt === 'Insert' || tt === 'RPCMX') {
      fields.push(!!c.constructionLevel);
      fields.push(!!(c.infeedData && (c.infeedData.productType || c.infeedData.productCondition)));
    } else if (tt === 'BagInserter') {
      fields.push(!!(c.caseFlow && c.caseFlow.caseFlowDirection));
    } else if (tt === 'BagUncuffer') {
      fields.push(!!(c.caseWeightRange && c.caseWeightRange.weightOption));
    } else if (tt === 'OEM') {
      var oemItems = (c.items || []).filter(function(it) { return it.type || it.description; });
      fields.push(oemItems.length > 0);
    } else if (tt === 'Conveyance') {
      var convItems = (c.items || []).filter(function(it) { return it.type || it.description; });
      fields.push(convItems.length > 0);
    }
    return ratio(fields);
  }

  var machineConfigScore = 0;
  if (machines.length > 0) {
    var totalMachScore = 0;
    machines.forEach(function(m) { totalMachScore += scoreMachineConfig(m); });
    machineConfigScore = totalMachScore / machines.length;
  }

  // -- 2B: Other important data fields --
  var tier2Other = [];
  // Case data: at least one case row with description or style
  var caseRows = (cpp.caseRows || []).filter(function(r) { return r.description || r.caseStyle || r.length; });
  tier2Other.push(caseRows.length > 0);
  // Product data: at least one product row with data
  var productRows = (cpp.productRows || []).filter(function(r) { return r.description || r.productWeight; });
  tier2Other.push(productRows.length > 0);
  // Pallet data
  var palletRows = (cpp.palletRows || []).filter(function(r) { return r.description || r.palletType || r.palletLength; });
  tier2Other.push(palletRows.length > 0);
  // Facility info: any field filled
  var hasFacility = facility.ambientTempMax || facility.ambientTempMin || facility.heightLimit ||
    facility.environment || facility.cleaningProcedure || facility.obstructions;
  tier2Other.push(!!hasFacility);
  // Booking: dollar amount or lead time
  tier2Other.push(!!booking.dollarAmount || !!booking.quotedLeadTime);
  // Contact info
  tier2Other.push(!!rfq.quoteContact || !!rfq.contactEmail);
  var tier2OtherScore = ratio(tier2Other);

  // Tier 2 combined: machine configs = 50% of tier 2, other data = 50%
  var tier2Score = (machineConfigScore * 0.50) + (tier2OtherScore * 0.50);

  // ---------------------------------------------------------------
  // TIER 3: Finishing touches  (15% of total weight)
  // ---------------------------------------------------------------
  var tier3 = [];
  // Specifications
  tier3.push(!!specs.specType || !!(specs.content && specs.content.trim()));
  // Terms & Conditions
  tier3.push(!!(tandc.content && tandc.content.trim()));
  // Executive Summary
  tier3.push(!!(fd.executiveSummary && fd.executiveSummary.trim()));
  // Shipping/Install address
  tier3.push(!!booking.shipAddress || !!booking.shipCity);
  // Payment terms
  tier3.push(!!booking.paymentTerms);
  // Estimator/SSR assigned
  tier3.push(!!booking.estimator1 || !!booking.ssr);
  // Pallet patterns
  var patternRows = (cpp.patternRows || []).filter(function(r) { return r.description || r.casesPerLayer; });
  tier3.push(patternRows.length > 0);
  // Packing config
  var packingRows = (cpp.packingRows || []).filter(function(r) { return r.description || r.packPattern; });
  tier3.push(packingRows.length > 0);
  var tier3Score = ratio(tier3);

  // Weighted total
  var total = (tier1Score * 0.50) + (tier2Score * 0.35) + (tier3Score * 0.15);
  return Math.round(total * 100);
}

// Returns an object with per-category completion scores (0-100) for the heatmap
function calculateCompletionByCategory(fd) {
  if (!fd) return null;
  var rfq = fd.rfq || {};
  var cpp = fd.caseProductPallet || {};
  var facility = fd.facilityInfo || {};
  var booking = fd.booking || {};
  var specs = fd.specifications || {};
  var tandc = fd.termsAndConditions || {};
  var machines = (rfq.machines || []).filter(function(m) { return m.selectedModel; });
  function ratio(checks) {
    if (checks.length === 0) return 0;
    return Math.round((checks.filter(Boolean).length / checks.length) * 100);
  }
  // Project Identity
  var identity = ratio([
    !!rfq.customerName, !!rfq.opportunityNumber, !!rfq.rsmName, !!rfq.quoteType,
    !!rfq.quoteContact || !!rfq.contactEmail
  ]);
  // Machine Config
  var machConfig = 0;
  if (machines.length > 0) {
    var total = 0;
    machines.forEach(function(m) {
      if (!m.configuration || typeof m.configuration !== 'object') return;
      var c = m.configuration; var mc = c.machineConstruction || {};
      var f = [!!mc.constructionLevel || !!c.constructionLevel, !!mc.voltageOption || !!c.voltageRequirement, !!mc.operatorStation, !!mc.electricalEnclosureNEMARating];
      var tt = c.templateType || '';
      if (tt === 'CaseErector') { f.push(!!mc.caseType, !!mc.caseHand, !!mc.magazineOrientation); }
      else if (tt === 'CaseSealer') { f.push(!!(c.machineSpeed && c.machineSpeed.casesPerMinute)); }
      else if (tt === 'CompactPal') { f.push(!!(c.robotInformation && c.robotInformation.numberOfEndOfArmTools), !!(c.infeedInformation && c.infeedInformation.caseOrientation)); }
      else if (tt === 'BlissFormer') { f.push(!!(c.caseStyle && c.caseStyle.caseCornerStyle)); }
      else if (tt === 'Pack' || tt === 'Insert' || tt === 'RPCMX') { f.push(!!c.constructionLevel, !!(c.infeedData && (c.infeedData.productType || c.infeedData.productCondition))); }
      else if (tt === 'BagInserter') { f.push(!!(c.caseFlow && c.caseFlow.caseFlowDirection)); }
      else if (tt === 'BagUncuffer') { f.push(!!(c.caseWeightRange && c.caseWeightRange.weightOption)); }
      else if (tt === 'OEM') { f.push((c.items || []).some(function(it) { return it.type || it.description; })); }
      else if (tt === 'Conveyance') { f.push((c.items || []).some(function(it) { return it.type || it.description; })); }
      total += (f.filter(Boolean).length / f.length);
    });
    machConfig = Math.round((total / machines.length) * 100);
  }
  // Case / Product / Pallet
  var cppScore = ratio([
    (cpp.caseRows || []).some(function(r) { return r.description || r.caseStyle || r.length; }),
    (cpp.productRows || []).some(function(r) { return r.description || r.productWeight; }),
    (cpp.palletRows || []).some(function(r) { return r.description || r.palletType || r.palletLength; }),
    (cpp.patternRows || []).some(function(r) { return r.description || r.casesPerLayer; }),
    (cpp.packingRows || []).some(function(r) { return r.description || r.packPattern; })
  ]);
  // Facility
  var facilityScore = ratio([
    !!facility.ambientTempMax || !!facility.ambientTempMin,
    !!facility.heightLimit, !!facility.environment,
    !!facility.cleaningProcedure, !!facility.obstructions
  ]);
  // Booking / Commercial
  var bookingScore = ratio([
    !!booking.dollarAmount, !!booking.quotedLeadTime,
    !!booking.paymentTerms, !!booking.estimator1 || !!booking.ssr,
    !!booking.shipAddress || !!booking.shipCity
  ]);
  // Finalization
  var finalization = ratio([
    !!specs.specType || !!(specs.content && specs.content.trim()),
    !!(tandc.content && tandc.content.trim()),
    !!(fd.executiveSummary && fd.executiveSummary.trim())
  ]);
  return {
    identity: identity,
    machConfig: machConfig,
    cppData: cppScore,
    facility: facilityScore,
    booking: bookingScore,
    finalization: finalization
  };
}

function getCompletionColor(pct) {
  if (pct >= 75) return '#42725e'; // Forest green
  if (pct >= 40) return '#d4a017'; // Amber/yellow
  return '#e04426';                 // Red-orange
}

function CompletionRing({ percent, size, strokeWidth }) {
  size = size || 36;
  strokeWidth = strokeWidth || 3;
  var radius = (size - strokeWidth) / 2;
  var circumference = 2 * Math.PI * radius;
  var dashOffset = circumference - (percent / 100) * circumference;
  var color = getCompletionColor(percent);

  return React.createElement('div', {
    style: { position: 'relative', width: size + 'px', height: size + 'px', flexShrink: 0 },
    title: percent + '% complete'
  },
    React.createElement('svg', {
      width: size, height: size, viewBox: '0 0 ' + size + ' ' + size,
      style: { transform: 'rotate(-90deg)' }
    },
      // Background track
      React.createElement('circle', {
        cx: size / 2, cy: size / 2, r: radius,
        fill: 'none', stroke: '#e5e7eb', strokeWidth: strokeWidth
      }),
      // Progress arc
      React.createElement('circle', {
        cx: size / 2, cy: size / 2, r: radius,
        fill: 'none', stroke: color, strokeWidth: strokeWidth,
        strokeDasharray: circumference, strokeDashoffset: dashOffset,
        strokeLinecap: 'round',
        style: { transition: 'stroke-dashoffset 0.5s ease, stroke 0.3s ease' }
      })
    ),
    // Percentage text
    React.createElement('div', {
      style: {
        position: 'absolute', inset: 0,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontFamily: 'Montserrat, sans-serif', fontWeight: 700,
        fontSize: (size <= 32 ? '8px' : size <= 40 ? '9px' : '11px'),
        color: color, lineHeight: 1
      }
    }, percent + '%')
  );
}

function DashboardView({ projects, loadingProjects, onLoadProject, onNewProject, lastProjectId, refreshKey, userProfile, onToast, currentProjectId, setCurrentProjectId, setCurrentProjectName, setCurrentProjectOwnerId, setLastSavedSnapshot, onRefreshProjects, searchQuery, setSearchQuery }) {
  // Compute stats from project list metadata
  const [projectDetails, setProjectDetails] = React.useState({});
  const [loadingDetails, setLoadingDetails] = React.useState(false);
  const [sortBy, setSortBy] = React.useState('newest');

  React.useEffect(() => {
    if (!projects || projects.length === 0) {
      setProjectDetails({});
      return;
    }
    setLoadingDetails(true);
    // Fetch full project data for each to get machine counts and quote types
    Promise.all(
      projects.map(function(p) {
        return SupabaseDB.getProject(p.id).then(function(full) {
          return { id: full.id, formData: full.formData };
        }).catch(function() { return { id: p.id, formData: null }; });
      })
    ).then(function(results) {
      var details = {};
      results.forEach(function(r) { if (r.formData) details[r.id] = r.formData; });
      setProjectDetails(details);
    }).finally(function() { setLoadingDetails(false); });
  }, [projects, refreshKey]);

  // Compute summary stats — split My vs All
  var now = new Date();
  var sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
  var thirtyDaysAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
  var myId = userProfile ? userProfile.id : null;

  var stats = { all: { total: 0, recent: 0, machines: 0, booked: 0, pendingSpecs: 0, pendingTCs: 0 }, my: { total: 0, recent: 0, machines: 0, booked: 0, pendingSpecs: 0, pendingTCs: 0 } };

  // Pending counts tracked in stats (no lists needed — indicators shown inline in table)

  // Category score accumulators: { sum, count } for my and all
  var catKeys = ['identity','machConfig','cppData','facility','booking','finalization'];
  var catAccum = { my: {}, all: {} };
  catKeys.forEach(function(k) { catAccum.my[k] = { sum:0, count:0 }; catAccum.all[k] = { sum:0, count:0 }; });

  // Needs Attention: low completion or stale
  var needsAttention = [];

  projects.forEach(function(p) {
    var isMine = myId && p.ownerId === myId;
    var isRecent = new Date(p.updatedAt) > sevenDaysAgo;
    var isStale = new Date(p.updatedAt) < thirtyDaysAgo;
    stats.all.total++;
    if (isRecent) stats.all.recent++;
    if (isMine) { stats.my.total++; if (isRecent) stats.my.recent++; }

    var fd = projectDetails[p.id];
    if (fd) {
      var machines = (fd.rfq && fd.rfq.machines) || [];
      var mc = machines.filter(function(m) { return m.selectedModel; }).length;
      stats.all.machines += mc;
      if (isMine) stats.my.machines += mc;

      if (fd.rfq && fd.rfq.booked && fd.booking && fd.booking.dollarAmount) {
        var bv = Number(fd.booking.dollarAmount) || 0;
        stats.all.booked += bv;
        if (isMine) stats.my.booked += bv;
      }

      // Per-category scores
      var cats = calculateCompletionByCategory(fd);
      if (cats) {
        catKeys.forEach(function(k) {
          catAccum.all[k].sum += cats[k]; catAccum.all[k].count++;
          if (isMine) { catAccum.my[k].sum += cats[k]; catAccum.my[k].count++; }
        });
      }

      // Pending spec review: customer specs provided but not finalized
      var hasCustomerSpecs = fd.specifications && fd.specifications.specType === 'customer';
      var specsFinalized = fd.rfq && fd.rfq.specsFinalized;
      if (hasCustomerSpecs && !specsFinalized) {
        stats.all.pendingSpecs++;
        if (isMine) stats.my.pendingSpecs++;
      }

      // Pending T&C resolution: customer T&Cs received but not finalized
      var hasCustomerTCs = fd.rfq && fd.rfq.customerTandCs;
      var tcsSigned = fd.rfq && fd.rfq.tandCsSigned;
      if (hasCustomerTCs && !tcsSigned) {
        stats.all.pendingTCs++;
        if (isMine) stats.my.pendingTCs++;
      }

      // Needs attention: mine only, low completion or stale
      if (isMine) {
        var pct = calculateCompletion(fd);
        if (pct < 40 || isStale) {
          needsAttention.push({ proj: p, pct: pct, stale: isStale });
        }
      }
    } else if (isMine) {
      // No details loaded yet — still flag stale ones
      if (isStale) needsAttention.push({ proj: p, pct: 0, stale: true });
    }
  });
  // Sort needs attention: lowest completion first, then stalest
  needsAttention.sort(function(a, b) { return a.pct - b.pct || (b.stale ? 1 : 0) - (a.stale ? 1 : 0); });
  needsAttention = needsAttention.slice(0, 5);

  // Build category averages
  function catAvg(scope, key) {
    var a = catAccum[scope][key];
    return a.count > 0 ? Math.round(a.sum / a.count) : 0;
  }

  function relativeTime(isoStr) {
    if (!isoStr) return '—';
    var diff = now - new Date(isoStr);
    var mins = Math.floor(diff / 60000);
    if (mins < 1) return 'Just now';
    if (mins < 60) return mins + 'm ago';
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    var days = Math.floor(hrs / 24);
    if (days < 7) return days + 'd ago';
    return formatProjectDate(isoStr);
  }

  // Determine which project is "last worked on"
  var lastWorkedId = lastProjectId;
  if (!lastWorkedId && projects.length > 0) {
    lastWorkedId = projects[0].id; // most recently updated
  }

  // Search & sort
  var q = searchQuery.toLowerCase();
  var searchedProjects = projects.filter(function(p) {
    if (!q) return true;
    return (p.projectName || '').toLowerCase().indexOf(q) >= 0 ||
      (p.customerName || '').toLowerCase().indexOf(q) >= 0 ||
      (p.opportunityNumber || '').toLowerCase().indexOf(q) >= 0;
  });
  function sortList(list) {
    return list.slice().sort(function(a, b) {
      if (sortBy === 'name') return (a.projectName || '').localeCompare(b.projectName || '');
      if (sortBy === 'customer') return (a.customerName || '').localeCompare(b.customerName || '');
      if (sortBy === 'oldest') return (a.createdAt || '').localeCompare(b.createdAt || '');
      return (b.updatedAt || '').localeCompare(a.updatedAt || '');
    });
  }

  // Delete / Duplicate
  function canDelete(proj) {
    if (!userProfile) return false;
    if (userProfile.role === 'admin') return true;
    return proj.ownerId === userProfile.id;
  }
  function handleDelete(proj) {
    if (!canDelete(proj)) {
      onToast({ text: 'Only the project owner or an admin can delete this OneDoc.', type: 'error' });
      return;
    }
    if (!window.confirm('Are you sure you want to delete "' + proj.projectName + '"? This action cannot be undone.')) return;
    SupabaseDB.deleteProject(proj.id).then(function() {
      if (onRefreshProjects) onRefreshProjects();
      onToast({ text: 'OneDoc deleted.', type: 'success' });
      if (proj.id === currentProjectId) {
        setCurrentProjectId(null);
        setCurrentProjectName('');
        if (setCurrentProjectOwnerId) setCurrentProjectOwnerId(null);
        if (setLastSavedSnapshot) setLastSavedSnapshot(null);
      }
    }).catch(function(err) {
      onToast({ text: 'Delete failed: ' + (err.message || 'Unknown error'), type: 'error' });
    });
  }
  function handleDuplicate(proj) {
    SupabaseDB.duplicateProject(proj.id).then(function() {
      if (onRefreshProjects) onRefreshProjects();
      onToast({ text: 'OneDoc duplicated.', type: 'success' });
    }).catch(function(err) {
      onToast({ text: 'Duplicate failed: ' + (err.message || 'Unknown error'), type: 'error' });
    });
  }

  return (
    <div className="max-w-6xl mx-auto">

        </div>
        <div className="bg-white rounded-card border border-gray-200 p-4 shadow-sm">
          <div className="flex items-center justify-between mb-2">
            <span className="text-[10px] font-heading font-semibold text-p-gray/50 uppercase tracking-wider">Active (7d)</span>
            <span className="w-8 h-8 rounded-lg bg-p-orange/10 flex items-center justify-center text-p-orange"><Icons.revisions /></span>
          </div>
          <p className="text-2xl font-heading font-bold text-p-orange">{loadingProjects ? '—' : stats.my.recent}</p>
          <p className="text-[11px] font-body text-p-gray/40 mt-0.5">{loadingProjects ? '' : 'of ' + stats.all.recent + ' total'}</p>

          <div className="flex items-center justify-between mb-2">
            <span className="text-[10px] font-heading font-semibold text-p-gray/50 uppercase tracking-wider">Machines</span>
            <span className="w-8 h-8 rounded-lg bg-p-teal/10 flex items-center justify-center text-p-teal"><Icons.machine /></span>

          <div className="flex items-center justify-between mb-2">
            <span className="text-[10px] font-heading font-semibold text-p-gray/50 uppercase tracking-wider">Booked Value</span>
            <span className="w-8 h-8 rounded-lg bg-p-forest/10 flex items-center justify-center text-p-forest"><Icons.booking /></span>
          </div>
          <p className="text-2xl font-heading font-bold text-p-forest">{loadingDetails ? '—' : ('$' + stats.my.booked.toLocaleString())}</p>
          <p className="text-[11px] font-body text-p-gray/40 mt-0.5">{loadingDetails ? '' : 'of $' + stats.all.booked.toLocaleString() + ' total'}</p>

      {/* Data Completeness by Category + Needs Attention */}

            <div className="space-y-3">
              {[
                { key:'identity', label:'Project Identity', sub:'Company, Opp #, RSM, Type, Contact' },

      {/* Pending Action Counters — Spec Review & T&C Resolution */}

          </div>
          <div className="flex-1" />
          <select
            value={sortBy}

      {/* Continue Where You Left Off */}
      {lastWorkedId && projects.length > 0 && (() => {
        var lastProj = projects.find(function(p) { return p.id === lastWorkedId; });
        if (!lastProj) return null;
        var fd = projectDetails[lastProj.id];
        var machineCount = 0;
        var qt = '';

          machineCount = ((fd.rfq && fd.rfq.machines) || []).filter(function(m) { return m.selectedModel; }).length;

                return (

function getFileExtColor(fileName) {
  var ext = (fileName || '').split('.').pop().toLowerCase();
  var colors = {
    pdf: '#e54102', xls: '#217346', xlsx: '#217346', csv: '#217346',
    doc: '#2b579a', docx: '#2b579a', ppt: '#d24726', pptx: '#d24726',
    dwg: '#e8a200', dxf: '#e8a200', stp: '#6790a0', step: '#6790a0',
    jpg: '#90a997', jpeg: '#90a997', png: '#90a997', gif: '#90a997', svg: '#90a997',
    zip: '#5f5f5f', rar: '#5f5f5f', '7z': '#5f5f5f',
    txt: '#bebebe', rtf: '#bebebe',
  };
  return colors[ext] || '#343551';
}

function getFileExt(fileName) {
  return (fileName || '').split('.').pop().toUpperCase().slice(0, 4);
}

function formatFileSize(bytes) {
  if (!bytes || bytes === 0) return '0 B';
  var sizes = ['B', 'KB', 'MB', 'GB'];
  var i = Math.floor(Math.log(bytes) / Math.log(1024));
  return (bytes / Math.pow(1024, i)).toFixed(i === 0 ? 0 : 1) + ' ' + sizes[i];
}

function AttachmentsPanel({ open, onClose, projectId, projectName, onToast, userProfile }) {
  var [attachments, setAttachments] = React.useState([]);
  var [loading, setLoading] = React.useState(false);
  var [uploading, setUploading] = React.useState(false);
  var [dragOver, setDragOver] = React.useState(false);
  var [confirmDeleteId, setConfirmDeleteId] = React.useState(null);
  var fileInputRef = React.useRef(null);

  // Load attachments when panel opens or projectId changes
  React.useEffect(function() {
    if (open && projectId) {
      loadAttachments();
    }
  }, [open, projectId]);

  function loadAttachments() {
    setLoading(true);
    SupabaseDB.listAttachments(projectId).then(function(data) {
      setAttachments(data);
    }).catch(function(err) {
      console.error('Failed to load attachments:', err);
    }).finally(function() {
      setLoading(false);
    });
  }

  function handleFiles(files) {
    if (!projectId) {
      onToast && onToast('Please save the OneDoc first before attaching files.');
      return;
    }
    if (!files || files.length === 0) return;
    setUploading(true);
    var uploads = Array.from(files).map(function(file) {
      return SupabaseDB.uploadAttachment(projectId, file).then(function(row) {
        return row;
      }).catch(function(err) {
        console.error('Upload failed for ' + file.name, err);
        onToast && onToast('Failed to upload: ' + file.name);
        return null;
      });
    });
    Promise.all(uploads).then(function(results) {
      var success = results.filter(Boolean).length;
      if (success > 0) {
        onToast && onToast(success + ' file' + (success > 1 ? 's' : '') + ' uploaded successfully.');
        loadAttachments();
      }
    }).finally(function() {
      setUploading(false);
    });
  }

  function handleDrop(e) {
    e.preventDefault();
    setDragOver(false);
    handleFiles(e.dataTransfer.files);
  }

  function handleDelete(att) {
    if (confirmDeleteId !== att.id) {
      setConfirmDeleteId(att.id);
      setTimeout(function() { setConfirmDeleteId(null); }, 4000);
      return;
    }
    setConfirmDeleteId(null);
    SupabaseDB.deleteAttachment(att.id, att.storage_path).then(function() {
      onToast && onToast('Deleted: ' + att.file_name);
      loadAttachments();
    }).catch(function(err) {
      console.error('Delete failed:', err);
      onToast && onToast('Failed to delete file.');
    });
  }

  function handleOpenFile(att) {
    SupabaseDB.getSignedUrl(att.storage_path, 3600, att.file_name).then(function(url) {
      if (url) {
        var a = document.createElement('a');
        a.href = url;
        a.download = att.file_name;
        a.target = '_blank';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      } else {
        onToast && onToast('Could not generate download link.');
      }
    });
  }

  if (!open) return null;

  return (
    <React.Fragment>
      <div className="attachments-overlay no-print" onClick={onClose} />
      <div className="attachments-panel no-print">
        {/* Header */}
        <div className="attachments-panel-header">
          <span style={{color:'#e54102'}}><Icons.attach /></span>
          <div style={{flex:1,minWidth:0}}>
            <div className="font-heading font-bold text-p-blurple" style={{fontSize:'15px'}}>Attachments</div>
            {projectName && (
              <div className="text-xs font-body text-p-gray/50" style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{projectName}</div>
            )}
          </div>
          <button
            onClick={onClose}
            style={{background:'none',border:'none',cursor:'pointer',padding:'6px',color:'#5f5f5f',borderRadius:'6px'}}
            title="Close"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        {/* Body */}
        <div className="attachments-panel-body">
          {/* Dropzone */}
          {projectId ? (
            <div
              className={'attachment-dropzone' + (dragOver ? ' dragover' : '')}
              onDragOver={function(e) { e.preventDefault(); setDragOver(true); }}
              onDragLeave={function() { setDragOver(false); }}
              onDrop={handleDrop}
              onClick={function() { fileInputRef.current && fileInputRef.current.click(); }}
            >
              <input
                ref={fileInputRef}
                type="file"
                multiple
                style={{display:'none'}}
                onChange={function(e) { handleFiles(e.target.files); e.target.value = ''; }}
              />
              <div style={{color:'#e54102',marginBottom:'8px'}}><Icons.upload /></div>
              {uploading ? (
                <div className="text-sm font-body text-p-orange font-medium">Uploading...</div>
              ) : (
                <React.Fragment>
                  <div className="text-sm font-body text-p-gray font-medium">Drop files here or tap to browse</div>
                  <div className="text-xs font-body text-p-gray/40 mt-1">.pdf, .xlsx, .dwg, .dxf, .docx, and more</div>
                </React.Fragment>
              )}
            </div>
          ) : (
            <div className="attachment-dropzone" style={{borderColor:'#bebebe',opacity:0.5}}>
              <div className="text-sm font-body text-p-gray/50">Enter a company name or opportunity number first to attach files</div>
            </div>
          )}

          {/* File list */}
          {loading ? (
            <div className="text-center py-8 text-sm font-body text-p-gray/50">Loading attachments...</div>
          ) : attachments.length === 0 ? (
            <div className="text-center py-8">
              <div style={{color:'#bebebe',marginBottom:'8px'}}><Icons.fileIcon /></div>
              <div className="text-sm font-body text-p-gray/40">No files attached yet</div>
            </div>
          ) : (
            <div>
              <div className="text-[10px] font-heading font-semibold text-p-gray/50 uppercase tracking-wider mb-2">
                {attachments.length} file{attachments.length !== 1 ? 's' : ''}
              </div>
              {attachments.map(function(att) {
                var ext = getFileExt(att.file_name);
                var bgColor = getFileExtColor(att.file_name);
                var isConfirming = confirmDeleteId === att.id;
                return (
                  <div key={att.id} className="attachment-item">
                    <div className="attachment-item-icon" style={{background: bgColor}}>{ext}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div
                        className="text-sm font-body text-p-blurple font-medium cursor-pointer hover:underline"
                        style={{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}
                        onClick={function() { handleOpenFile(att); }}
                        title={att.file_name}
                      >
                        {att.file_name}
                      </div>
                      <div className="text-[10px] font-body text-p-gray/40 mt-0.5">
                        {formatFileSize(att.file_size)} &middot; {new Date(att.created_at).toLocaleDateString()}
                      </div>
                    </div>
                    <button
                      onClick={function() { handleOpenFile(att); }}
                      style={{background:'none',border:'none',cursor:'pointer',padding:'6px',color:'#6790a0',borderRadius:'4px',flexShrink:0}}
                      title="Download"
                    >
                      <Icons.download />
                    </button>
                    <button
                      onClick={function() { handleDelete(att); }}
                      style={{background: isConfirming ? '#e04426' : 'none',border:'none',cursor:'pointer',padding:'6px',color: isConfirming ? 'white' : '#bebebe',borderRadius:'4px',flexShrink:0,transition:'all 0.15s'}}
                      title={isConfirming ? 'Click again to confirm delete' : 'Delete'}
                    >
                      <Icons.trash />
                    </button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    </React.Fragment>
  );
}

function useIsMobile() {
  function checkMobile() {
    // Standard mobile: narrow viewport
    if (window.innerWidth < 768) return true;
    // Phone landscape: wide but very short (iPhones are ~375-390px tall in landscape)
    // Tablets in landscape are 700px+ tall, so 500px cutoff safely catches only phones
    if (window.innerWidth >= 768 && window.innerHeight <= 500 && window.innerWidth > window.innerHeight) return true;
    return false;
  }
  const [isMobile, setIsMobile] = React.useState(checkMobile);
  React.useEffect(function() {
    function handler() { setIsMobile(checkMobile()); }
    window.addEventListener('resize', handler);
    window.addEventListener('orientationchange', handler);
    return function() {
      window.removeEventListener('resize', handler);
      window.removeEventListener('orientationchange', handler);
    };
  }, []);
  return isMobile;
}

function MobileMoreSheet({ open, onClose, activeTab, onNavigate, rfq, onSignOut }) {
  var _mobileExpanded = React.useState({});
  var mobileExpanded = _mobileExpanded[0];
  var setMobileExpanded = _mobileExpanded[1];

  if (!open) return null;

  // Group machines by model
  var activeMachines = rfq.machines.filter(function(m) { return m.selectedModel; });
  var mGroups = {};
  activeMachines.forEach(function(m) {
    if (!mGroups[m.selectedModel]) mGroups[m.selectedModel] = [];
    mGroups[m.selectedModel].push(m);
  });
  var machineItems = Object.keys(mGroups).map(function(model) {
    var slots = mGroups[model];
    if (slots.length === 1) {
      return { id: 'machine-' + slots[0].slotNumber, label: model, icon: Icons.machine };
    }
    return {
      id: 'machine-group-' + model,
      label: model + ' (' + slots.length + ')',
      icon: Icons.machine,
      isGroup: true,
      subItems: slots.map(function(s, i) {
        return { id: 'machine-' + s.slotNumber, label: 'Unit ' + (i + 1), icon: Icons.machine };

    };
  });

  var sections = [
    {

        { id: 'booking', label: 'Booking Details', icon: Icons.booking },
        { id: 'tandc', label: 'Terms & Conditions', icon: Icons.tandc },
      ].filter(Boolean)

    machineItems.length > 0 && {
      label: 'EQUIPMENT',
      items: machineItems
    },
    {
      label: 'TOOLS',
      items: [
        { id: 'revisions', label: 'Revision History', icon: Icons.revisions },
        { id: 'machine-admin', label: 'Machine Setup', icon: Icons.settings },
        { id: '__signout__', label: 'Sign Out', icon: null, action: onSignOut, danger: true },

  return (
    <React.Fragment>
      <div className="mobile-sheet-overlay" onClick={onClose} />
      <div className="mobile-sheet">
        <div className="mobile-sheet-handle" />
        {sections.map(function(section, si) {
          return (
            <div key={si}>
              {si > 0 && <div className="mobile-sheet-divider" />}

                if (item.isGroup) {
                  var gExpanded = mobileExpanded[item.id];
                  var hasActiveSub = item.subItems && item.subItems.some(function(si) { return activeTab === si.id; });
                  var IconComp = item.icon;
                  return (
                    <React.Fragment key={item.id}>
                      <button
                        className={'mobile-sheet-item' + (hasActiveSub ? ' active' : '')}

  const [currentProjectId, setCurrentProjectId] = React.useState(null);
  const [currentProjectName, setCurrentProjectName] = React.useState('');
  const [currentProjectOwnerId, setCurrentProjectOwnerId] = React.useState(null);
  const [lastSavedSnapshot, setLastSavedSnapshot] = React.useState(null);
  const [toastMessage, setToastMessage] = React.useState(null);

  // Attachments panel state
  const [attachmentsPanelOpen, setAttachmentsPanelOpen] = React.useState(false);
  const [attachmentCount, setAttachmentCount] = React.useState(0);

  // Folder base URLs (loaded from app_settings)
  const [quoteFolderBaseUrl, setQuoteFolderBaseUrlState] = React.useState('');
  const [projectFolderBaseUrl, setProjectFolderBaseUrlState] = React.useState('');
  React.useEffect(function() {
    loadFolderBaseUrls().then(function(urls) {
      setQuoteFolderBaseUrlState(urls.quotes);
      setProjectFolderBaseUrlState(urls.projects);
    });
  }, []);

  // Load attachment count when project changes
  React.useEffect(function() {
    if (currentProjectId) {
      SupabaseDB.listAttachments(currentProjectId).then(function(data) {
        setAttachmentCount(data.length);
      }).catch(function() { setAttachmentCount(0); });
    } else {
      setAttachmentCount(0);
    }
  }, [currentProjectId]);

  // Refresh attachment count when panel closes (in case files were added/removed)
  React.useEffect(function() {
    if (!attachmentsPanelOpen && currentProjectId) {
      SupabaseDB.listAttachments(currentProjectId).then(function(data) {
        setAttachmentCount(data.length);
      }).catch(function() {});
    }
  }, [attachmentsPanelOpen]);

  // User profile (for role-based permissions)
  const [userProfile, setUserProfile] = React.useState(null);
  React.useEffect(function() {
    SupabaseDB.getCurrentProfile().then(function(profile) {
      setUserProfile(profile);
      // Refresh dashboard after profile is ensured (so ownerName lookups work)
      loadDashboardProjects();
    }).catch(function() {});
  }, []);

  // Realtime subscription — refresh dashboard and notify when another user changes a project
  React.useEffect(function() {
    var channel = SupabaseDB.subscribeToProjects(function(payload) {
      // Refresh dashboard project list on any change
      loadDashboardProjects();

      // If someone else updated the project we currently have open, show a notification
      if (payload.new && payload.new.id === currentProjectId && payload.eventType === 'UPDATE') {
        var editedBy = payload.new.last_edited_by;
        var myId = userProfile && userProfile.id;
        if (editedBy && editedBy !== myId) {
          // Another user saved changes — reload the project to get their updates
          SupabaseDB.getProject(currentProjectId).then(function(fullProj) {
            var restoredState = Object.assign({}, fullProj.formData, {
              activeTab: state.activeTab,
              showRaci: state.showRaci || false,
              exportMenuOpen: false,
            });
            setState(restoredState);
            setLastSavedSnapshot(JSON.stringify(extractFormData(restoredState)));
            setToastMessage({ text: 'This OneDoc was updated by another user.', type: 'info' });
          }).catch(function() {});
        }
      }
    });

    return function() {
      SupabaseDB.unsubscribeFromProjects(channel);
    };
  }, [currentProjectId, userProfile]);

  // Dashboard state
  const [dashboardProjects, setDashboardProjects] = React.useState([]);
  const [dashboardLoading, setDashboardLoading] = React.useState(true);
  const [dashboardRefreshKey, setDashboardRefreshKey] = React.useState(0);
  const [dashboardSearch, setDashboardSearch] = React.useState('');
  const [lastProjectId, setLastProjectId] = React.useState(function() {
    try { return localStorage.getItem('onedoc-last-project-id') || null; } catch(e) { return null; }
  });

  // Load dashboard projects
  function loadDashboardProjects() {
    setDashboardLoading(true);
    SupabaseDB.listProjects().then(function(all) {
      setDashboardProjects(all || []);
    }).catch(function(err) {
      console.error('Failed to load projects for dashboard:', err);
    }).finally(function() {
      setDashboardLoading(false);
    });
  }

  React.useEffect(function() {
    loadDashboardProjects();
  }, []);

  // Track last opened project
  React.useEffect(function() {
    if (currentProjectId) {
      setLastProjectId(currentProjectId);
      try { localStorage.setItem('onedoc-last-project-id', currentProjectId); } catch(e) {}
    }
  }, [currentProjectId]);

  // Dashboard: load a project
  function handleDashboardLoad(proj) {
    SupabaseDB.getProject(proj.id).then(function(fullProj) {
      var restoredState = Object.assign({}, fullProj.formData, {
        activeTab: 'rfq',
        showRaci: false,
        exportMenuOpen: false,
      });
      setState(restoredState);
      setCurrentProjectId(fullProj.id);
      setCurrentProjectName(fullProj.projectName);
      setCurrentProjectOwnerId(fullProj.ownerId);
      setLastSavedSnapshot(JSON.stringify(extractFormData(restoredState)));
      setToastMessage({ text: 'Loaded: ' + fullProj.projectName, type: 'success' });
    }).catch(function(err) {
      setToastMessage({ text: 'Failed to load: ' + ((err && err.message) || 'error'), type: 'error' });
    });
  }

  // Dashboard: new project
  function handleDashboardNewProject() {
    var blank = Object.assign({}, getBlankStateForAll(state), {
      activeTab: 'rfq', showRaci: false, exportMenuOpen: false
    });
    setState(blank);
    setCurrentProjectId(null);
    setCurrentProjectName('');
    setCurrentProjectOwnerId(null);
    setLastSavedSnapshot(null);
  }

  // Dirty detection — compare current formData to last saved snapshot
  const isDirty = React.useMemo(() => {
    if (!lastSavedSnapshot) return false;
    const current = extractFormData(state);
    return JSON.stringify(current) !== lastSavedSnapshot;
  }, [state, lastSavedSnapshot]);

  // ===== AUTO-NAME: Generate project name from Opportunity Number + Company Name =====
  function generateProjectName(rfqData) {
    var companyName = (rfqData && rfqData.customerName) ? rfqData.customerName.trim() : '';
    var oppNum = (rfqData && rfqData.opportunityNumber) ? rfqData.opportunityNumber.trim() : '';
    if (oppNum && companyName) return oppNum + ' - ' + companyName;
    if (companyName) return companyName;
    if (oppNum) return oppNum;
    return '';
  }

  // ===== AUTO-SAVE: Simplified, bulletproof implementation =====
  const autoSaveTimerRef = React.useRef(null);
  const [autoSaving, setAutoSaving] = React.useState(false);
  const savePendingRef = React.useRef(false);

  // Refs always point to latest values — avoids stale closures in setTimeout callbacks
  const stateRef = React.useRef(state);
  const projectIdRef = React.useRef(currentProjectId);
  const lastSavedSnapshotRef = React.useRef(lastSavedSnapshot);
  stateRef.current = state;
  projectIdRef.current = currentProjectId;
  lastSavedSnapshotRef.current = lastSavedSnapshot;

  // Core save function — always reads from refs for latest values
  function performSave() {
    var s = stateRef.current;
    var projId = projectIdRef.current;
    if (!s || !s.rfq) return;

    var nameToSave = generateProjectName(s.rfq);
    // For new projects, only save if we have a name
    if (!projId && !nameToSave) return;

    var formDataSnapshot = extractFormData(s);

    // Skip if nothing actually changed from last save
    var snapshotStr = JSON.stringify(formDataSnapshot);
    if (projId && snapshotStr === lastSavedSnapshotRef.current) {
      savePendingRef.current = false;
      return;
    }

    savePendingRef.current = false;
    setAutoSaving(true);
    console.log('[AutoSave] Saving:', { id: projId, name: nameToSave, company: s.rfq.customerName, opp: s.rfq.opportunityNumber });

    SupabaseDB.saveProject({
      id: projId || undefined,
      projectName: nameToSave || 'Untitled Project',
      customerName: (s.rfq && s.rfq.customerName) || '',
      opportunityNumber: (s.rfq && s.rfq.opportunityNumber) || '',
      formData: formDataSnapshot,
    }).then(function(saved) {
      console.log('[AutoSave] Saved OK:', { id: saved.id, name: saved.projectName, dbCustomer: saved.customerName, dbOpp: saved.opportunityNumber });
      // Update project identity for new projects
      if (!projId) {
        setCurrentProjectId(saved.id);
        setCurrentProjectOwnerId(saved.ownerId);
        projectIdRef.current = saved.id;
      }
      setCurrentProjectName(saved.projectName);
      setLastSavedSnapshot(snapshotStr);
      lastSavedSnapshotRef.current = snapshotStr;
      setAutoSaving(false);
      // Refresh dashboard data in background so it's fresh when user navigates
      loadDashboardProjects();
    }).catch(function(err) {
      console.error('[AutoSave] FAILED:', err);
      setAutoSaving(false);
    });
  }

  // Schedule a debounced save — the timer is NOT tied to any effect lifecycle
  function scheduleSave() {
    savePendingRef.current = true;
    if (autoSaveTimerRef.current) clearTimeout(autoSaveTimerRef.current);
    autoSaveTimerRef.current = setTimeout(performSave, 2000);
  }

  // Keep currentProjectName in sync with the auto-generated name (immediate, no save)
  React.useEffect(function() {
    if (state.activeTab === 'dashboard') return;
    var autoName = generateProjectName(state.rfq);
    if (autoName && autoName !== currentProjectName) {
      setCurrentProjectName(autoName);
    }
  }, [state.rfq && state.rfq.customerName, state.rfq && state.rfq.opportunityNumber]);

  // Main auto-save trigger: watch ALL state changes
  // IMPORTANT: No cleanup function — we never cancel the debounce timer.
  // This ensures saves complete even when the user navigates to the dashboard.
  React.useEffect(function() {
    if (state.activeTab === 'dashboard') return;

    var projId = projectIdRef.current;
    var autoName = generateProjectName(state.rfq);

    // For new projects: save as soon as we have a name
    // For existing projects: save whenever state differs from last snapshot
    var isExisting = !!projId;
    if (isExisting) {
      scheduleSave();
    } else if (autoName) {
      scheduleSave();
    }
  }, [state]);

  // Flush any pending save immediately when navigating to the dashboard
  React.useEffect(function() {
    if (state.activeTab === 'dashboard' && savePendingRef.current) {
      console.log('[AutoSave] Flushing pending save before dashboard');
      if (autoSaveTimerRef.current) clearTimeout(autoSaveTimerRef.current);
      performSave();
    }
  }, [state.activeTab]);

  // Refresh dashboard data when navigating to dashboard
  React.useEffect(function() {
    if (state.activeTab === 'dashboard') {
      loadDashboardProjects();
      setDashboardRefreshKey(function(k) { return k + 1; });
    }
  }, [state.activeTab]);

  React.useEffect(() => {
    function handleResize() {
      const w = window.innerWidth;
      if (w < 1024 && w >= 768) setSidebarCollapsed(true);
      else if (w >= 1024) setSidebarCollapsed(false);
    }
    handleResize();
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  function renderTab() {
    const { activeTab } = state;
    switch (activeTab) {
      case 'dashboard': return null; // Rendered separately in the layout
      case 'rfq': return <RFQTab state={state} setState={setState} quoteFolderBaseUrl={quoteFolderBaseUrl} projectFolderBaseUrl={projectFolderBaseUrl} />;
      case 'cpp': return <CPPTab state={state} setState={setState} />;
      case 'facility': return <FacilityTab state={state} setState={setState} />;
      case 'specs': return <SpecsTab state={state} setState={setState} />;
      case 'booking': return <BookingTab state={state} setState={setState} />;
      case 'tandc': return <TandCTab state={state} setState={setState} />;
      case 'revisions': return <RevisionsTab state={state} setState={setState} />;
      case 'machine-admin': return <MachineAdminTab state={state} setState={setState} quoteFolderBaseUrl={quoteFolderBaseUrl} setQuoteFolderBaseUrlState={setQuoteFolderBaseUrlState} projectFolderBaseUrl={projectFolderBaseUrl} setProjectFolderBaseUrlState={setProjectFolderBaseUrlState} />;
      default:
        if (activeTab.startsWith('machine-')) {
          const slotNum = parseInt(activeTab.split('-')[1]);
          return <MachineTab state={state} setState={setState} slotNumber={slotNum} />;
        }
        return <div>Unknown tab</div>;
    }
  }

  function handleMobileNavigate(tabId) {
    setMobileMoreOpen(false);
    setState(function(p) { return Object.assign({}, p, { activeTab: tabId }); });
  }

  return (
    <React.Fragment>
      {/* ===== DESKTOP / TABLET SHELL ===== */}
      <div className="desktop-shell" style={{display:'grid',gridTemplateColumns:'auto 1fr',gridTemplateRows:'auto 1fr',height:'100dvh',overflow:'hidden'}}>
        <Sidebar
          state={state} setState={setState}
          collapsed={sidebarCollapsed} setCollapsed={setSidebarCollapsed}
          mobileOpen={mobileOpen} setMobileOpen={setMobileOpen}
          currentProjectName={currentProjectName}
          onNewProject={handleDashboardNewProject}
        />
        <TopBar
          state={state} setState={setState}
          mobileOpen={mobileOpen} setMobileOpen={setMobileOpen}
          currentProjectId={currentProjectId}
          currentProjectName={currentProjectName}
          isDirty={isDirty}
          onNewProject={handleDashboardNewProject}
          autoSaving={autoSaving}
          onOpenAttachments={() => setAttachmentsPanelOpen(true)}
          attachmentCount={attachmentCount}
          dashboardSearch={dashboardSearch}
          setDashboardSearch={setDashboardSearch}
        />
        <main style={{gridColumn:'2',overflowY:'auto',overscrollBehavior:'contain',background:'#f8f9fa',padding:'24px',minHeight:0}} className="desktop-main-area">
          {state.activeTab === 'dashboard' ? (
            <DashboardView
              projects={dashboardProjects}
              loadingProjects={dashboardLoading}
              onLoadProject={handleDashboardLoad}
              onNewProject={handleDashboardNewProject}
              lastProjectId={lastProjectId}
              refreshKey={dashboardRefreshKey}
              userProfile={userProfile}
              onToast={setToastMessage}
              currentProjectId={currentProjectId}
              setCurrentProjectId={setCurrentProjectId}
              setCurrentProjectName={setCurrentProjectName}
              setCurrentProjectOwnerId={setCurrentProjectOwnerId}
              setLastSavedSnapshot={setLastSavedSnapshot}
              onRefreshProjects={loadDashboardProjects}
              searchQuery={dashboardSearch}
              setSearchQuery={setDashboardSearch}
            />
          ) : (
            <React.Fragment>
              <PageToolbar
                state={state} setState={setState}
                onResetProject={() => { setCurrentProjectId(null); setCurrentProjectName(''); setLastSavedSnapshot(null); }}
              />
              <div className="tab-content">
                {renderTab()}
              </div>
            </React.Fragment>
          )}
          <footer className="mt-8 pt-5 border-t border-gray-200 no-print">
            <div className="flex flex-col sm:flex-row items-center justify-between gap-3">
              <div className="flex items-center gap-3">
                <img src="assets/logos/horizontal-full-color.png" alt="Pearson Packaging Systems" className="h-5" />
                <span className="text-xs text-p-gray font-body">Real Partners. That Simple.</span>
              </div>
              <div className="text-xs text-p-gray/50 font-body text-right">
                <p>8120 W Sunset Hwy, Spokane, WA 99224 &middot; 800.732.7766</p>
              </div>
            </div>
          </footer>
        </main>
        <RACIModal state={state} setState={setState} />
      </div>

      {/* ===== MOBILE SHELL ===== */}
      <div className="mobile-shell">
        <MobileHeader
          currentProjectName={currentProjectName}
          activeTab={state.activeTab}
          autoSaving={autoSaving}
          isDirty={isDirty}
          currentProjectId={currentProjectId}
          onNewProject={handleDashboardNewProject}
          onOpenAttachments={() => setAttachmentsPanelOpen(true)}
          attachmentCount={attachmentCount}
          formState={state}
        />
        <div className="mobile-content">
          {state.activeTab === 'dashboard' ? (
            <DashboardView
              projects={dashboardProjects}
              loadingProjects={dashboardLoading}
              onLoadProject={handleDashboardLoad}
              onNewProject={handleDashboardNewProject}
              lastProjectId={lastProjectId}
              refreshKey={dashboardRefreshKey}
              userProfile={userProfile}
              onToast={setToastMessage}
              currentProjectId={currentProjectId}
              setCurrentProjectId={setCurrentProjectId}
              setCurrentProjectName={setCurrentProjectName}
              setCurrentProjectOwnerId={setCurrentProjectOwnerId}
              setLastSavedSnapshot={setLastSavedSnapshot}
              onRefreshProjects={loadDashboardProjects}
              searchQuery={dashboardSearch}
              setSearchQuery={setDashboardSearch}
            />
          ) : (
            <React.Fragment>
              <PageToolbar
                state={state} setState={setState}
                onResetProject={() => { setCurrentProjectId(null); setCurrentProjectName(''); setLastSavedSnapshot(null); }}
              />
              <div className="tab-content">
                {renderTab()}
              </div>
            </React.Fragment>
          )}
        </div>
        <MobileBottomNav
          activeTab={state.activeTab}
          onNavigate={handleMobileNavigate}
          moreOpen={mobileMoreOpen}
          setMoreOpen={setMobileMoreOpen}
          rfq={state.rfq}
        />
        <MobileMoreSheet
          open={mobileMoreOpen}
          onClose={() => setMobileMoreOpen(false)}
          activeTab={state.activeTab}
          onNavigate={handleMobileNavigate}
          rfq={state.rfq}
          onSignOut={() => supabaseClient.auth.signOut()}
        />
      </div>

      {/* ===== SHARED MODALS (both shells) ===== */}
      <AttachmentsPanel
        open={attachmentsPanelOpen}
        onClose={() => setAttachmentsPanelOpen(false)}
        projectId={currentProjectId}
        projectName={currentProjectName}
        onToast={setToastMessage}
        userProfile={userProfile}
      />
      <Toast message={toastMessage} onDismiss={() => setToastMessage(null)} />
    </React.Fragment>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null, errorInfo: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) { console.error('App crash:', error, info); this.setState({ errorInfo: info }); }
  render() {
    if (this.state.hasError) {
      return React.createElement('div', {style:{padding:'40px',fontFamily:'Roboto,sans-serif',color:'#343551'}},
        React.createElement('h1', {style:{color:'#e54102',marginBottom:'16px'}}, 'Something went wrong'),
        React.createElement('pre', {style:{background:'#f5f5f5',padding:'16px',borderRadius:'8px',overflow:'auto',fontSize:'13px',whiteSpace:'pre-wrap'}}, 
          'Error: ' + String(this.state.error) + '\n\nMessage: ' + (this.state.error && this.state.error.message ? this.state.error.message : 'none') + '\n\nComponent Stack: ' + (this.state.errorInfo && this.state.errorInfo.componentStack ? this.state.errorInfo.componentStack : 'none')
        )
      );
    }
    return this.props.children;
  }
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ErrorBoundary><AuthGate><App /></AuthGate></ErrorBoundary>);
</script>
</body>
</html>
