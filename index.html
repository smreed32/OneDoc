<script>
// PDF Export - Professional Pearson-branded report
window.doExportPDF = async function(state, attachments) {
  // Resolve signed URLs for all attachments before building PDF
  var attsWithUrls = attachments || [];
  for (var _i = 0; _i < attsWithUrls.length; _i++) {
    try {
      attsWithUrls[_i]._signedUrl = await SupabaseDB.getSignedUrl(attsWithUrls[_i].storage_path, 31536000, attsWithUrls[_i].file_name);
    } catch(e) { attsWithUrls[_i]._signedUrl = ''; }
  }
  // Preload logo image, then generate PDF
  var logoImg = new Image();
  logoImg.crossOrigin = 'anonymous';
  var logoLoaded = false;
  var logoDataUrl = null;
  function buildPDF() {
    try {
      var jsPDFClass = window.jspdf.jsPDF;
      if (!jsPDFClass) { alert('PDF library not loaded.'); return; }
      var doc = new jsPDFClass({orientation:'portrait', unit:'pt', format:'letter'});
      var pw = doc.internal.pageSize.getWidth(); // 612
      var ph = doc.internal.pageSize.getHeight(); // 792
      var mx = 48; // margins
      var cw = pw - mx * 2; // content width
      var dateStr = new Date().toISOString().slice(0,10);
      var headerH = 52; // header zone height
      var footerH = 36; // footer zone height
      var bodyTop = headerH + 10;
      var bodyBottom = ph - footerH;

      // Brand colors
      var C_ORANGE = [229, 65, 2];
      var C_BLURPLE = [52, 53, 81];
      var C_GRAY = [95, 95, 95];
      var C_LTGRAY = [190, 190, 190];
      var C_ZEBRA = [245, 245, 245];
      var C_WHITE = [255, 255, 255];

      function sv(v) { return (v == null || v === undefined) ? '' : String(v); }

      function checkPage(y, need) {
        if (y + need > bodyBottom) { doc.addPage(); return bodyTop; }
        return y;
      }

      // Wrap text into lines that fit a given width
      function wrapText(text, maxW, fontSize, fontStyle) {
        doc.setFontSize(fontSize);
        doc.setFont('helvetica', fontStyle || 'normal');
        var raw = sv(text);
        if (!raw) return [''];
        return doc.splitTextToSize(raw, maxW);
      }

      // Section title — orange text with thin orange underline
      function secTitle(title, y) {
        y += 10; // breathing room above section title
        y = checkPage(y, 42);
        doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(C_ORANGE[0],C_ORANGE[1],C_ORANGE[2]);
        doc.text(title.toUpperCase(), mx, y);
        y += 4;
        doc.setDrawColor(C_ORANGE[0],C_ORANGE[1],C_ORANGE[2]); doc.setLineWidth(1.5);
        doc.line(mx, y, mx + cw, y);
        return y + 14;
      }

      // Sub-section title — blurple bold
      function subTitle(title, y) {
        y = checkPage(y, 24);
        doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(C_BLURPLE[0],C_BLURPLE[1],C_BLURPLE[2]);
        doc.text(title, mx, y);
        return y + 14;
      }

      // Key-value table with auto-wrapping values AND labels
      function drawKV(pairs, startY) {
        var y = startY;
        var labelW = 155;
        var valW = cw - labelW;
        var lineH = 13; // line height within cells
        var padX = 6;
        var padY = 4;

        // Header row
        y = checkPage(y, 20);
        doc.setFillColor(C_BLURPLE[0],C_BLURPLE[1],C_BLURPLE[2]);
        doc.rect(mx, y, cw, 18, 'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(255,255,255);
        doc.text('Field', mx + padX, y + 12.5);
        doc.text('Value', mx + labelW + padX, y + 12.5);
        y += 18;

        for (var i = 0; i < pairs.length; i++) {
          // Wrap BOTH label and value columns
          var labelLines = wrapText(pairs[i][0], labelW - padX * 2, 8.5, 'bold');
          var valLines = wrapText(pairs[i][1], valW - padX * 2, 8.5, 'normal');
          var maxLines = Math.max(labelLines.length, valLines.length);
          var rowH = Math.max(18, maxLines * lineH + padY * 2);
          y = checkPage(y, rowH);

          // Zebra
          if (i % 2 === 1) { doc.setFillColor(C_ZEBRA[0],C_ZEBRA[1],C_ZEBRA[2]); doc.rect(mx, y, cw, rowH, 'F'); }

          // Borders
          doc.setDrawColor(C_LTGRAY[0],C_LTGRAY[1],C_LTGRAY[2]); doc.setLineWidth(0.4);
          doc.rect(mx, y, labelW, rowH); doc.rect(mx + labelW, y, valW, rowH);

          // Label (wrapped)
          doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(C_BLURPLE[0],C_BLURPLE[1],C_BLURPLE[2]);
          for (var ll = 0; ll < labelLines.length; ll++) {
            doc.text(labelLines[ll], mx + padX, y + padY + lineH * (ll + 1));
          }

          // Value (wrapped)
          doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(C_GRAY[0],C_GRAY[1],C_GRAY[2]);
          for (var vl = 0; vl < valLines.length; vl++) {
            doc.text(valLines[vl], mx + labelW + padX, y + padY + lineH * (vl + 1));
          }
          y += rowH;
        }
        return y + 20;
      }

      // Data table with auto-sized columns and text wrapping
      function drawTable(headers, rows, startY, colWidths) {
        var y = startY;
        var nc = headers.length;
        // Calculate column widths if not provided
        if (!colWidths) {
          colWidths = [];
          for (var ci = 0; ci < nc; ci++) {
            var maxLen = headers[ci].length;
            for (var ri2 = 0; ri2 < rows.length; ri2++) {
              var cellLen = sv(rows[ri2][ci]).length;
              if (cellLen > maxLen) maxLen = cellLen;
            }
            colWidths.push(Math.max(maxLen * 4.2 + 10, 28));
          }
          // Normalize to fit content width

          for (var w2 = 0; w2 < colWidths.length; w2++) colWidths[w2] = colWidths[w2] * scale;

          var maxLines = 1;
          var cellWrapped = [];
          for (var c = 0; c < nc; c++) {

            cellWrapped.push(lines);
            if (lines.length > maxLines) maxLines = lines.length;

      // Long-form text block (for specs & T&Cs)

          // Detect heading-like lines (all caps or "Topic:" format)

          var isTopicLine = /^[A-Z][A-Za-z\s]+:/.test(line) && !line.match(/^\d/);
          if (isHeading) {
            y = checkPage(y, 20);
            y += 4;
            doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.setTextColor(C_BLURPLE[0],C_BLURPLE[1],C_BLURPLE[2]);
            doc.text(line, mx, y);
            y += lineH + 2;
          } else if (isTopicLine) {

            var colonIdx = line.indexOf(':');
            var topic = line.substring(0, colonIdx + 1);
            var detail = line.substring(colonIdx + 1).trim();

      }

      var fn = 'OneDoc_' + sv(rfq.customerName).replace(/[^a-zA-Z0-9 ]/g,'').replace(/\s+/g,'_') + '_' + dateStr + '.pdf';
      doc.save(fn);
    } catch(err) {
      console.error('PDF Export Error:', err);
      alert('PDF export failed: ' + (err.message || String(err)));
    }
  } // end buildPDF

  // Load logo then build PDF — if logo fails, build without it
  var pdfBuilt = false;
  function runOnce() { if (pdfBuilt) return; pdfBuilt = true; buildPDF(); }
  logoImg.onload = function() {
    try {
      var canvas = document.createElement('canvas');
      canvas.width = logoImg.naturalWidth;
      canvas.height = logoImg.naturalHeight;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(logoImg, 0, 0);
      logoDataUrl = canvas.toDataURL('image/png');
    } catch(e) { console.warn('Logo canvas conversion failed:', e); }
    runOnce();
  };
  logoImg.onerror = function() { runOnce(); };
  logoImg.src = 'assets/logos/horizontal-full-color.png';
  setTimeout(runOnce, 2000);
};

// ============================================================================
// INDEXEDDB PERSISTENCE LAYER — ProjectDB
// Plain JS (no JSX), must run before React components
// ============================================================================
const ProjectDB = (function() {
  const DB_NAME = 'OneDocDB';
  const DB_VERSION = 1;
  const STORE_NAME = 'projects';
  let _db = null;

  function openDB() {
    return new Promise(function(resolve, reject) {
      if (_db) { resolve(_db); return; }
      var req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = function(e) {
        var db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          var store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
          store.createIndex('customerName', 'customerName', { unique: false });
          store.createIndex('updatedAt', 'updatedAt', { unique: false });
          store.createIndex('createdAt', 'createdAt', { unique: false });
        }
      };
      req.onsuccess = function(e) { _db = e.target.result; resolve(_db); };
      req.onerror = function(e) { reject(e.target.error); };
    });
  }

  return {
    init: function() {
      return openDB().catch(function(err) {
        console.warn('ProjectDB: IndexedDB unavailable', err);
      });
    },
    getAll: function() {
      return openDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction(STORE_NAME, 'readonly');
          var store = tx.objectStore(STORE_NAME);
          var req = store.getAll();
          req.onsuccess = function() { resolve(req.result || []); };
          req.onerror = function(e) { reject(e.target.error); };
        });
      }).catch(function(err) { console.warn('ProjectDB.getAll error', err); return []; });
    },
    get: function(id) {
      return openDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction(STORE_NAME, 'readonly');
          var store = tx.objectStore(STORE_NAME);
          var req = store.get(id);
          req.onsuccess = function() { resolve(req.result || null); };
          req.onerror = function(e) { reject(e.target.error); };
        });
      }).catch(function(err) { console.warn('ProjectDB.get error', err); return null; });
    },
    save: function(record) {
      return openDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction(STORE_NAME, 'readwrite');
          var store = tx.objectStore(STORE_NAME);
          var req = store.put(record);
          req.onsuccess = function() { resolve(record); };
          req.onerror = function(e) { reject(e.target.error); };
        });
      });
    },
    delete: function(id) {
      return openDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction(STORE_NAME, 'readwrite');
          var store = tx.objectStore(STORE_NAME);
          var req = store.delete(id);
          req.onsuccess = function() { resolve(); };
          req.onerror = function(e) { reject(e.target.error); };
        });
      });
    },
  };
})();

// Admin email allow-list — users signing in with these emails are auto-promoted to admin
const ADMIN_EMAILS = ['sreed@pearsonpkg.com', 'smreed32@gmail.com'];
// Memory-based storage fallback for restricted environments (e.g. sandboxed iframes)
const memoryStorage = (() => {
  const store = {};
  return {
    getItem: (key) => store[key] || null,
    setItem: (key, value) => { store[key] = value; },

// ============================================================================
// CLOUD DATABASE LAYER — SupabaseDB
// Replaces file-based persistence with Supabase PostgreSQL
// ============================================================================
const SupabaseDB = {
  // List ALL projects (shared across all users)
  async listProjects() {
    const { data, error } = await supabaseClient
      .from('projects')
      .select('id, project_name, customer_name, opportunity_number, created_by, tags, version, created_at, updated_at, owner_id, last_edited_by')
      .order('updated_at', { ascending: false });
    if (error) throw error;
    // Build user name lookup from profiles table (owners + editors)
    const userIds = [...new Set((data || []).flatMap(p => [p.owner_id, p.last_edited_by]).filter(Boolean))];
    let profileMap = {};
    if (userIds.length > 0) {
      const { data: profiles } = await supabaseClient
        .from('profiles')
        .select('id, full_name, email')
        .in('id', userIds);
      (profiles || []).forEach(pr => { profileMap[pr.id] = pr.full_name || pr.email || ''; });
    }
    return (data || []).map(p => ({
      id: p.id,
      projectName: p.project_name,
      customerName: p.customer_name,
      opportunityNumber: p.opportunity_number,
      createdBy: p.created_by,
      tags: p.tags || [],
      version: p.version || 1,
      createdAt: p.created_at,
      updatedAt: p.updated_at,
      ownerId: p.owner_id,
      lastEditedBy: p.last_edited_by,
      ownerName: profileMap[p.owner_id] || '',
      lastEditedByName: profileMap[p.last_edited_by] || '',
    }));
  },

  // Get a single project with full form data
  async getProject(id) {
    const { data, error } = await supabaseClient
      .from('projects')
      .select('*')
      .eq('id', id)
      .single();
    if (error) throw error;
    return {
      id: data.id,
      projectName: data.project_name,
      customerName: data.customer_name,
      opportunityNumber: data.opportunity_number,
      createdBy: data.created_by,
      tags: data.tags || [],
      version: data.version || 1,
      createdAt: data.created_at,
      updatedAt: data.updated_at,
      ownerId: data.owner_id,
      lastEditedBy: data.last_edited_by,
      formData: data.form_data,
    };
  },

  // Save (upsert) a project — preserves original owner_id for existing projects
  async saveProject({ id, projectName, customerName, opportunityNumber, createdBy, tags, version, formData }) {
    const user = (await supabaseClient.auth.getUser()).data.user;
    if (!user) throw new Error('Not authenticated');

    let data, error;

    if (id) {
      // UPDATE existing project — only send updatable fields (not owner_id)
      const updateRow = {
        project_name: projectName || 'Untitled Project',
        customer_name: customerName || '',
        opportunity_number: opportunityNumber || '',
        created_by: createdBy || '',
        tags: tags || [],
        version: version || 1,
        form_data: formData,
        last_edited_by: user.id,
      };
      const result = await supabaseClient
        .from('projects')
        .update(updateRow)
        .eq('id', id)
        .select()
        .single();
      data = result.data;
      error = result.error;
    } else {
      // INSERT new project — include owner_id
      const insertRow = {
        project_name: projectName || 'Untitled Project',
        customer_name: customerName || '',
        opportunity_number: opportunityNumber || '',
        created_by: createdBy || '',
        tags: tags || [],
        version: version || 1,
        form_data: formData,
        last_edited_by: user.id,
        owner_id: user.id,
      };
      const result = await supabaseClient
        .from('projects')
        .insert(insertRow)
        .select()
        .single();
      data = result.data;
      error = result.error;
    }

    if (error) throw error;
    return {
      id: data.id,
      projectName: data.project_name,
      customerName: data.customer_name,
      opportunityNumber: data.opportunity_number,
      createdBy: data.created_by,
      tags: data.tags || [],
      version: data.version || 1,
      createdAt: data.created_at,
      updatedAt: data.updated_at,
      ownerId: data.owner_id,
    };
  },

  // Delete a project (RLS enforces owner-or-admin only)
  async deleteProject(id) {
    const { error } = await supabaseClient
      .from('projects')
      .delete()
      .eq('id', id);
    if (error) {
      if (error.code === '42501' || (error.message && error.message.toLowerCase().indexOf('policy') >= 0)) {
        throw new Error('You do not have permission to delete this project. Only the creator or an admin can delete.');
      }
      throw error;
    }
  },

  // Duplicate a project (new copy owned by current user)
  async duplicateProject(sourceId) {
    const source = await this.getProject(sourceId);
    return this.saveProject({
      projectName: source.projectName + ' (Copy)',
      customerName: source.customerName,
      opportunityNumber: source.opportunityNumber,
      createdBy: source.createdBy,
      tags: source.tags,
      version: 1,
      formData: source.formData,
    });
  },

  // Get current user's profile (for role checks)
  async getCurrentProfile() {
    const user = (await supabaseClient.auth.getUser()).data.user;
    if (!user) return null;
    const email = user.email || '';
    const isAdminEmail = ADMIN_EMAILS.some(e => e.toLowerCase() === email.toLowerCase());
    const { data, error } = await supabaseClient
      .from('profiles')
      .select('id, role, email, full_name')
      .eq('id', user.id)
      .single();
    if (!error && data) {
      // Auto-promote to admin if email is in admin list but role is not yet admin
      if (isAdminEmail && data.role !== 'admin') {
        await supabaseClient.from('profiles').update({ role: 'admin' }).eq('id', user.id);
        data.role = 'admin';
      }
      return data;
    }
    // Profile doesn't exist yet — auto-create from auth metadata
    const meta = user.user_metadata || {};
    const fullName = meta.full_name || meta.name || '';
    const role = isAdminEmail ? 'admin' : 'user';
    const { data: newProfile, error: insertErr } = await supabaseClient
      .from('profiles')
      .upsert({ id: user.id, email: email, full_name: fullName, role: role }, { onConflict: 'id' })
      .select('id, role, email, full_name')
      .single();
    if (insertErr || !newProfile) return { id: user.id, role: role, email: email, full_name: fullName };
    return newProfile;
  },

  // Subscribe to real-time project changes
  subscribeToProjects(callback) {
    return supabaseClient
      .channel('projects-realtime')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'projects' }, callback)
      .subscribe();
  },

  // Unsubscribe from real-time
  unsubscribeFromProjects(channel) {
    if (channel) supabaseClient.removeChannel(channel);
  },

  // ========== FILE ATTACHMENTS ==========

  // Upload a file to a project
  async uploadAttachment(projectId, file) {
    var user = (await supabaseClient.auth.getUser()).data.user;
    if (!user) throw new Error('Not authenticated');

    // Build a unique storage path: project-id/timestamp-filename
    var safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    var storagePath = projectId + '/' + Date.now() + '-' + safeName;

    // Upload to storage bucket
    var { data: uploadData, error: uploadError } = await supabaseClient.storage
      .from('project-files')
      .upload(storagePath, file, {
        contentType: file.type || 'application/octet-stream',
        upsert: false
      });
    if (uploadError) throw uploadError;

    // Insert metadata row
    var { data: row, error: rowError } = await supabaseClient
      .from('project_attachments')
      .insert({
        project_id: projectId,
        uploaded_by: user.id,
        file_name: file.name,
        file_size: file.size,
        content_type: file.type || 'application/octet-stream',
        storage_path: storagePath
      })
      .select()
      .single();
    if (rowError) throw rowError;
    return row;
  },

  // List all attachments for a project
  async listAttachments(projectId) {
    var { data, error } = await supabaseClient
      .from('project_attachments')
      .select('id, project_id, uploaded_by, file_name, file_size, content_type, storage_path, created_at')
      .eq('project_id', projectId)
      .order('created_at', { ascending: false });
    if (error) throw error;
    return data || [];
  },

  // Delete an attachment (removes storage file + metadata row)
  async deleteAttachment(attachmentId, storagePath) {
    // Remove from storage
    var { error: storageErr } = await supabaseClient.storage
      .from('project-files')
      .remove([storagePath]);
    if (storageErr) console.warn('Storage delete warning:', storageErr);

    // Remove metadata row
    var { error: rowErr } = await supabaseClient
      .from('project_attachments')
      .delete()
      .eq('id', attachmentId);
    if (rowErr) throw rowErr;
  },

  // Get a signed URL for a stored file (private bucket)
  async getSignedUrl(storagePath, expiresIn, downloadName) {
    var opts = { download: downloadName || false };
    var { data, error } = await supabaseClient.storage
      .from('project-files')
      .createSignedUrl(storagePath, expiresIn || 3600, opts);
    if (error) { console.warn('Signed URL error:', error); return ''; }
    return data && data.signedUrl ? data.signedUrl : '';
  },
};

</script>

// Merge custom machines from registry into the default data structures
function getMachineGroups(registry) {
  const customs = (registry && registry.customMachines) || [];
  if (customs.length === 0) return DEFAULT_MACHINE_GROUPS;
  // Deep clone defaults
  const groups = DEFAULT_MACHINE_GROUPS.map(g => ({ label: g.label, models: [...g.models] }));
  customs.forEach(cm => {
    let found = groups.find(g => g.label === cm.category);
    if (!found) {
      found = { label: cm.category, models: [] };
      // Insert before OEM Equipment and Conveyance
      const oemIdx = groups.findIndex(g => g.label === 'OEM Equipment');
      if (oemIdx >= 0) groups.splice(oemIdx, 0, found);
      else groups.push(found);
    }
    if (!found.models.includes(cm.model)) found.models.push(cm.model);
  });
  return groups;
}

function getModelToTemplate(registry) {
  const customs = (registry && registry.customMachines) || [];
  if (customs.length === 0) return DEFAULT_MODEL_TO_TEMPLATE;
  const result = { ...DEFAULT_MODEL_TO_TEMPLATE };
  customs.forEach(cm => { result[cm.model] = cm.templateType; });
  return result;
}

function getEquipmentLimits(registry) {
  const customs = (registry && registry.customMachines) || [];
  if (customs.length === 0) return DEFAULT_EQUIPMENT_LIMITS;
  const result = { ...DEFAULT_EQUIPMENT_LIMITS };
  customs.forEach(cm => {
    if (cm.limits) {
      // Only include non-null values
      const clean = {};
      Object.entries(cm.limits).forEach(([k, v]) => { if (v != null && v !== '') clean[k] = Number(v); });
      result[cm.model] = clean;
    }
  });
  return result;
}

function AuthGate({ children }) {
  const [session, setSession] = React.useState(undefined); // undefined = loading
  const [authError, setAuthError] = React.useState(null);

  React.useEffect(() => {
    // Check if Supabase is configured
    if (SUPABASE_URL.includes('YOUR-PROJECT-ID') || SUPABASE_ANON_KEY.includes('YOUR-ANON-KEY')) {
      setAuthError('Supabase is not configured. Please set your SUPABASE_URL and SUPABASE_ANON_KEY in the source code.');
      setSession(null);
      return;
    }

    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      setSession(session);
    }).catch(err => {
      console.error('Auth session error:', err);
      // Don't show error — just show login page. No session means not logged in.
      setSession(null);
    });

    const { data: { subscription } } = supabaseClient.auth.onAuthStateChange(
      (_event, session) => setSession(session)
    );

    return () => subscription.unsubscribe();
  }, []);

  if (session === undefined) {
    return (
      <div className="min-h-screen flex items-center justify-center" style={{background:'linear-gradient(135deg, #343551 0%, #0c2949 100%)'}}>
        <div className="text-center">
          <img src="assets/logos/horizontal-dark-bg.png" alt="Pearson" className="h-8 mx-auto mb-4" />
          <div className="flex items-center gap-2 text-white/60 text-sm font-body">
            <svg className="animate-spin h-4 w-4" viewBox="0 0 24 24">
              <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"/>
              <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
            </svg>
            Loading...
          </div>
        </div>
      </div>
    );
  }

  if (!session) return <LoginPage configError={authError} />;
  return children;
}

function Card({ title, children, className="" }) {
  return (
    <div className={`bg-white rounded-card border border-gray-200 shadow-sm ${className}`}>
      {title && (
        <div className="px-4 py-3 border-b border-gray-100">
          <h3 className="font-heading font-semibold text-sm text-p-blurple">{title}</h3>
        </div>
      )}
      <div className="px-4 py-4">{children}</div>
    </div>
  );
}

function FormField({ label, required, children, className="" }) {
  return (
    <div className={`mb-2 ${className}`}>
      <label className="block text-sm font-body font-medium mb-1 text-p-charcoal">
        {label}{required && <span className="text-p-orange ml-0.5">*</span>}
      </label>
      {children}
    </div>
  );
}

function TextInput({ value, onChange, placeholder, type="text", required, className="", disabled=false }) {
  const isEmpty = required && !value;
  return (
    <input
      type={type}
      value={value || ''}
      onChange={e => onChange(e.target.value)}
      placeholder={placeholder}
      disabled={disabled}
      className={`w-full px-3 py-2 border rounded-btn text-sm ${isEmpty ? 'border-p-orange' : 'border-p-light'} ${disabled ? 'bg-gray-100 text-p-gray cursor-not-allowed' : 'bg-white'} ${className}`}
    />
  );
}

function SelectInput({ value, onChange, options, optionValues, placeholder="Select...", optgroups, className="" }) {
  if (optgroups) {
    return (
      <select value={value||''} onChange={e => onChange(e.target.value||null)} className={`w-full px-3 py-2 border border-p-light rounded-btn text-sm bg-white ${className}`}>
        <option value="">{placeholder}</option>
        {optgroups.map(g => (
          <optgroup key={g.label} label={g.label}>
            {g.options.map(o => <option key={o} value={o}>{o}</option>)}
          </optgroup>
        ))}
      </select>
    );
  }
  return (
    <select value={value||''} onChange={e => onChange(e.target.value||null)} className={`w-full px-3 py-2 border border-p-light rounded-btn text-sm bg-white ${className}`}>
      <option value="">{placeholder}</option>
      {options.map((o, i) => {
        const val = optionValues ? optionValues[i] : o;
        return <option key={val} value={val}>{o}</option>;
      })}
    </select>
  );
}

function Toggle({ checked, onChange, label }) {
  return (
    <div className="flex items-center gap-3 py-1.5">
      <div className={`toggle-track ${checked ? 'active' : ''}`} onClick={() => onChange(!checked)}>
        <div className="toggle-thumb"></div>
      </div>
      <span className="text-sm font-body">{label}</span>
    </div>
  );
}

function Btn({ children, onClick, variant="primary", className="", size="md" }) {
  const base = "font-heading font-semibold rounded-btn transition-colors inline-flex items-center gap-2";
  const sizes = { sm:'px-3 py-1.5 text-xs', md:'px-4 py-2 text-sm', lg:'px-6 py-3 text-base' };
  const variants = {
    primary:'bg-p-orange text-white hover:bg-p-orange-hover',
    secondary:'bg-p-alt text-p-gray border border-p-light hover:bg-gray-200',
    danger:'bg-p-red text-white hover:bg-red-700',
    ghost:'text-p-orange hover:underline',
  };
  return <button onClick={onClick} className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}>{children}</button>;
}

    if (mode === 'table') {
      headers.forEach((_, ci) => {

      for (let ri = headerRowIdx + 1; ri < numRows; ri++) {
        const dataIdx = ri - headerRowIdx;

        aoa[ri].forEach((val, ci) => {
          const addr = XLSX.utils.encode_cell({r:ri, c:ci});
          if (!ws[addr]) { ws[addr] = {v:'', t:'s'}; }
          const hdr = headers[ci] || '';
          if (notesColSet.has(ci)) { ws[addr].s = sNotesWhite; return; }
          const numeric = isNum(val);
          if (numeric) {
            let baseStyle = isEven ? sNumZebra : sNumWhite;
            if (isCurrencyCol(hdr)) { ws[addr].s = withNumFmt(baseStyle, '$#,##0.00'); }
            else if (isPercentCol(hdr)) { ws[addr].s = withNumFmt(baseStyle, '0.0%'); }
            else if (isDimensionCol(hdr) || isRateCol(hdr)) { ws[addr].s = withNumFmt(baseStyle, '#,##0.00'); }
            else if (Number.isInteger(Number(val))) { ws[addr].s = withNumFmt(baseStyle, '#,##0'); }
            else { ws[addr].s = withNumFmt(baseStyle, '#,##0.00'); }

          }

        ws['!autofilter'] = {ref: XLSX.utils.encode_range({s:{r:headerRowIdx,c:0}, e:{r:numRows-1, c:numCols-1}})};
      }
    } else if (mode === 'keyvalue') {
      headers.forEach((_, ci) => {
        const addr = XLSX.utils.encode_cell({r:headerRowIdx, c:ci});

      });
      for (let ri = headerRowIdx + 1; ri < numRows; ri++) {
        const dataIdx = ri - headerRowIdx;
        const isEven = dataIdx % 2 === 0;
        const labelAddr = XLSX.utils.encode_cell({r:ri, c:0});

        for (let ci = 1; ci < numCols; ci++) {

          if (!ws[addr]) ws[addr] = {v:'', t:'s'};
          const val = aoa[ri][ci];
          const label = (aoa[ri][0] || '').toLowerCase();
          if (label.includes('notes') || label.includes('summary') || label.includes('description') || label.includes('considerations') || label.includes('obstructions') || label.includes('details')) {
            ws[addr].s = sNotesWhite;
          } else if (isNum(val)) {
            let baseStyle = isEven ? sNumZebra : sNumWhite;
            if (label.includes('dollar') || label.includes('amount') || label.includes('cost')) {
              ws[addr].s = withNumFmt(baseStyle, '$#,##0.00');
            } else if (label.includes('%') || label.includes('percent')) {
              ws[addr].s = withNumFmt(baseStyle, '0.0%');
            } else {
              ws[addr].s = baseStyle;
            }
          } else {
            ws[addr].s = isEven ? sBodyZebra : sBodyWhite;
          }
        }
      }
      const freezeRow = headerRowIdx + 1;
      ws['!freeze'] = {xSplit:'0', ySplit:String(freezeRow), topLeftCell:'A'+(freezeRow+1), activePane:'bottomLeft', state:'frozen'};
    }

    const colWidths = [];
    for (let ci = 0; ci < numCols; ci++) {
      let maxCharW = 8;
      const hdr = (headers[ci] || '').toLowerCase();
      for (let ri = 0; ri < numRows; ri++) {
        const val = aoa[ri] && aoa[ri][ci] != null ? String(aoa[ri][ci]) : '';

        const lines = val.split(/\n/);

          // Bold/Montserrat headers and labels are ~1.15x wider than Roboto body
          const isBoldRow = (ri === 0 && opts.sectionTitle) || ri === headerRowIdx || (mode === 'keyvalue' && ci === 0);
          const effectiveLen = isBoldRow ? Math.ceil(line.length * 1.15) : line.length;
          if (effectiveLen > maxCharW) maxCharW = effectiveLen;
        }
      }
      let minW = 14, maxW = 60;
      if (notesColSet.has(ci)) { minW = 30; maxW = 65; }
      else if (hdr.includes('description')) { minW = 25; maxW = 55; }
      else if (hdr.includes('summary') || hdr.includes('details') || hdr.includes('considerations') || hdr.includes('obstructions')) { minW = 30; maxW = 65; }
      else if (mode === 'keyvalue' && ci === 0) { minW = 20; maxW = 40; }
      else if (mode === 'keyvalue' && ci === 1) { minW = 30; maxW = 70; }
      // Add padding: 4 chars for body text, 5 for bold/header text
      const padding = 5;
      colWidths.push({wch: Math.min(Math.max(maxCharW + padding, minW), maxW)});
    }
    ws['!cols'] = colWidths;

    const MIN_DATA_ROW = 20;
    const HEADER_ROW_HT = 32;

    function estimateRowHeight(rowIdx) {
      if (opts.sectionTitle && rowIdx === 0) return SECTION_ROW_HT;

      let maxLines = 1;
      for (let ci = 0; ci < numCols; ci++) {
        const val = aoa[rowIdx] && aoa[rowIdx][ci] != null ? String(aoa[rowIdx][ci]) : '';
        if (!val) continue;
        const colW = colWidths[ci] ? colWidths[ci].wch : 14;
        // Account for indent and padding when calculating usable character width
        const usableW = Math.max(colW - 5, 5);
        // Bold font (labels in key-value mode) is wider
        const isBoldCol = mode === 'keyvalue' && ci === 0;
        const effectiveUsableW = isBoldCol ? Math.floor(usableW / 1.15) : usableW;
        const segments = val.split(/\n/);
        let lines = 0;
        for (const seg of segments) {
          lines += Math.max(1, Math.ceil(seg.length / effectiveUsableW));
        }
        if (lines > maxLines) maxLines = lines;
      }
      return Math.max(maxLines * LINE_HEIGHT, MIN_DATA_ROW);
    }

    return ws;

  });
  XLSX.utils.book_append_sheet(wb, buildSheet(machineData, 'table', {sectionTitle:'Machine Configurations'}), 'Machine Configs');

  if (state.specifications && (state.specifications.content || state.specifications.specType)) {
    const specTypeLabel = state.specifications.specType === 'standard' ? 'Standard Build' : state.specifications.specType === 'customer' ? 'Customer Specifications' : '';
    const specData = [['Item','Detail']];
    if (specTypeLabel) specData.push(['Specification Type', specTypeLabel]);
    if (state.specifications.content) {
      const specLines = state.specifications.content.split('\n').filter(l => l.trim());
      specLines.forEach(line => {
        const match = line.match(/^(\d+)\.\s*(.+)/);
        if (match) { specData.push([match[1], match[2]]); }
        else { specData.push(['', line]); }
      });
    }
    XLSX.utils.book_append_sheet(wb, buildSheet(specData, 'keyvalue', {sectionTitle:'Specifications'}), 'Specifications');
  }

  if (state.termsAndConditions && state.termsAndConditions.content) {
    const tcLines = state.termsAndConditions.content.split('\n').filter(l => l.trim());
    const tcData = [['Topic','Detail']];
    tcLines.forEach(line => {
      const match = line.match(/^([^:]+):\s*(.+)/);
      if (match) { tcData.push([match[1].trim(), match[2].trim()]); }
      else { tcData.push(['', line]); }
    });
    XLSX.utils.book_append_sheet(wb, buildSheet(tcData, 'keyvalue', {sectionTitle:'Terms & Conditions'}), 'Terms & Conditions');
  }

  {
    const qfLabelStyle = {
      font: {name:'Montserrat', sz:10, bold:true, color:{rgb:'343551'}},
      alignment: {horizontal:'left', vertical:'center'}
    };
    const qfLinkStyle = {
      font: {name:'Roboto', sz:10, color:{rgb:'E54102'}, underline:true},
      alignment: {horizontal:'left', vertical:'center'}
    };
    // Resolve DC URLs for sheet footers
    var sheetQUrl = xlQUrl;
    var sheetPUrl = xlPUrl;
    for (let si = 0; si < wb.SheetNames.length; si++) {
      if (wb.SheetNames[si] === 'Cover') continue;
      const sheet = wb.Sheets[wb.SheetNames[si]];
      const range = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
      var footRow = range.e.r + 3;
      if (xlQuotesUrl) {
        var fqlAddr = XLSX.utils.encode_cell({r:footRow, c:0});
        var fqvAddr = XLSX.utils.encode_cell({r:footRow, c:1});
        sheet[fqlAddr] = {v:'Quotes DC:', t:'s', s:qfLabelStyle};
        sheet[fqvAddr] = {v:'Open Quotes DC', t:'s', s:{...qfLinkStyle, font:{...qfLinkStyle.font, color:{rgb:ORANGE}}}, l:{Target:sheetQUrl, Tooltip:'Open Quotes DC'}};
        range.e.r = footRow;
        footRow++;
      }
      if (xlProjectsUrl && xlOpp) {
        var fplAddr = XLSX.utils.encode_cell({r:footRow, c:0});
        var fpvAddr = XLSX.utils.encode_cell({r:footRow, c:1});
        sheet[fplAddr] = {v:'Projects DC:', t:'s', s:qfLabelStyle};
        sheet[fpvAddr] = {v:'Open Projects DC', t:'s', s:{...qfLinkStyle, font:{...qfLinkStyle.font, color:{rgb:BLURPLE}}}, l:{Target:sheetPUrl, Tooltip:'Open Projects DC'}};
        range.e.r = footRow;
        footRow++;
      }
      sheet['!ref'] = XLSX.utils.encode_range(range);
      if (!sheet['!rows']) sheet['!rows'] = [];
      while (sheet['!rows'].length <= range.e.r) sheet['!rows'].push({});
      sheet['!rows'][range.e.r] = {hpt: 24};
    }
  }

  // ======= ATTACHMENTS SHEET =======
  var atts = attachments || [];
  if (atts.length > 0) {
    var attAoa = [
      ['Attached Files'],
      [''],
      ['File Name', 'Type', 'Size', 'Date Uploaded', 'Download Link']
    ];
    atts.forEach(function(att) {
      var ext = (att.file_name || '').split('.').pop().toUpperCase();
      var size = att.file_size ? (att.file_size < 1048576 ? (att.file_size / 1024).toFixed(0) + ' KB' : (att.file_size / 1048576).toFixed(1) + ' MB') : '';
      var uploadDate = att.created_at ? new Date(att.created_at).toLocaleDateString() : '';
      attAoa.push([att.file_name, ext, size, uploadDate, 'Download']);
    });

    var wsAtt = XLSX.utils.aoa_to_sheet(attAoa);
    // Style the title
    wsAtt[XLSX.utils.encode_cell({r:0,c:0})] = {v:'Attached Files', t:'s', s:{font:{name:'Montserrat',bold:true,sz:14,color:{rgb:BLURPLE}}, alignment:{horizontal:'left'}}};
    // Style headers row (row index 2)
    for (var hci = 0; hci < 5; hci++) {
      var hAddr = XLSX.utils.encode_cell({r:2, c:hci});
      if (wsAtt[hAddr]) {
        wsAtt[hAddr].s = {font:{name:'Montserrat',bold:true,sz:11,color:{rgb:'FFFFFF'}}, fill:{fgColor:{rgb:ORANGE}}, alignment:{horizontal:'center'}, border:{bottom:{style:'medium',color:{rgb:BLURPLE}}}};
      }
    }
    // Style data rows and add hyperlinks
    for (var ari = 0; ari < atts.length; ari++) {
      var dataRow = ari + 3;
      var bgFill = ari % 2 === 1 ? {fgColor:{rgb:'F5F5F5'}} : undefined;
      var rowStyle = {font:{name:'Roboto',sz:11,color:{rgb:'5F5F5F'}}, alignment:{horizontal:'left'}};
      if (bgFill) rowStyle.fill = bgFill;
      for (var aci = 0; aci < 5; aci++) {
        var cellAddr = XLSX.utils.encode_cell({r:dataRow, c:aci});
        if (wsAtt[cellAddr]) {
          wsAtt[cellAddr].s = Object.assign({}, rowStyle, aci === 2 || aci === 3 ? {alignment:{horizontal:'center'}} : {});
        }
      }
      // Add hyperlink to the "Download" cell
      var dlAddr = XLSX.utils.encode_cell({r:dataRow, c:4});
      var dlUrl = atts[ari]._signedUrl || '';
      if (dlUrl && wsAtt[dlAddr]) {
        wsAtt[dlAddr].l = {Target: dlUrl, Tooltip: 'Download ' + atts[ari].file_name};
        wsAtt[dlAddr].s = {font:{name:'Roboto',sz:11,color:{rgb:ORANGE},bold:true,underline:true}, alignment:{horizontal:'center'}};
        if (bgFill) wsAtt[dlAddr].s.fill = bgFill;
      }
    }
    // Auto-size column widths based on content
    var attColMins = [20, 8, 10, 14, 18];
    var attColMaxs = [60, 15, 15, 20, 25];
    var attColWidths = [];
    for (var aci2 = 0; aci2 < 5; aci2++) {
      var maxLen = attColMins[aci2];
      for (var ari2 = 0; ari2 < attAoa.length; ari2++) {
        var cellVal = attAoa[ari2][aci2] != null ? String(attAoa[ari2][aci2]) : '';
        var effLen = ari2 <= 2 ? Math.ceil(cellVal.length * 1.15) : cellVal.length;
        if (effLen + 4 > maxLen) maxLen = effLen + 4;
      }
      attColWidths.push({wch: Math.min(maxLen, attColMaxs[aci2])});
    }
    wsAtt['!cols'] = attColWidths;
    // Row heights
    wsAtt['!rows'] = [{hpt:24},{hpt:10},{hpt:24}];
    for (var rhi = 0; rhi < atts.length; rhi++) wsAtt['!rows'].push({hpt:20});
    XLSX.utils.book_append_sheet(wb, wsAtt, 'Attachments');
  }

  XLSX.writeFile(wb, `OneDoc_${(state.rfq.customerName || 'export').replace(/[^a-zA-Z0-9 ]/g,'')}_${dateStr}.xlsx`);
}

function exportPDF(state, attachments) { window.doExportPDF(state, attachments); }

function Sidebar({ state, setState, collapsed, setCollapsed, mobileOpen, setMobileOpen, currentProjectName, onNewProject }) {
  const { activeTab, rfq } = state;
  const isDashboard = activeTab === 'dashboard' || activeTab === 'machine-admin' || activeTab === 'revisions';

  // Group machines by model for sidebar display
  const activeMachines = rfq.machines.filter(m => m.selectedModel);
  const machineGroups = {};
  activeMachines.forEach(m => {
    if (!machineGroups[m.selectedModel]) machineGroups[m.selectedModel] = [];
    machineGroups[m.selectedModel].push(m);
  });
  const machineTabs = Object.keys(machineGroups).map(model => {
    const slots = machineGroups[model];
    if (slots.length === 1) {
      return { id: `machine-${slots[0].slotNumber}`, label: model, icon: 'machine' };
    }
    return {
      id: `machine-group-${model}`,
      label: `${model} (${slots.length})`,
      icon: 'machine',
      isGroup: true,
      subItems: slots.map((s, i) => ({
        id: `machine-${s.slotNumber}`,
        label: `Unit ${i + 1}`,
        icon: 'machine',
      })),
    };
  });
  // Track which machine groups are expanded
  const [expandedMachineGroups, setExpandedMachineGroups] = React.useState({});

  // Dashboard-context sidebar: quick actions relevant when not inside a OneDoc
  const dashboardNavGroups = [
    {
      label: '',
      items: [
        { id: 'dashboard', label: 'Dashboard', icon: 'dashboard' },
      ]
    },
    {
      label: 'QUICK ACTIONS',
      items: [
        { id: '__new_project__', label: 'New OneDoc', icon: 'rfq', action: onNewProject },
      ]
    },
    {
      label: 'ADMIN',
      items: [
        { id: 'revisions', label: 'Revision History', icon: 'revisions' },
        { id: 'machine-admin', label: 'Machine Setup', icon: 'settings' },
      ]
    },
  ];

  // Project-context sidebar: full navigation for working inside a OneDoc
  const projectNavGroups = [
    {
      label: '',
      items: [
        { id: 'dashboard', label: 'Dashboard', icon: 'dashboard' },
      ]
    },
    {
      label: 'OVERVIEW',
      items: [
        { id: 'rfq', label: 'Primary Info & Summary', icon: 'rfq' },
      ]
    },
    machineTabs.length > 0 && {
      label: 'EQUIPMENT',
      items: machineTabs
    },
    {
      label: 'DATA',
      items: [
        { id: 'cpp', label: 'Case / Product / Pallet', icon: 'cpp' },
        { id: 'facility', label: 'Facility Info', icon: 'facility' },
      ]
    },
    {
      label: 'DOCUMENTS',
      items: [
        { id: 'specs', label: 'Specifications', icon: 'specs' },
        { id: 'tandc', label: 'Terms & Conditions', icon: 'tandc' },
      ].filter(Boolean)
    },
    {
      label: 'COMMERCIAL',
      items: [
        { id: 'booking', label: 'Booking Details', icon: 'booking' },
      ]
    },
    {
      label: 'ADMIN',
      items: [
        { id: 'revisions', label: 'Revision History', icon: 'revisions' },
        { id: 'machine-admin', label: 'Machine Setup', icon: 'settings' },
      ]
    },
  ].filter(Boolean).filter(g => g.items && g.items.length > 0);

  const navGroups = isDashboard ? dashboardNavGroups : projectNavGroups;

  function navigate(tabId, action) {
    if (action) {
      action();
      setMobileOpen(false);
      return;
    }
    // Re-lock admin areas whenever switching tabs
    __adminUnlocked = false;
    setState(p => ({...p, activeTab: tabId}));
    setMobileOpen(false);
  }

  const isExpanded = !collapsed;

  return (
    <>
      {/* Mobile overlay */}
      {mobileOpen && (
        <div className="mobile-overlay no-print" onClick={() => setMobileOpen(false)} />
      )}

      <aside
        className={`sidebar sidebar-transition no-print ${mobileOpen ? 'mobile-open' : ''} ${isExpanded ? 'sidebar-expanded' : 'sidebar-collapsed'}`}
        style={{background: '#343551'}}
      >
        {/* Sidebar Header */}
        <div className="flex items-center justify-between px-3 py-3 border-b border-white/10" style={{minHeight:'56px'}}>
          {isExpanded ? (
            <div className="flex items-center gap-2.5 overflow-hidden">
              <img
                src="assets/logos/horizontal-dark-bg.png"
                alt="Pearson Packaging Systems"
                className="h-6 flex-shrink-0"
                style={{maxWidth:'130px', objectFit:'contain'}}
              />
            </div>
          ) : (
            <div className="flex items-center justify-center w-full">
              <img
                src="assets/logos/icon-logo.png"
                alt="Pearson"
                className="h-6 w-6 object-contain"
              />
            </div>
          )}
          {/* Collapse toggle — desktop only */}
          <button
            onClick={() => setCollapsed(!collapsed)}
            className="hidden lg:flex items-center justify-center w-6 h-6 rounded text-white/40 hover:text-white hover:bg-white/10 transition-colors flex-shrink-0 ml-1"
            title={collapsed ? 'Expand sidebar' : 'Collapse sidebar'}
          >
            {collapsed ? <Icons.chevronRight /> : <Icons.chevronLeft />}
          </button>
        </div>

        {/* App name badge (expanded only) */}
        {isExpanded && (
          <div className="px-3 pt-3 pb-1">
            <div className="flex items-center gap-2">
              <span className="font-heading font-bold text-white text-sm tracking-tight">OneDoc</span>
            </div>
            {isDashboard ? (
              <p className="text-[11px] font-body text-white/40 mt-0.5">Welcome back</p>
            ) : currentProjectName ? (
              <p className="text-[11px] font-body text-white/50 mt-0.5 truncate" title={currentProjectName}>{currentProjectName}</p>
            ) : (
              <p className="text-[11px] font-body text-white/30 mt-0.5">New OneDoc</p>
            )}
          </div>
        )}

        {/* Navigation */}
        <nav className="px-2 py-2 flex-1">
          {navGroups.map((group, gi) => (
            <div key={gi} className="mb-3">
              {/* Group label */}
              {isExpanded && group.label && (
                <div className="px-2 py-1 mb-1">
                  <span className="text-[10px] font-body font-medium text-white/40 tracking-widest uppercase"
                    style={{letterSpacing:'0.07em'}}>
                    {group.label}
                  </span>
                </div>
              )}
              {!isExpanded && gi > 0 && (
                <div className="mx-2 mb-2 border-t border-white/10" />
              )}

              {/* Nav items */}
              {group.items.map(item => {
                if (item.isGroup) {
                  const groupExpanded = expandedMachineGroups[item.id];
                  const hasActiveSub = item.subItems && item.subItems.some(si => activeTab === si.id);
                  const IconComp = Icons[item.icon];
                  return (
                    <React.Fragment key={item.id}>
                      <button
                        onClick={() => setExpandedMachineGroups(prev => ({...prev, [item.id]: !prev[item.id]}))}
                        title={!isExpanded ? item.label : undefined}
                        className={`nav-item w-full flex items-center rounded-btn mb-0.5 transition-all
                          ${isExpanded ? 'gap-2.5 px-2 py-2' : 'justify-center px-1 py-2.5'}
                          ${hasActiveSub ? 'nav-item-active text-white' : 'nav-item-inactive text-white/65 hover:text-white'}`}
                      >
                        <span className={`flex-shrink-0 ${hasActiveSub ? 'text-p-orange' : 'text-white/60'}`} style={{color: hasActiveSub ? '#e54102' : undefined}}>
                          {IconComp && <IconComp />}
                        </span>
                        {isExpanded && (
                          <span className="font-body text-[13px] font-medium truncate text-left leading-snug flex-1">
                            {item.label}
                          </span>
                        )}
                        {isExpanded && (
                          <span className="text-white/40 flex-shrink-0 transition-transform" style={{transform: groupExpanded ? 'rotate(90deg)' : 'rotate(0deg)', transition:'transform 0.15s'}}>
                            <Icons.chevronRight />
                          </span>
                        )}
                      </button>
                      {(groupExpanded || hasActiveSub) && item.subItems.map(sub => {
                        const subActive = activeTab === sub.id;
                        return (
                          <button
                            key={sub.id}
                            onClick={() => navigate(sub.id)}
                            title={!isExpanded ? sub.label : undefined}
                            className={`nav-item w-full flex items-center rounded-btn mb-0.5 transition-all
                              ${isExpanded ? 'gap-2.5 py-1.5' : 'justify-center px-1 py-2'}
                              ${subActive ? 'nav-item-active text-white' : 'nav-item-inactive text-white/50 hover:text-white'}`}
                            style={isExpanded ? {paddingLeft:'2.5rem', paddingRight:'0.5rem'} : undefined}
                          >
                            {isExpanded && (
                              <span className={`w-1 h-1 rounded-full flex-shrink-0 ${subActive ? 'bg-p-orange' : 'bg-white/30'}`} />
                            )}
                            {isExpanded && (
                              <span className="font-body text-[12px] font-medium truncate text-left leading-snug">
                                {sub.label}
                              </span>
                            )}
                            {!isExpanded && (
                              <span className={`flex-shrink-0 ${subActive ? 'text-p-orange' : 'text-white/60'}`} style={{color: subActive ? '#e54102' : undefined}}>
                                <Icons.machine />
                              </span>
                            )}
                          </button>
                        );
                      })}
                    </React.Fragment>
                  );
                }
                const isActive = activeTab === item.id;
                const IconComp = Icons[item.icon];
                return (
                  <button
                    key={item.id}
                    onClick={() => navigate(item.id, item.action)}
                    title={!isExpanded ? item.label : undefined}
                    className={`nav-item w-full flex items-center rounded-btn mb-0.5 transition-all
                      ${isExpanded ? 'gap-2.5 px-2 py-2' : 'justify-center px-1 py-2.5'}
                      ${isActive ? 'nav-item-active text-white' : 'nav-item-inactive text-white/65 hover:text-white'}`}
                  >
                    <span className={`flex-shrink-0 ${isActive ? 'text-p-orange' : 'text-white/60'}`} style={{color: isActive ? '#e54102' : undefined}}>
                      {IconComp && <IconComp />}
                    </span>
                    {isExpanded && (
                      <span className="font-body text-[13px] font-medium truncate text-left leading-snug">
                        {item.label}
                      </span>
                    )}
                  </button>
                );
              })}
            </div>
          ))}
        </nav>

        {/* Sidebar footer */}
        <div className="border-t border-white/10 px-3 py-3">
          {isExpanded ? (
            <div className="text-[10px] font-body text-white/30 leading-relaxed">
              <p>8120 W Sunset Hwy</p>
              <p>Spokane, WA 99224</p>

            </div>

            <div className="flex justify-center">
              <img src="assets/logos/icon-logo.png" alt="" className="h-4 w-4 object-contain opacity-30" />
            </div>
          )}

          {isExpanded ? (
            <button
              onClick={() => supabaseClient.auth.signOut()}
              className="w-full flex items-center gap-2 px-3 py-2 text-xs font-body text-white/40 hover:text-white/80 hover:bg-white/5 rounded transition-colors mt-1"
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Sign Out
            </button>
          ) : (
            <button
              onClick={() => supabaseClient.auth.signOut()}
              className="w-full flex items-center justify-center py-2 text-white/40 hover:text-white/80 hover:bg-white/5 rounded transition-colors mt-1"
              title="Sign Out"
            >
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
          )}
        </div>
      </aside>
    </>
  );
}

function TopBar({ state, setState, mobileOpen, setMobileOpen, currentProjectId, currentProjectName, isDirty, autoSaving, onNewProject, onOpenAttachments, attachmentCount, dashboardSearch, setDashboardSearch }) {
  const [exportMenuOpen, setExportMenuOpen] = React.useState(false);

  // Page title lookup
  const { activeTab, rfq } = state;
  function getPageTitle() {
    switch(activeTab) {
      case 'dashboard': return 'Dashboard';
      case 'rfq': return 'Primary Info & Summary';
      case 'cpp': return 'Case / Product / Pallet';
      case 'facility': return 'Facility Info';
      case 'specs': return 'Specifications';
      case 'booking': return 'Booking Details';
      case 'tandc': return 'Terms & Conditions';
      case 'revisions': return 'Revision History';
      case 'machine-admin': return 'Machine Setup';
      default:
        if (activeTab && activeTab.startsWith('machine-')) {
          const slotNum = parseInt(activeTab.split('-')[1]);
          const machine = rfq.machines.find(m => m.slotNumber === slotNum);
          return machine ? `#${slotNum} - ${machine.selectedModel}` : `Machine #${slotNum}`;
        }
        return 'OneDoc';
    }
  }

  // Close export menu on outside click
  React.useEffect(() => {
    if (!exportMenuOpen) return;
    const close = () => setExportMenuOpen(false);
    document.addEventListener('click', close);
    return () => document.removeEventListener('click', close);
  }, [exportMenuOpen]);

  return (
    <header className="topbar bg-white border-b border-gray-200 no-print" style={{height:'56px'}}>
      <div className="flex items-center h-full px-4 gap-3">
        {/* Mobile hamburger */}
        <button
          onClick={() => setMobileOpen(!mobileOpen)}
          className="lg:hidden flex-shrink-0 w-10 h-10 rounded flex items-center justify-center text-p-gray hover:bg-p-alt transition-colors"
          aria-label="Toggle navigation"
        >
          {mobileOpen ? <Icons.close /> : <Icons.menu />}
        </button>

        {/* Page title */}
        <h1 className="font-heading font-semibold text-p-blurple truncate flex-shrink-0" style={{fontSize:'15px'}}>
          {getPageTitle()}
        </h1>

        {/* Project indicator — hidden on dashboard */}
        {activeTab !== 'dashboard' && <div className="hidden sm:flex items-center gap-1.5 flex-shrink-0 px-2.5 py-1 rounded bg-p-alt border border-gray-200">
          {(() => { var cPct = calculateCompletion(state); return cPct !== null && cPct !== undefined ? React.createElement(CompletionRing, { percent: cPct, size: 28, strokeWidth: 2.5 }) : null; })()}
          <span className="text-[9px] font-heading font-semibold text-p-gray/50 uppercase tracking-wider">PROJECT</span>
          <span className="text-xs font-heading font-semibold text-p-blurple truncate" style={{maxWidth:'140px'}}>
            {currentProjectName ? currentProjectName : 'New OneDoc'}
          </span>
          {autoSaving ? (
            <span className="flex items-center gap-1 flex-shrink-0" title="Syncing...">
              <svg className="animate-spin h-3 w-3 text-p-teal" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4" fill="none"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/></svg>
            </span>
          ) : currentProjectId ? (
            <span className="flex items-center gap-1 flex-shrink-0" title="Synced to cloud">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#42725e" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/><polyline points="10 15 12 17 16 13"/></svg>
            </span>
          ) : null}
        </div>}

        {/* New OneDoc button */}
        <button
          onClick={onNewProject}
          title="New OneDoc"

function PageToolbar({ state, setState, onResetProject }) {
  const [confirmAction, setConfirmAction] = React.useState(null);
  const timerRef = React.useRef(null);
  const [undoSnapshot, setUndoSnapshot] = React.useState(null); // { type, snapshot }
  const undoTimerRef = React.useRef(null);

  React.useEffect(() => {
    if (confirmAction) {
      timerRef.current = setTimeout(() => setConfirmAction(null), 4000);
      return () => clearTimeout(timerRef.current);
    }
  }, [confirmAction]);

  // Auto-dismiss undo toast after 10 seconds
  React.useEffect(() => {
    if (undoSnapshot) {
      undoTimerRef.current = setTimeout(() => setUndoSnapshot(null), 10000);
      return () => clearTimeout(undoTimerRef.current);
    }
  }, [undoSnapshot]);

  function handleClearPage() {
    if (confirmAction === 'page') {
      // Snapshot current state before clearing
      const snapshot = JSON.parse(JSON.stringify(state));
      setState(p => ({ ...p, ...getBlankStateForPage(p.activeTab, p) }));
      setUndoSnapshot({ type: 'page', snapshot });
      setConfirmAction(null);
    } else {
      setConfirmAction('page');
    }
  }

  function handleClearAll() {
    if (confirmAction === 'all') {
      // Snapshot current state before clearing
      const snapshot = JSON.parse(JSON.stringify(state));
      setState(p => ({ ...p, ...getBlankStateForAll(p) }));
      if (onResetProject) onResetProject();
      setUndoSnapshot({ type: 'all', snapshot });
      setConfirmAction(null);
    } else {
      setConfirmAction('all');
    }
  }

  function handleUndo() {
    if (!undoSnapshot) return;
    setState(p => ({ ...p, ...undoSnapshot.snapshot }));
    setUndoSnapshot(null);
  }

  function handleCancel() { setConfirmAction(null); }

  const pageBtnClass = confirmAction === 'page'
    ? 'bg-p-red text-white border-p-red'
    : 'bg-white text-p-gray border-gray-200 hover:border-p-light hover:text-p-charcoal';
  const allBtnClass = confirmAction === 'all'
    ? 'bg-p-red text-white border-p-red'
    : 'bg-white text-p-gray border-gray-200 hover:border-p-light hover:text-p-charcoal';

  return (
    <>
    {/* Undo toast */}
    {undoSnapshot && (
      <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex items-center gap-3 px-5 py-3 rounded-card shadow-lg border border-p-blurple/20 no-print" style={{background:'#343551'}}>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e54102" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        <span className="text-sm font-body text-white">
          {undoSnapshot.type === 'page' ? 'Page cleared.' : 'All data cleared.'}
        </span>
        <button
          onClick={handleUndo}
          className="px-3 py-1 text-xs font-heading font-bold text-p-orange hover:text-white bg-white/10 hover:bg-p-orange rounded-btn transition-colors"
        >
          Undo
        </button>
        <button
          onClick={() => setUndoSnapshot(null)}
          className="text-white/40 hover:text-white transition-colors ml-1"
          title="Dismiss"
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    )}
    <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-2 mb-5 no-print">
      {/* Spacer */}
      <div className="flex-1 hidden sm:block" />

      {/* Clear buttons */}
      <div className="flex items-center gap-1.5 flex-shrink-0">
        {confirmAction && (
          <button onClick={handleCancel}
            className="px-2.5 py-1.5 text-xs font-heading font-semibold text-p-gray border border-gray-200 rounded bg-white hover:bg-p-alt transition-colors">
            Cancel
          </button>
        )}
        <button onClick={handleClearPage}
          className={`px-3 py-1.5 text-xs font-heading font-semibold border rounded transition-all ${pageBtnClass}`}>
          {confirmAction === 'page' ? 'Confirm Clear Page' : 'Clear Page'}
        </button>
        <button onClick={handleClearAll}
          className={`px-3 py-1.5 text-xs font-heading font-semibold border rounded transition-all ${allBtnClass}`}>
          {confirmAction === 'all' ? 'Confirm Clear All' : 'Clear All'}
        </button>
      </div>
    </div>
    </>
  );
}

// Helper: get/set Gemini API key from Supabase (org-wide, persists across cache clears)
var __geminiKeyCache = null; // in-memory cache
var __geminiKeyLoaded = false;

async function loadGeminiKey() {
  if (__geminiKeyLoaded) return __geminiKeyCache || '';
  try {
    var { data, error } = await supabaseClient
      .from('app_settings')
      .select('gemini_api_key')
      .eq('id', 'default')
      .single();
    if (!error && data && data.gemini_api_key) {
      __geminiKeyCache = data.gemini_api_key;
    } else {
      // Migrate from localStorage if exists (one-time)
      var localKey = '';
      try { localKey = localStorage.getItem('onedoc-gemini-key') || ''; } catch(e) {}
      if (localKey) {
        __geminiKeyCache = localKey;
        // Push to Supabase in background
        setGeminiKey(localKey).then(function() {
          try { localStorage.removeItem('onedoc-gemini-key'); } catch(e) {}
        });
      } else {
        __geminiKeyCache = '';
      }
    }
  } catch(e) {
    // Fallback to localStorage if Supabase fails
    try { __geminiKeyCache = localStorage.getItem('onedoc-gemini-key') || ''; } catch(ex) { __geminiKeyCache = ''; }
  }
  __geminiKeyLoaded = true;
  return __geminiKeyCache || '';
}

function getGeminiKey() {
  return __geminiKeyCache || '';
}

async function setGeminiKey(key) {
  __geminiKeyCache = key;
  __geminiKeyLoaded = true;
  try {
    var user = (await supabaseClient.auth.getUser()).data.user;
    await supabaseClient
      .from('app_settings')
      .update({ gemini_api_key: key, updated_by: user ? user.id : null })
      .eq('id', 'default');
  } catch(e) {
    console.error('Failed to save API key to database:', e);
  }
}

// Build the AI prompt from project data
function buildAIPrompt(state) {
  var rfq = state.rfq || {};
  var cpp = state.caseProductPallet || {};
  var facility = state.facilityInfo || {};
  var booking = state.booking || {};
  var specs = state.specifications || {};
  var tandc = state.termsAndConditions || {};

  var sections = [];

  // --- Customer & Opportunity ---
  sections.push('## Customer & Opportunity');
  if (rfq.customerName) sections.push('- Company: ' + rfq.customerName);
  if (rfq.opportunityNumber) sections.push('- Opportunity Number: ' + rfq.opportunityNumber);
  if (rfq.quoteType) sections.push('- Quote Type: ' + rfq.quoteType);
  if (rfq.rfqRevisionNumber) sections.push('- RFQ Revision: ' + rfq.rfqRevisionNumber);
  if (rfq.rsmName) sections.push('- RSM: ' + rfq.rsmName);
  if (rfq.quoteContact) sections.push('- Quote Contact: ' + rfq.quoteContact);
  if (rfq.contactPhone) sections.push('- Contact Phone: ' + rfq.contactPhone);
  if (rfq.contactEmail) sections.push('- Contact Email: ' + rfq.contactEmail);
  if (rfq.plantLocation) sections.push('- Plant Location: ' + rfq.plantLocation);
  if (rfq.country) sections.push('- Country: ' + rfq.country);
  if (rfq.partnerName) sections.push('- Partner: ' + rfq.partnerName);
  if (rfq.partnerAdjustPercent) sections.push('- Partner Adjustment: ' + rfq.partnerAdjustPercent + '%');
  if (state.integrationLevel) sections.push('- Integration Level: ' + state.integrationLevel);
  if (rfq.projectSummary) sections.push('- Project Notes: ' + rfq.projectSummary);

  // --- Equipment Scope (Machines) ---
  var machines = (rfq.machines || []).filter(function(m) { return m.selectedModel; });
  if (machines.length > 0) {
    sections.push('\n## Equipment Scope (' + machines.length + ' machine' + (machines.length > 1 ? 's' : '') + ')');
    machines.forEach(function(m) {
      sections.push('\n### Machine Slot #' + m.slotNumber + ': ' + m.selectedModel);
      if (m.configuration && typeof m.configuration === 'object') {
        var config = m.configuration;
        // Machine Construction
        var mc = config.machineConstruction || config.machineConstruction || {};
        if (mc.constructionLevel) sections.push('- Construction: ' + mc.constructionLevel);
        if (mc.operatorStation) sections.push('- Operator Station: ' + mc.operatorStation);
        if (mc.mainElectricalEnclosureLocation) sections.push('- Electrical Enclosure Location: ' + mc.mainElectricalEnclosureLocation);
        if (mc.electricalEnclosureNEMARating) sections.push('- NEMA Rating: ' + mc.electricalEnclosureNEMARating);
        if (mc.voltageOption) sections.push('- Voltage: ' + mc.voltageOption);
        if (mc.airSupply) sections.push('- Air Supply: ' + mc.airSupply);
        if (mc.caseType) sections.push('- Case Type: ' + mc.caseType);
        if (mc.caseHand) sections.push('- Case Hand: ' + mc.caseHand);
        if (mc.magazineOrientation) sections.push('- Magazine Orientation: ' + mc.magazineOrientation);
        if (mc.magazineLength) sections.push('- Magazine Length: ' + mc.magazineLength);
        // Construction level (alternate location for some machines)
        if (config.constructionLevel) sections.push('- Construction: ' + config.constructionLevel);
        if (config.voltageRequirement) sections.push('- Voltage: ' + config.voltageRequirement);
        // Machine Speed
        if (config.machineSpeed && config.machineSpeed.casesPerMinute) sections.push('- Speed: ' + config.machineSpeed.casesPerMinute + ' CPM');
        // Case Style (if object)
        if (config.caseStyle && typeof config.caseStyle === 'object') {
          if (config.caseStyle.caseCornerStyle) sections.push('- Case Corner Style: ' + config.caseStyle.caseCornerStyle);
        } else if (config.caseStyle) {
          sections.push('- Case Style: ' + config.caseStyle);
        }
        // Seal / Glue
        if (config.sealMethod) sections.push('- Seal Method: ' + config.sealMethod);
        if (config.glueSpecs && config.glueSpecs.glueLocation) sections.push('- Glue Location: ' + config.glueSpecs.glueLocation);
        // Discharge
        if (config.dischargeCaseConveyor) {
          if (config.dischargeCaseConveyor.dischargeElevation) sections.push('- Discharge Elevation: ' + config.dischargeCaseConveyor.dischargeElevation + ' in.');
          if (config.dischargeCaseConveyor.conveyorOptions) sections.push('- Discharge Options: ' + config.dischargeCaseConveyor.conveyorOptions);
        }
        // Infeed
        if (config.infeedInformation && config.infeedInformation.caseOrientation) sections.push('- Infeed Case Orientation: ' + config.infeedInformation.caseOrientation);
        if (config.infeedDischargeCaseConveyor) {
          if (config.infeedDischargeCaseConveyor.caseConveyorElevation) sections.push('- Conveyor Elevation: ' + config.infeedDischargeCaseConveyor.caseConveyorElevation + ' in.');
          if (config.infeedDischargeCaseConveyor.elevation) sections.push('- Elevation: ' + config.infeedDischargeCaseConveyor.elevation + ' in.');
        }
        if (config.infeedData && config.infeedData.existingConveyorSpeed) sections.push('- Existing Conveyor Speed: ' + config.infeedData.existingConveyorSpeed);
        // Robot Info
        if (config.robotInformation && config.robotInformation.robotControllerLocation) sections.push('- Robot Controller Location: ' + config.robotInformation.robotControllerLocation);
        // Controls Integration
        if (config.controlsIntegration && config.controlsIntegration.specificRequirements) sections.push('- Controls Requirements: ' + config.controlsIntegration.specificRequirements);
        if (config.lineControlSignals) sections.push('- Line Control Signals: ' + config.lineControlSignals);
        // Integration level on config
        if (config.integrationLevel) sections.push('- Integration: ' + config.integrationLevel);
        if (config.casesPerMinute) sections.push('- Speed: ' + config.casesPerMinute + ' CPM');
        // Controls Scope Items
        if (config.items && Array.isArray(config.items)) {
          var scopeItems = config.items.filter(function(it) { return it.description || it.controlsScope; });
          if (scopeItems.length > 0) {
            sections.push('- Controls Scope:');
            scopeItems.forEach(function(it) {
              sections.push('  - #' + it.itemNumber + ': ' + (it.type || '') + ' ' + (it.description || '') + (it.controlsScope ? ' [' + it.controlsScope + ']' : ''));
            });
          }
        }
      }
    });
  }

  // --- Case Information ---
  var units = cpp.measurementUnit || 'inches';
  var wUnits = cpp.weightUnit || 'lbs';
  var caseRows = (cpp.caseRows || []).filter(function(r) { return r.description || r.caseStyle || r.length; });
  if (caseRows.length > 0) {
    sections.push('\n## Case Information (' + units + ' / ' + wUnits + ')');
    caseRows.forEach(function(r) {
      var line = '- Case ' + r.rowNumber + ': ' + (r.description || '(no desc)');
      if (r.caseStyle) line += ', Style: ' + r.caseStyle;

  }

  // --- Project Status Flags ---
  sections.push('\n## Project Status');

  if (flags.length > 0) {
    sections.push('- ' + flags.join(', '));
  }

  return 'Generate a comprehensive, detailed executive summary for this Pearson Packaging Systems project. Use ALL of the data provided below to create a thorough overview:\n\n' + sections.join('\n');
}

      }, error),
      React.createElement('textarea', {
        value: summary,
        onChange: function(e) { updateSummary(e.target.value); },
        rows: summary ? Math.max(6, summary.split('\n').length + 2) : 4,
        placeholder: hasData ?
          (hasKey ? 'Click "Generate with AI" to create an executive summary from your project data, or type your own...' :
           'Click the gear icon to add your free Gemini API key, then generate a summary — or type your own...') :
          'Enter project details (company name, machines, etc.) then generate an AI summary, or type your own...',
        className: 'w-full px-3 py-2 border border-gray-200 rounded-btn text-sm font-body text-p-gray resize-y focus:border-p-orange focus:ring-1 focus:ring-p-orange/20 transition-colors',
        style: { outline: 'none', minHeight: '100px', lineHeight: '1.6' }
      }),
      summary && React.createElement('p', {
        className: 'mt-2 text-[10px] font-body text-p-gray/40 italic'
      }, 'AI-generated content — review and edit as needed before using in proposals.')
    )
  );
}
