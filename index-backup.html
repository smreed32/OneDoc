<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<script>
// PDF Export - Professional Pearson-branded report
window.doExportPDF = function(state) {
  setTimeout(function() {
    try {
      var jsPDFClass = window.jspdf.jsPDF;
      if (!jsPDFClass) { alert('PDF library not loaded.'); return; }
      var doc = new jsPDFClass({orientation:'portrait', unit:'pt', format:'letter'});
      var pw = doc.internal.pageSize.getWidth(); // 612
      var ph = doc.internal.pageSize.getHeight(); // 792
      var mx = 48; // margins
      var cw = pw - mx * 2; // content width
      var dateStr = new Date().toISOString().slice(0,10);
      var headerH = 52; // header zone height
      var footerH = 36; // footer zone height
      var bodyTop = headerH + 10;
      var bodyBottom = ph - footerH;

      // Brand colors
      var C_ORANGE = [229, 65, 2];
      var C_BLURPLE = [52, 53, 81];
      var C_GRAY = [95, 95, 95];
      var C_LTGRAY = [190, 190, 190];
      var C_ZEBRA = [245, 245, 245];
      var C_WHITE = [255, 255, 255];

      function sv(v) { return (v == null || v === undefined) ? '' : String(v); }

      function checkPage(y, need) {
        if (y + need > bodyBottom) { doc.addPage(); return bodyTop; }
        return y;
      }

      // Wrap text into lines that fit a given width
      function wrapText(text, maxW, fontSize, fontStyle) {
        doc.setFontSize(fontSize);
        doc.setFont('helvetica', fontStyle || 'normal');
        var raw = sv(text);
        if (!raw) return [''];
        return doc.splitTextToSize(raw, maxW);
      }

      // Section title — orange text with thin orange underline
      function secTitle(title, y) {
        y += 10; // breathing room above section title
        y = checkPage(y, 42);
        doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(C_ORANGE[0],C_ORANGE[1],C_ORANGE[2]);
        doc.text(title.toUpperCase(), mx, y);
        y += 4;
        doc.setDrawColor(C_ORANGE[0],C_ORANGE[1],C_ORANGE[2]); doc.setLineWidth(1.5);
        doc.line(mx, y, mx + cw, y);
        return y + 14;
      }

      // Sub-section title — blurple bold
      function subTitle(title, y) {
        y = checkPage(y, 24);
        doc.setFont('helvetica','bold'); doc.setFontSize(10.5); doc.setTextColor(C_BLURPLE[0],C_BLURPLE[1],C_BLURPLE[2]);
        doc.text(title, mx, y);
        return y + 14;
      }

      // Key-value table with auto-wrapping values AND labels
      function drawKV(pairs, startY) {
        var y = startY;
        var labelW = 155;
        var valW = cw - labelW;
        var lineH = 13; // line height within cells
        var padX = 6;
        var padY = 4;

        // Header row
        y = checkPage(y, 20);
        doc.setFillColor(C_BLURPLE[0],C_BLURPLE[1],C_BLURPLE[2]);
        doc.rect(mx, y, cw, 18, 'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(255,255,255);
        doc.text('Field', mx + padX, y + 12.5);
        doc.text('Value', mx + labelW + padX, y + 12.5);
        y += 18;

        for (var i = 0; i < pairs.length; i++) {
          // Wrap BOTH label and value columns
          var labelLines = wrapText(pairs[i][0], labelW - padX * 2, 8.5, 'bold');
          var valLines = wrapText(pairs[i][1], valW - padX * 2, 8.5, 'normal');
          var maxLines = Math.max(labelLines.length, valLines.length);
          var rowH = Math.max(18, maxLines * lineH + padY * 2);
          y = checkPage(y, rowH);

          // Zebra
          if (i % 2 === 1) { doc.setFillColor(C_ZEBRA[0],C_ZEBRA[1],C_ZEBRA[2]); doc.rect(mx, y, cw, rowH, 'F'); }

          // Borders
          doc.setDrawColor(C_LTGRAY[0],C_LTGRAY[1],C_LTGRAY[2]); doc.setLineWidth(0.4);
          doc.rect(mx, y, labelW, rowH); doc.rect(mx + labelW, y, valW, rowH);

          // Label (wrapped)
          doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(C_BLURPLE[0],C_BLURPLE[1],C_BLURPLE[2]);
          for (var ll = 0; ll < labelLines.length; ll++) {
            doc.text(labelLines[ll], mx + padX, y + padY + lineH * (ll + 1));
          }

          // Value (wrapped)
          doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(C_GRAY[0],C_GRAY[1],C_GRAY[2]);
          for (var vl = 0; vl < valLines.length; vl++) {
            doc.text(valLines[vl], mx + labelW + padX, y + padY + lineH * (vl + 1));
          }
          y += rowH;
        }
        return y + 20;
      }

      // Data table with auto-sized columns and text wrapping
      function drawTable(headers, rows, startY, colWidths) {
        var y = startY;
        var nc = headers.length;
        // Calculate column widths if not provided
        if (!colWidths) {
          colWidths = [];
          for (var ci = 0; ci < nc; ci++) {
            var maxLen = headers[ci].length;
            for (var ri2 = 0; ri2 < rows.length; ri2++) {
              var cellLen = sv(rows[ri2][ci]).length;
              if (cellLen > maxLen) maxLen = cellLen;
            }
            colWidths.push(Math.max(maxLen * 4.2 + 10, 28));
          }
          // Normalize to fit content width
          var totalW = 0; for (var w = 0; w < colWidths.length; w++) totalW += colWidths[w];
          var scale = cw / totalW;
          for (var w2 = 0; w2 < colWidths.length; w2++) colWidths[w2] = colWidths[w2] * scale;
        }

        var padX = 4;
        var lineH = 11;
        var padY = 3;

        // Header
        y = checkPage(y, 20);
        doc.setFillColor(C_BLURPLE[0],C_BLURPLE[1],C_BLURPLE[2]);
        doc.rect(mx, y, cw, 18, 'F');
        doc.setFont('helvetica','bold'); doc.setFontSize(7.5); doc.setTextColor(255,255,255);
        var hx = mx;
        for (var h = 0; h < nc; h++) {
          doc.text(sv(headers[h]), hx + padX, y + 12);
          hx += colWidths[h];
        }
        y += 18;

        // Rows
        for (var r = 0; r < rows.length; r++) {
          // Calculate row height based on wrapping
          var maxLines = 1;
          var cellWrapped = [];
          for (var c = 0; c < nc; c++) {
            var lines = wrapText(rows[r][c], colWidths[c] - padX * 2, 7.5, 'normal');
            cellWrapped.push(lines);
            if (lines.length > maxLines) maxLines = lines.length;
          }
          var rowH = Math.max(16, maxLines * lineH + padY * 2);
          y = checkPage(y, rowH);

          // Zebra
          if (r % 2 === 1) { doc.setFillColor(C_ZEBRA[0],C_ZEBRA[1],C_ZEBRA[2]); doc.rect(mx, y, cw, rowH, 'F'); }

          // Cell borders and text
          doc.setDrawColor(C_LTGRAY[0],C_LTGRAY[1],C_LTGRAY[2]); doc.setLineWidth(0.3);
          var cx = mx;
          for (var c2 = 0; c2 < nc; c2++) {
            doc.rect(cx, y, colWidths[c2], rowH);
            doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(C_GRAY[0],C_GRAY[1],C_GRAY[2]);
            for (var ln = 0; ln < cellWrapped[c2].length; ln++) {
              doc.text(cellWrapped[c2][ln], cx + padX, y + padY + lineH * (ln + 1));
            }
            cx += colWidths[c2];
          }
          y += rowH;
        }
        return y + 20;
      }

      // Long-form text block (for specs & T&Cs)
      function drawTextBlock(text, startY) {
        var y = startY;
        var lines = sv(text).split('\n');
        var lineH = 13;
        doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(C_GRAY[0],C_GRAY[1],C_GRAY[2]);
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (!line) { y += 6; continue; }
          // Detect heading-like lines (all caps or "Topic:" format)
          var isHeading = (line === line.toUpperCase() && line.length > 3 && !/^\d/.test(line));
          var isTopicLine = /^[A-Z][A-Za-z\s]+:/.test(line) && !line.match(/^\d/);
          if (isHeading) {
            y = checkPage(y, 20);
            y += 4;
            doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.setTextColor(C_BLURPLE[0],C_BLURPLE[1],C_BLURPLE[2]);
            doc.text(line, mx, y);
            y += lineH + 2;
          } else if (isTopicLine) {
            y = checkPage(y, 20);
            var colonIdx = line.indexOf(':');
            var topic = line.substring(0, colonIdx + 1);
            var detail = line.substring(colonIdx + 1).trim();
            // Topic in bold blurple
            doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(C_BLURPLE[0],C_BLURPLE[1],C_BLURPLE[2]);
            doc.text(topic, mx + 8, y);
            var topicW = doc.getTextWidth(topic) + 4;
            // Detail in normal gray, wrapped
            doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(C_GRAY[0],C_GRAY[1],C_GRAY[2]);
            var detailLines = doc.splitTextToSize(detail, cw - 8 - topicW);
            if (detailLines.length === 1) {
              doc.text(detail, mx + 8 + topicW, y);
              y += lineH;
            } else {
              // Reflow: put topic on own line, detail below indented
              y += lineH;
              var reflowed = doc.splitTextToSize(detail, cw - 24);
              for (var rl = 0; rl < reflowed.length; rl++) {
                y = checkPage(y, lineH);
                doc.text(reflowed[rl], mx + 24, y);
                y += lineH;
              }
            }
          } else {
            // Normal or numbered line — wrap
            var indent = /^\d+\./.test(line) ? 8 : 0;
            var wrapped = doc.splitTextToSize(line, cw - indent);
            for (var wl = 0; wl < wrapped.length; wl++) {
              y = checkPage(y, lineH);
              doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(C_GRAY[0],C_GRAY[1],C_GRAY[2]);
              doc.text(wrapped[wl], mx + indent, y);
              y += lineH;
            }
          }
        }
        return y + 8;
      }

      // =========== COVER PAGE ===========
      var y = 0;
      // Orange top bar
      doc.setFillColor(C_ORANGE[0],C_ORANGE[1],C_ORANGE[2]);
      doc.rect(0, 0, pw, 10, 'F');

      // Title block
      doc.setFont('helvetica','bold'); doc.setFontSize(32); doc.setTextColor(C_BLURPLE[0],C_BLURPLE[1],C_BLURPLE[2]);
      doc.text('OneDoc', mx, 120);
      doc.setFontSize(14); doc.setTextColor(C_GRAY[0],C_GRAY[1],C_GRAY[2]);
      doc.text('Commercial Documentation Report', mx, 142);

      // Orange accent line
      doc.setDrawColor(C_ORANGE[0],C_ORANGE[1],C_ORANGE[2]); doc.setLineWidth(2.5);
      doc.line(mx, 155, mx + 140, 155);

      // Customer & project info
      var rfq = state.rfq || {};
      doc.setFont('helvetica','bold'); doc.setFontSize(18); doc.setTextColor(C_BLURPLE[0],C_BLURPLE[1],C_BLURPLE[2]);
      doc.text(sv(rfq.customerName), mx, 195);

      doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(C_GRAY[0],C_GRAY[1],C_GRAY[2]);
      var coverY = 220;
      var coverInfo = [
        ['Opportunity #', sv(rfq.opportunityNumber)],
        ['Quote Type', sv(rfq.quoteType)],
        ['RSM', sv(rfq.rsmName)],
        ['Revision', sv(rfq.rfqRevisionNumber)],
        ['Date', dateStr]
      ];
      for (var ci2 = 0; ci2 < coverInfo.length; ci2++) {
        if (coverInfo[ci2][1]) {
          doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.setTextColor(C_BLURPLE[0],C_BLURPLE[1],C_BLURPLE[2]);
          doc.text(coverInfo[ci2][0] + ':', mx, coverY);
          doc.setFont('helvetica','normal'); doc.setTextColor(C_GRAY[0],C_GRAY[1],C_GRAY[2]);
          doc.text(coverInfo[ci2][1], mx + 90, coverY);
          coverY += 16;
        }
      }

      // Project summary
      if (rfq.projectSummary) {
        coverY += 12;
        doc.setFont('helvetica','bold'); doc.setFontSize(9.5); doc.setTextColor(C_BLURPLE[0],C_BLURPLE[1],C_BLURPLE[2]);
        doc.text('Project Summary:', mx, coverY);
        coverY += 14;
        doc.setFont('helvetica','normal'); doc.setFontSize(9.5); doc.setTextColor(C_GRAY[0],C_GRAY[1],C_GRAY[2]);
        var summaryLines = doc.splitTextToSize(sv(rfq.projectSummary), cw);
        for (var sl2 = 0; sl2 < summaryLines.length; sl2++) {
          doc.text(summaryLines[sl2], mx, coverY); coverY += 14;
        }
      }

      // Footer on cover
      doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(C_LTGRAY[0],C_LTGRAY[1],C_LTGRAY[2]);
      doc.text('Pearson Packaging Systems', mx, ph - 48);
      doc.text('8120 W Sunset Hwy, Spokane, WA 99224', mx, ph - 36);
      doc.text('800.732.7766  |  www.PearsonPkg.com', mx, ph - 24);
      doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(C_ORANGE[0],C_ORANGE[1],C_ORANGE[2]);
      doc.text('Real Partners. That Simple.', pw - mx, ph - 24, {align:'right'});

      // =========== RFQ DETAILS ===========
      doc.addPage(); y = bodyTop;
      y = secTitle('RFQ Summary', y);
      y = drawKV([['Customer',rfq.customerName],['Opportunity #',rfq.opportunityNumber],['Quote Type',rfq.quoteType],['RSM',rfq.rsmName],['Revision',rfq.rfqRevisionNumber],['Contact',rfq.quoteContact],['Phone',rfq.contactPhone],['Email',rfq.contactEmail],['Plant Location',rfq.plantLocation],['Partner',rfq.partnerName],['Partner Adjust %',rfq.partnerAdjustPercent],['Integration Level',state.integrationLevel]], y);

      // =========== CASE / PRODUCT / PACKING ===========
      var cpp = state.caseProductPallet || {};
      var cR = (cpp.caseRows||[]).filter(function(r){return r.description;});
      if (cR.length) {
        doc.addPage(); y = bodyTop;
        y = secTitle('Case Data', y);
        y = drawTable(['#','Description','Style','Hand','L','W','D','Open D','KDL','KDW','Rate','Wt','Notes'],
          cR.map(function(r){return [r.rowNumber,r.description,r.caseStyle,r.caseHand,r.length,r.width,r.depth,r.openDepth,r.kdl,r.kdw,r.caseRate,r.caseWeight,r.caseNotes];}), y);
      }
      var pR = (cpp.productRows||[]).filter(function(r){return r.description;});
      if (pR.length) {
        y = checkPage(y, 60);
        y = secTitle('Product Data', y);
        y = drawTable(['#','Description','Weight','L','W','H','Orientation','Notes'],
          pR.map(function(r){return [r.rowNumber,r.description,r.productWeight,r.productLength,r.productWidth,r.productHeight,r.incomingOrientation,r.productNotes];}), y);
      }
      var pkR = (cpp.packingRows||[]).filter(function(r){return r.description;});
      if (pkR.length) {
        y = checkPage(y, 60);
        y = secTitle('Packing Data', y);
        y = drawTable(['#','Description','Pattern','Rows','Cols','Layers','Prod/Case','Notes'],

// ============================================================================
// UTILITY COMPONENTS
// ============================================================================

function Card({ title, children, className="" }) {
  return (
    <div className={`bg-white rounded-card border border-gray-200 shadow-sm ${className}`}>
      {title && (
        <div className="px-4 py-3 border-b border-gray-100">
          <h3 className="font-heading font-semibold text-sm text-p-blurple">{title}</h3>
        </div>
      )}
      <div className="px-4 py-4">{children}</div>
    </div>
  );
}

function FormField({ label, required, children, className="" }) {
  return (
    <div className={`mb-2 ${className}`}>
      <label className="block text-sm font-body font-medium mb-1 text-p-charcoal">
        {label}{required && <span className="text-p-red ml-0.5">*</span>}
      </label>
      {children}
    </div>
  );
}

function TextInput({ value, onChange, placeholder, type="text", required, className="" }) {
  const isEmpty = required && !value;
  return (
    <input
      type={type}
      value={value || ''}
      onChange={e => onChange(e.target.value)}
      placeholder={placeholder}
      className={`w-full px-3 py-2 border rounded-btn text-sm ${isEmpty ? 'border-p-orange' : 'border-p-light'} bg-white ${className}`}
    />
  );
}

function SelectInput({ value, onChange, options, placeholder="Select...", optgroups, className="" }) {
  if (optgroups) {
    return (
      <select value={value||''} onChange={e => onChange(e.target.value||null)} className={`w-full px-3 py-2 border border-p-light rounded-btn text-sm bg-white ${className}`}>
        <option value="">{placeholder}</option>
        {optgroups.map(g => (
          <optgroup key={g.label} label={g.label}>
            {g.options.map(o => <option key={o} value={o}>{o}</option>)}
          </optgroup>
        ))}
      </select>
    );
  }
  return (
    <select value={value||''} onChange={e => onChange(e.target.value||null)} className={`w-full px-3 py-2 border border-p-light rounded-btn text-sm bg-white ${className}`}>
      <option value="">{placeholder}</option>
      {options.map(o => <option key={o} value={o}>{o}</option>)}
    </select>
  );
}

function Toggle({ checked, onChange, label }) {
  return (
    <div className="flex items-center gap-3 py-1.5">
      <div className={`toggle-track ${checked ? 'active' : ''}`} onClick={() => onChange(!checked)}>
        <div className="toggle-thumb"></div>
      </div>
      <span className="text-sm font-body">{label}</span>
    </div>
  );
}

function Btn({ children, onClick, variant="primary", className="", size="md" }) {
  const base = "font-heading font-semibold rounded-btn transition-colors inline-flex items-center gap-2";
  const sizes = { sm:'px-3 py-1.5 text-xs', md:'px-4 py-2 text-sm', lg:'px-6 py-3 text-base' };
  const variants = {
    primary:'bg-p-orange text-white hover:bg-p-orange-hover',
    secondary:'bg-p-alt text-p-gray border border-p-light hover:bg-gray-200',
    danger:'bg-p-red text-white hover:bg-red-700',
    ghost:'text-p-orange hover:underline',
  };
  return <button onClick={onClick} className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}>{children}</button>;
}

  function isNum(v) { return v != null && v !== '' && !isNaN(v); }
  function isNotesCol(hdr) { return hdr && hdr.toLowerCase().includes('notes'); }
  function isCurrencyCol(hdr) { return hdr && (hdr.toLowerCase().includes('dollar') || hdr.toLowerCase().includes('amount') || hdr.toLowerCase().includes('cost') || hdr.toLowerCase().includes('price')); }
  function isPercentCol(hdr) { return hdr && (hdr.includes('%') || hdr.toLowerCase().includes('percent')); }
  function isDimensionCol(hdr) {
    if (!hdr) return false;
    const h = hdr.toLowerCase();
    return h.includes('weight') || h.includes('height') || h.includes('depth') || h.includes('length') || h.includes('width') || h.match(/^[lwhd]\s*\(/);
  }
  function isRateCol(hdr) { return hdr && hdr.toLowerCase().includes('rate'); }
  function withNumFmt(style, fmt) { return {...style, numFmt: fmt}; }

  function applyPerimeterBorders(ws, startRow, endRow, startCol, endCol) {
    for (let ri = startRow; ri <= endRow; ri++) {
      for (let ci = startCol; ci <= endCol; ci++) {
        const addr = XLSX.utils.encode_cell({r:ri, c:ci});
        if (!ws[addr]) { ws[addr] = {v:'', t:'s', s:{border:internalBorders}}; }
        const s = ws[addr].s || {};
        const b = {...(s.border || {})};
        if (ri === startRow) b.top = medBorder;
        if (ri === endRow) b.bottom = medBorder;
        if (ci === startCol) b.left = medBorder;
        if (ci === endCol) b.right = medBorder;
        ws[addr].s = {...s, border: b};
      }
    }
  }

  function buildSheet(aoa, mode, opts) {
    opts = opts || {};
    let rowOffset = 0;
    if (opts.sectionTitle) {
      const blankRow = new Array(aoa[0] ? aoa[0].length : 2).fill('');
      blankRow[0] = opts.sectionTitle;
      aoa = [blankRow, ...aoa];
      rowOffset = 1;
    }
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    const numRows = aoa.length;
    const numCols = aoa[0] ? aoa[0].length : 0;
    if (opts.sectionTitle) {
      if (numCols > 1) {
        if (!ws['!merges']) ws['!merges'] = [];
        ws['!merges'].push({s:{r:0,c:0}, e:{r:0,c:numCols-1}});
      }
      const addr = XLSX.utils.encode_cell({r:0, c:0});
      if (ws[addr]) ws[addr].s = sSectionHeader;
    }
    const headerRowIdx = rowOffset;
    const headers = aoa[headerRowIdx] || [];
    const notesColSet = new Set(opts.notesColumns || []);
    headers.forEach((h, ci) => { if (isNotesCol(h)) notesColSet.add(ci); });

    if (mode === 'table') {
      headers.forEach((_, ci) => {
        const addr = XLSX.utils.encode_cell({r:headerRowIdx, c:ci});
        if (ws[addr]) ws[addr].s = sColHeader;
      });
      for (let ri = headerRowIdx + 1; ri < numRows; ri++) {
        const dataIdx = ri - headerRowIdx;
        const isEven = dataIdx % 2 === 0;
        aoa[ri].forEach((val, ci) => {
          const addr = XLSX.utils.encode_cell({r:ri, c:ci});
          if (!ws[addr]) { ws[addr] = {v:'', t:'s'}; }
          const hdr = headers[ci] || '';
          if (notesColSet.has(ci)) { ws[addr].s = sNotesWhite; return; }
          const numeric = isNum(val);
          if (numeric) {
            let baseStyle = isEven ? sNumZebra : sNumWhite;
            if (isCurrencyCol(hdr)) { ws[addr].s = withNumFmt(baseStyle, '$#,##0.00'); }
            else if (isPercentCol(hdr)) { ws[addr].s = withNumFmt(baseStyle, '0.0%'); }
            else if (isDimensionCol(hdr) || isRateCol(hdr)) { ws[addr].s = withNumFmt(baseStyle, '#,##0.00'); }
            else if (Number.isInteger(Number(val))) { ws[addr].s = withNumFmt(baseStyle, '#,##0'); }
            else { ws[addr].s = withNumFmt(baseStyle, '#,##0.00'); }
          } else {
            ws[addr].s = isEven ? sBodyZebra : sBodyWhite;
          }
        });
      }
      const freezeRow = headerRowIdx + 1;
      ws['!freeze'] = {xSplit:'0', ySplit:String(freezeRow), topLeftCell:'A'+(freezeRow+1), activePane:'bottomLeft', state:'frozen'};
      if (numRows > headerRowIdx + 1) {
        ws['!autofilter'] = {ref: XLSX.utils.encode_range({s:{r:headerRowIdx,c:0}, e:{r:numRows-1, c:numCols-1}})};
      }
    } else if (mode === 'keyvalue') {
      headers.forEach((_, ci) => {
        const addr = XLSX.utils.encode_cell({r:headerRowIdx, c:ci});
        if (ws[addr]) ws[addr].s = sColHeader;
      });
      for (let ri = headerRowIdx + 1; ri < numRows; ri++) {
        const dataIdx = ri - headerRowIdx;
        const isEven = dataIdx % 2 === 0;
        const labelAddr = XLSX.utils.encode_cell({r:ri, c:0});
        if (ws[labelAddr]) ws[labelAddr].s = sFieldLabel;
        for (let ci = 1; ci < numCols; ci++) {
          const addr = XLSX.utils.encode_cell({r:ri, c:ci});
          if (!ws[addr]) ws[addr] = {v:'', t:'s'};
          const val = aoa[ri][ci];
          const label = (aoa[ri][0] || '').toLowerCase();
          if (label.includes('notes') || label.includes('summary') || label.includes('description') || label.includes('considerations') || label.includes('obstructions') || label.includes('details')) {
            ws[addr].s = sNotesWhite;
          } else if (isNum(val)) {
            let baseStyle = isEven ? sNumZebra : sNumWhite;
            if (label.includes('dollar') || label.includes('amount') || label.includes('cost')) {
              ws[addr].s = withNumFmt(baseStyle, '$#,##0.00');
            } else if (label.includes('%') || label.includes('percent')) {
              ws[addr].s = withNumFmt(baseStyle, '0.0%');
            } else {
              ws[addr].s = baseStyle;
            }
          } else {
            ws[addr].s = isEven ? sBodyZebra : sBodyWhite;
          }
        }
      }
      const freezeRow = headerRowIdx + 1;
      ws['!freeze'] = {xSplit:'0', ySplit:String(freezeRow), topLeftCell:'A'+(freezeRow+1), activePane:'bottomLeft', state:'frozen'};
    }

    const colWidths = [];
    for (let ci = 0; ci < numCols; ci++) {
      let max = 8;
      const hdr = (headers[ci] || '').toLowerCase();
      for (let ri = 0; ri < numRows; ri++) {
        const val = aoa[ri] && aoa[ri][ci] != null ? String(aoa[ri][ci]) : '';
        if (val.length > max) max = val.length;
      }
      let minW = 14, maxW = 55;
      if (notesColSet.has(ci)) { minW = 30; maxW = 60; }
      else if (hdr.includes('description')) { minW = 25; maxW = 50; }
      colWidths.push({wch: Math.min(Math.max(max + 3, minW), maxW)});
    }
    ws['!cols'] = colWidths;

    const LINE_HEIGHT = 15;
    const MIN_DATA_ROW = 18;
    const HEADER_ROW_HT = 30;
    const SECTION_ROW_HT = 32;

    function estimateRowHeight(rowIdx) {
      if (opts.sectionTitle && rowIdx === 0) return SECTION_ROW_HT;
      if (rowIdx === headerRowIdx) return HEADER_ROW_HT;
      let maxLines = 1;
      for (let ci = 0; ci < numCols; ci++) {
        const val = aoa[rowIdx] && aoa[rowIdx][ci] != null ? String(aoa[rowIdx][ci]) : '';
        if (!val) continue;
        const colW = colWidths[ci] ? colWidths[ci].wch : 14;
        const usableW = Math.max(colW - 3, 6);
        const segments = val.split(/\n/);
        let lines = 0;
        for (const seg of segments) {
          lines += Math.max(1, Math.ceil(seg.length / usableW));
        }
        if (lines > maxLines) maxLines = lines;
      }
      return Math.max(maxLines * LINE_HEIGHT, MIN_DATA_ROW);
    }

    ws['!rows'] = [];
    for (let ri = 0; ri < numRows; ri++) {
      ws['!rows'].push({hpt: estimateRowHeight(ri)});
    }
    applyPerimeterBorders(ws, opts.sectionTitle ? 0 : headerRowIdx, numRows - 1, 0, numCols - 1);
    ws['!margins'] = {left:0.5, right:0.5, top:0.75, bottom:0.75, header:0.3, footer:0.3};
    ws['!printHeader'] = [headerRowIdx + 1, headerRowIdx + 1];
    return ws;
  }

  }

  const revHeader = ['Revision','Date','User','Description'];
  const revData = [revHeader, ...state.revisions.map(r => [r.revisionNumber, r.revisionDate, r.user, r.description])];
  XLSX.utils.book_append_sheet(wb, buildSheet(revData, 'table', {sectionTitle:'Revision History'}), 'Revision History');

  const qfLink = state.quoteFolderLink ? state.quoteFolderLink.trim() : '';
  if (qfLink) {
    const qfLabelStyle = {
      font: {name:'Montserrat', sz:10, bold:true, color:{rgb:'343551'}},
      alignment: {horizontal:'left', vertical:'center'}
    };
    const qfLinkStyle = {
      font: {name:'Roboto', sz:10, color:{rgb:'E54102'}, underline:true},
      alignment: {horizontal:'left', vertical:'center'}
    };
    for (let si = 0; si < wb.SheetNames.length; si++) {
      if (wb.SheetNames[si] === 'Cover') continue;
      const sheet = wb.Sheets[wb.SheetNames[si]];
      const range = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
      const linkRow = range.e.r + 3;
      const labelAddr = XLSX.utils.encode_cell({r:linkRow, c:0});
      const linkAddr = XLSX.utils.encode_cell({r:linkRow, c:1});
      sheet[labelAddr] = {v:'Quote Folder:', t:'s', s:qfLabelStyle};
      sheet[linkAddr] = {v:'Open Quote Folder', t:'s', s:qfLinkStyle, l:{Target:qfLink, Tooltip:'Open Quote Folder'}};
      range.e.r = linkRow;
      sheet['!ref'] = XLSX.utils.encode_range(range);
      if (!sheet['!rows']) sheet['!rows'] = [];
      while (sheet['!rows'].length <= linkRow) sheet['!rows'].push({});
      sheet['!rows'][linkRow] = {hpt: 24};
    }
  }

  XLSX.writeFile(wb, `OneDoc_${(state.rfq.customerName || 'export').replace(/[^a-zA-Z0-9 ]/g,'')}_${dateStr}.xlsx`);
}

function PageToolbar({ state, setState }) {

  React.useEffect(() => {
    if (confirmAction) {
      timerRef.current = setTimeout(() => setConfirmAction(null), 4000);
      return () => clearTimeout(timerRef.current);
    }
  }, [confirmAction]);

  function handleClearPage() {
    if (confirmAction === 'page') {
      setState(p => ({ ...p, ...getBlankStateForPage(p.activeTab, p) }));
      setConfirmAction(null);
    } else {
      setConfirmAction('page');

      setState(p => ({ ...p, ...getBlankStateForAll(p) }));
      setConfirmAction(null);
    } else {
      setConfirmAction('all');

    ? 'bg-p-red text-white border-p-red'
    : 'bg-white text-p-gray border-gray-200 hover:border-p-light hover:text-p-charcoal';
  const allBtnClass = confirmAction === 'all'

function CPPDataGrid({ title, gridId, columns, rows, updateRow, onAddRow, onDeleteRows, measurementUnit, weightUnit, onMeasurementChange, onWeightChange, showMeasurement, showWeight, collapsed, onToggleCollapse }) {
  const [selected, setSelected] = React.useState(new Set());
  const selCount = selected.size;
  const allSelected = rows.length > 0 && selCount === rows.length;
  const someSelected = selCount > 0 && !allSelected;

  function toggleOne(idx) {
    setSelected(prev => {
      const next = new Set(prev);
      next.has(idx) ? next.delete(idx) : next.add(idx);
      return next;
    });
  }
  function toggleAll() {
    setSelected(allSelected ? new Set() : new Set(rows.map((_,i) => i)));
  }
  function deleteSelected() {
    if (selCount === 0) return;
    if (selCount === rows.length) {
      if (!confirm('Delete all rows? At least one empty row will remain.')) return;
    }
    onDeleteRows([...selected]);
    setSelected(new Set());
  }

  React.useEffect(() => { setSelected(new Set()); }, [rows.length]);

  return (
    <div id={gridId} className="bg-white rounded-card border border-gray-200 shadow-sm mb-4">
      {/* Grid section header — always blurple */}
      <div
        className="grid-section-header flex items-center justify-between px-4 py-2.5 rounded-t-card"
        style={{background: selCount > 0 ? '#e04426' : '#343551'}}
        onClick={() => !selCount && onToggleCollapse && onToggleCollapse()}
      >
        {selCount > 0 ? (
          <React.Fragment>
            <div className="flex items-center gap-3">
              <span className="font-heading font-semibold text-sm text-white">{selCount} row{selCount > 1 ? 's' : ''} selected</span>
              <button onClick={e => { e.stopPropagation(); setSelected(new Set()); }} className="text-xs text-white/80 hover:text-white underline underline-offset-2 font-body">Clear</button>
            </div>
            <button onClick={e => { e.stopPropagation(); deleteSelected(); }} className="flex items-center gap-1.5 text-xs text-white bg-white/20 border border-white/30 rounded px-3 py-1 hover:bg-white/30 transition-colors font-heading font-semibold">
              <span>✕</span> Delete Selected
            </button>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <div className="flex items-center gap-2">
              {onToggleCollapse && (
                <span className={`text-white/60 transition-transform duration-200 ${collapsed ? '' : 'rotate-90'}`}>
                  <Icons.chevronRight />
                </span>
              )}
              <h3 className="font-heading font-semibold text-sm text-white tracking-wide">
                {title}
                <span className="text-white/50 font-body font-normal text-xs ml-2">({rows.length} {rows.length === 1 ? 'row' : 'rows'})</span>
              </h3>
            </div>
            <div className="flex items-center gap-3" onClick={e => e.stopPropagation()}>
              {showMeasurement && (
                <label className="flex items-center gap-1.5 text-xs text-white/80 font-body">
                  <span>Units:</span>
                  <select value={measurementUnit} onChange={e => onMeasurementChange(e.target.value)} className="bg-white/15 text-white text-xs border border-white/25 rounded px-2 py-1 focus:outline-none focus:border-white/60">
                    <option value="inches" className="text-p-charcoal">inches</option>
                    <option value="mm" className="text-p-charcoal">mm</option>
                    <option value="cm" className="text-p-charcoal">cm</option>
                  </select>
                </label>
              )}
              {showWeight && (
                <label className="flex items-center gap-1.5 text-xs text-white/80 font-body">
                  <span>Weight:</span>
                  <select value={weightUnit} onChange={e => onWeightChange(e.target.value)} className="bg-white/15 text-white text-xs border border-white/25 rounded px-2 py-1 focus:outline-none focus:border-white/60">
                    <option value="lbs" className="text-p-charcoal">lbs</option>
                    <option value="kg" className="text-p-charcoal">kg</option>
                  </select>
                </label>
              )}
              <button onClick={onAddRow} className="flex items-center gap-1 text-xs text-white/90 bg-white/15 border border-white/25 rounded px-3 py-1 hover:bg-white/25 transition-colors font-heading font-semibold">
                + Add Row
              </button>
            </div>
          </React.Fragment>
        )}
      </div>

      {/* Collapsible body */}
      {!collapsed && (
        <div className="grid-scroll">
          <table className="text-[13px] border-collapse w-full" style={{minWidth: columns.reduce((s,c) => s + parseInt(c.w), 0) + 36 + 'px'}}>
            <thead>
              <tr className="bg-p-blurple/90">
                <th className="px-1 py-2.5 text-center border-r border-white/10" style={{width:'36px', minWidth:'36px'}}>
                  <input type="checkbox" checked={allSelected} ref={el => { if (el) el.indeterminate = someSelected; }} onChange={toggleAll} className="w-3.5 h-3.5 rounded border-white/40 accent-p-orange cursor-pointer" title="Select all" />
                </th>
                {columns.map(c => (
                  <th key={c.key} className="text-white font-heading font-semibold px-3 py-2.5 text-center text-xs border-r border-white/10 whitespace-nowrap" style={{minWidth:c.w, width:c.w}}>
                    {c.label}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map((row, ri) => {
                const isSel = selected.has(ri);
                return (
                  <tr key={ri} className={`${isSel ? 'bg-orange-50/60' : (ri%2===0?'bg-white':'bg-p-alt')} hover:bg-orange-50/30 transition-colors`} style={{height:'40px'}}>
                    <td className={`px-1 py-1 text-center border-r border-gray-100 ${isSel ? 'bg-orange-50/80' : 'bg-gray-50'}`} style={{width:'36px', minWidth:'36px'}}>
                      <input type="checkbox" checked={isSel} onChange={() => toggleOne(ri)} className="w-3.5 h-3.5 rounded accent-p-orange cursor-pointer" />
                    </td>
                    {columns.map(col => {
                      if (col.type === 'auto') {
                        return <td key={col.key} className={`px-3 py-2 text-center border-r border-gray-100 text-p-gray/70 ${isSel ? 'bg-orange-50/40' : 'bg-gray-50'} text-[13px]`}>{row[col.key]??''}</td>;
                      }
                      if (col.type === 'autoCalc') {
                        const val = col.display ? col.display(row) : (row[col.key] ?? '');
                        return <td key={col.key} className="px-3 py-2 text-center border-r border-gray-100 text-p-gray/70 bg-amber-50/40 text-[13px] font-medium">{val}</td>;
                      }
                      if (col.type === 'calc') {
                        return (
                          <td key={col.key} className="px-1 py-1 border-r border-gray-100">
                            <input
                              type="number"
                              value={row[col.key]||''}
                              onChange={e => updateRow(ri, col.key, e.target.value)}
                              className={`w-full px-2 py-1.5 text-[13px] border rounded text-center ${row[col.key+'Override']?'border-p-orange bg-orange-50':'border-transparent bg-transparent'} focus:border-p-orange focus:ring-1 focus:ring-p-orange/20 focus:bg-white`}
                              title={row[col.key+'Override'] ? 'Manually overridden (edit to change)' : 'Auto-calculated (edit to override)'}
                            />
                          </td>
                        );
                      }
                      if (col.type === 'select') {
                        return (
                          <td key={col.key} className="px-1 py-1 border-r border-gray-100">
                            <select value={row[col.key]||''} onChange={e => updateRow(ri, col.key, e.target.value||null)} className="w-full px-1.5 py-1.5 text-[13px] border border-transparent rounded bg-transparent focus:border-p-orange focus:ring-1 focus:ring-p-orange/20 focus:bg-white cursor-pointer">
                              <option value="">—</option>
                              {col.options.map(o => <option key={o} value={o}>{o}</option>)}
                            </select>
                          </td>
                        );
                      }
                      if (col.type === 'num') {
                        return (
                          <td key={col.key} className="px-1 py-1 border-r border-gray-100">
                            <input type="number" step="any" value={row[col.key]??''} onChange={e => updateRow(ri, col.key, e.target.value)} className="w-full px-2 py-1.5 text-[13px] border border-transparent rounded bg-transparent text-center focus:border-p-orange focus:ring-1 focus:ring-p-orange/20 focus:bg-white" />
                          </td>
                        );
                      }
                      return (
                        <td key={col.key} className="px-1 py-1 border-r border-gray-100">
                          <input type="text" value={row[col.key]||''} onChange={e => updateRow(ri, col.key, e.target.value)} className="w-full px-2 py-1.5 text-[13px] border border-transparent rounded bg-transparent focus:border-p-orange focus:ring-1 focus:ring-p-orange/20 focus:bg-white" />
                        </td>
                      );
                    })}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function CPPTab({ state, setState }) {
  const { caseProductPallet: cpp } = state;
  const [collapsedGrids, setCollapsedGrids] = React.useState({});

  const TEXT_FIELDS = ['description','caseStyle','caseHand','incomingOrientation','packPattern','forkliftEntry','palletType','incomingCaseOrientation','baseSheet','layerSheet','topCover','caseNotes','productNotes','packingNotes','palletNotes','patternNotes'];

  function makeGridUpdater(gridKey) {
    return (rowIdx, field, value) => {
      setState(prev => {
        const rows = [...prev.caseProductPallet[gridKey]];
        const row = {...rows[rowIdx]};
        if (field === 'kdl' || field === 'kdw') {
          row[field] = value === '' ? 0 : Number(value);
          row[field+'Override'] = true;
        } else {
          row[field] = value === '' ? null : (typeof value === 'string' && !isNaN(value) && value !== '' && !TEXT_FIELDS.includes(field) ? Number(value) : value);
        }
        if (gridKey === 'caseRows') {
          if (!row.kdlOverride) row.kdl = (row.length||0) + (row.width||0);
          if (!row.kdwOverride) row.kdw = (row.width||0) + (row.depth||0);
          if (row.caseStyle === 'RSC' && row.depth != null && row.width != null) {
            row.openDepth = Math.round(((row.depth || 0) + ((row.width || 0) / 2)) * 10000) / 10000;
          } else {
            row.openDepth = null;
          }
        }
        if (gridKey === 'packingRows') {
          row.productsPerCase = (row.patternRows||0) * (row.patternColumns||0) * (row.layersPerCase||0);
        }
        rows[rowIdx] = row;
        return {...prev, caseProductPallet:{...prev.caseProductPallet, [gridKey]: rows}};
      });
    };
  }

  function makeGridAdder(gridKey, factory) {
    return () => {
      setState(prev => {
        const rows = [...prev.caseProductPallet[gridKey], factory(prev.caseProductPallet[gridKey].length + 1)];
        return {...prev, caseProductPallet:{...prev.caseProductPallet, [gridKey]: rows}};
      });
    };
  }

  function makeGridDeleter(gridKey, factory) {
    return (indices) => {
      setState(prev => {
        const idxSet = new Set(indices);
        let rows = prev.caseProductPallet[gridKey].filter((_,i) => !idxSet.has(i));
        if (rows.length === 0) rows = [factory(1)];
        rows = rows.map((r,i) => ({...r, rowNumber: i+1}));
        return {...prev, caseProductPallet:{...prev.caseProductPallet, [gridKey]: rows}};
      });
    };
  }

  const updateCaseRow = makeGridUpdater('caseRows');
  const updateProductRow = makeGridUpdater('productRows');
  const updatePackingRow = makeGridUpdater('packingRows');
  const updatePalletRow = makeGridUpdater('palletRows');
  const updatePatternRow = makeGridUpdater('patternRows');

  const addCaseRow = makeGridAdder('caseRows', createCaseRow);
  const addProductRow = makeGridAdder('productRows', createProductRow);
  const addPackingRow = makeGridAdder('packingRows', createPackingRow);
  const addPalletRow = makeGridAdder('palletRows', createPalletRow);
  const addPatternRow = makeGridAdder('patternRows', createPatternRow);

  const deleteCaseRows = makeGridDeleter('caseRows', createCaseRow);
  const deleteProductRows = makeGridDeleter('productRows', createProductRow);
  const deletePackingRows = makeGridDeleter('packingRows', createPackingRow);
  const deletePalletRows = makeGridDeleter('palletRows', createPalletRow);
  const deletePatternRows = makeGridDeleter('patternRows', createPatternRow);

  const caseDataCols = [
    {key:'rowNumber',label:'No.',w:'40px',type:'auto'},
    {key:'description',label:'Description',w:'150px',type:'text'},
    {key:'caseStyle',label:'Case Style',w:'90px',type:'select',options:['RSC','HSC','Bliss']},
    {key:'caseHand',label:'Case Hand',w:'85px',type:'select',options:['Left','Right']},
    {key:'length',label:'Length',w:'75px',type:'num'},
    {key:'width',label:'Width',w:'75px',type:'num'},
    {key:'depth',label:'Depth',w:'75px',type:'num'},
    {key:'openDepth',label:'Open Depth',w:'90px',type:'autoCalc', display: r => r.caseStyle === 'RSC' ? (r.openDepth != null ? r.openDepth : '—') : 'NA'},
    {key:'kdl',label:'KDL',w:'75px',type:'calc'},
    {key:'kdw',label:'KDW',w:'75px',type:'calc'},
    {key:'caseRate',label:'Case Rate (CPM)',w:'105px',type:'num'},
    {key:'caseWeight',label:'Case Weight',w:'90px',type:'num'},
    {key:'caseNotes',label:'Notes',w:'160px',type:'text'},
  ];

  const productDataCols = [
    {key:'rowNumber',label:'No.',w:'40px',type:'auto'},
    {key:'description',label:'Description',w:'150px',type:'text'},
    {key:'productWeight',label:'Product Weight',w:'100px',type:'num'},
    {key:'productLength',label:'Product Length',w:'100px',type:'num'},
    {key:'productWidth',label:'Product Width',w:'100px',type:'num'},
    {key:'productHeight',label:'Product Height',w:'100px',type:'num'},
    {key:'incomingOrientation',label:'Incoming Orientation',w:'130px',type:'select',options:['A','B','VA','VB','AOE','BOE','AI','BI']},
    {key:'productNotes',label:'Notes',w:'160px',type:'text'},
  ];

  const packingDataCols = [
    {key:'rowNumber',label:'No.',w:'40px',type:'auto'},
    {key:'description',label:'Description',w:'150px',type:'text'},
    {key:'packPattern',label:'Pack Pattern',w:'120px',type:'text'},
    {key:'patternRows',label:'Pattern Rows',w:'95px',type:'num'},
    {key:'patternColumns',label:'Pattern Columns',w:'110px',type:'num'},
    {key:'layersPerCase',label:'Layers per Case',w:'110px',type:'num'},
    {key:'productsPerCase',label:'Products/Case',w:'100px',type:'autoCalc'},
    {key:'packingNotes',label:'Notes',w:'160px',type:'text'},
  ];

  const palletInfoCols = [
    {key:'rowNumber',label:'No.',w:'40px',type:'auto'},
    {key:'description',label:'Description',w:'150px',type:'text'},
    {key:'palletLength',label:'Pallet Length',w:'100px',type:'num'},
    {key:'palletWidth',label:'Pallet Width',w:'100px',type:'num'},
    {key:'palletHeight',label:'Pallet Height',w:'100px',type:'num'},
    {key:'forkliftEntry',label:'Forklift Entry',w:'100px',type:'select',options:['2-Way','4-Way']},
    {key:'palletType',label:'Pallet Type',w:'100px',type:'select',options:['Block','iGPS','Chep','GMA','PICO','Other']},
    {key:'incomingCaseOrientation',label:'Incoming Case Orient.',w:'140px',type:'select',options:['EW','HW']},
    {key:'palletNotes',label:'Notes',w:'160px',type:'text'},
  ];

  const palletPatternCols = [
    {key:'rowNumber',label:'No.',w:'40px',type:'auto'},
    {key:'description',label:'Description',w:'150px',type:'text'},
    {key:'casesPerLayer',label:'Cases per Layer',w:'110px',type:'num'},
    {key:'numberOfLayers',label:'Number of Layers',w:'115px',type:'num'},
    {key:'baseSheet',label:'Base Sheet',w:'130px',type:'select',options:['N/A','Same as layer sheet','Other']},
    {key:'layerSheet',label:'Layer Sheet',w:'140px',type:'select',options:['N/A','Every layer','Every other layer','Other']},
    {key:'topCover',label:'Top Cover',w:'155px',type:'select',options:['N/A','Same as layer sheet','Formed top cap','Unformed top cap','Other']},
    {key:'patternNotes',label:'Notes',w:'160px',type:'text'},
  ];

      <CPPDataGrid title="Case Data" gridId="grid-case"

function MachineTab({ state, setState, slotNumber }) {
  const slot = state.rfq.machines[slotNumber - 1];
  if (!slot || !slot.selectedModel) return <div className="text-center py-10 text-p-gray">No machine selected</div>;

  const model = slot.selectedModel;
  const templateType = MODEL_TO_TEMPLATE[model];
  const config = slot.configuration || { templateType, model };
  const limits = EQUIPMENT_LIMITS[model] || {};

  function updateConfig(path, value) {
    setState(prev => {
      const machines = [...prev.rfq.machines];
      const mc = {...machines[slotNumber-1]};
      if (!path.includes('.')) {
        mc.configuration = {...(mc.configuration || {}), [path]: value};
      } else {
        const keys = path.split('.');
        const newConf = {...(mc.configuration || {})};
        let obj = newConf;
        for (let i = 0; i < keys.length - 1; i++) {
          obj[keys[i]] = {...(obj[keys[i]] || {})};
          obj = obj[keys[i]];
        }
        obj[keys[keys.length-1]] = value;
        mc.configuration = newConf;
      }
      machines[slotNumber-1] = mc;
      return {...prev, rfq:{...prev.rfq, machines}};
    });
  }

  if (['CaseErector','CaseSealer','BlissFormer','CompactPal','BagInserter','BagUncuffer'].includes(templateType)) {
    return <StandardMachineConfig model={model} templateType={templateType} config={config} updateConfig={updateConfig} limits={limits} state={state} />;
  }
  if (templateType === 'Pack' || templateType === 'Insert' || templateType === 'RPCMX') {
    return <PackMachineConfig model={model} templateType={templateType} config={config} updateConfig={updateConfig} />;
  }
  if (templateType === 'OEM') {
    return <OEMConfig model={model} config={config} updateConfig={updateConfig} />;
  }
  if (templateType === 'Conveyance') {
    return <ConveyanceConfig model={model} config={config} updateConfig={updateConfig} />;
  }
  return <div className="text-center py-10">Machine template: {templateType}</div>;
}

function CaseTableCheckerPanel({ model, limits, state }) {
  const rows = (state.caseProductPallet.caseRows || []).filter(r => r.description || r.length || r.width || r.depth);
  if (rows.length === 0) {
    return (<Card title="Case Table Checker"><p className="text-sm text-p-gray/60">No case data entered. Add data in the Case/Product/Pallet tab.</p></Card>);
  }
  function checkVal(val, min, max) {
    if (val == null || val === 0) return 'none';
    if (min != null && val < min) return 'fail';
    if (max != null && val > max) return 'fail';
    if (min != null && val <= min * 1.05) return 'warn';
    if (max != null && val >= max * 0.95) return 'warn';
    return 'pass';
  }
  const cellColor = (s) => s==='pass'?'bg-p-sage/30 text-p-forest':s==='fail'?'bg-p-red/15 text-p-red font-bold':s==='warn'?'bg-orange-100 text-p-orange':'';
  const dims = [
    {key:'length',label:'Length',min:limits.lengthMin,max:limits.lengthMax},
    {key:'width',label:'Width',min:limits.widthMin,max:limits.widthMax},
    {key:'depth',label:'Depth',min:limits.depthMin,max:limits.depthMax},
    {key:'openDepth',label:'Open Depth',min:limits.openDepthMin,max:limits.openDepthMax},
    {key:'kdl',label:'KDL',min:limits.kdlMin,max:limits.kdlMax},
    {key:'kdw',label:'KDW',min:limits.kdwMin,max:limits.kdwMax},
    {key:'caseWeight',label:'Case Wt',min:limits.weightMin,max:limits.weightMax},
    {key:'caseRate',label:'Rate',min:limits.rateMin,max:limits.rateMax},
  ];
  return (
    <Card title={`Case Table Checker — ${model}`} accent>
      <div className="mb-3 text-xs text-p-gray flex gap-4 flex-wrap">
        <span className="inline-flex items-center gap-1"><span className="w-3 h-3 rounded bg-p-sage/40"></span> In Spec</span>
        <span className="inline-flex items-center gap-1"><span className="w-3 h-3 rounded bg-orange-200"></span> Near Boundary</span>
        <span className="inline-flex items-center gap-1"><span className="w-3 h-3 rounded bg-p-red/20"></span> Out of Spec</span>
      </div>
      <div className="grid-scroll">
        <table className="w-full text-xs border-collapse">
          <thead>
            <tr className="bg-p-blurple text-white">
              <th className="px-2 py-2 text-left font-heading font-semibold">#</th>
              <th className="px-2 py-2 text-left font-heading font-semibold">Description</th>
              {dims.map(d => (
                <th key={d.key} className="px-2 py-2 text-center font-heading font-semibold">
                  {d.label}
                  {(d.min != null || d.max != null) && (
                    <div className="text-[9px] font-normal opacity-70">{d.min??'—'} – {d.max??'—'}</div>
                  )}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map((row, i) => (
              <tr key={i} className={i%2===0?'bg-white':'bg-p-alt'}>
                <td className="px-2 py-1.5">{row.rowNumber}</td>
                <td className="px-2 py-1.5">{row.description || '—'}</td>
                {dims.map(d => {
                  const val = row[d.key];
                  const s = checkVal(val, d.min, d.max);
                  const titleStr = (d.min!=null||d.max!=null) ? ('Valid: ' + (d.min??'—') + ' – ' + (d.max??'—')) : '';
                  return (
                    <td key={d.key} className={`px-2 py-1.5 text-center ${cellColor(s)}`} title={titleStr}>
                      {val ?? '—'}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </Card>
  );
}

function RevisionsTab({ state, setState }) {
  const [adding, setAdding] = React.useState(false);
  const [newRev, setNewRev] = React.useState({ revisionNumber:'', revisionDate:'', user:'', description:'' });

  function addRevision() {
    if (!newRev.revisionNumber || !newRev.description) return;
    setState(p => ({...p, revisions:[...p.revisions, {...newRev, revisionDate: newRev.revisionDate || new Date().toISOString().slice(0,10)}]}));
    setNewRev({ revisionNumber:'', revisionDate:'', user:'', description:'' });
    setAdding(false);
  }

  return (
    <Card title="Revision History" accent>
      <table className="w-full text-sm border-collapse mb-4">
        <thead>
          <tr className="bg-p-blurple text-white">
            <th className="px-4 py-2 text-left font-heading font-semibold text-xs w-24">Rev #</th>

            <th className="px-4 py-2 text-left font-heading font-semibold text-xs w-32">User</th>
            <th className="px-4 py-2 text-left font-heading font-semibold text-xs">Description</th>
          </tr>
        </thead>
        <tbody>
          {state.revisions.map((rev, i) => (
            <tr key={i} className={i%2===0?'bg-white':'bg-p-alt'}>
              <td className="px-4 py-2 font-heading font-semibold text-p-orange">{rev.revisionNumber}</td>
              <td className="px-4 py-2">{rev.revisionDate}</td>
              <td className="px-4 py-2">{rev.user}</td>
              <td className="px-4 py-2">{rev.description}</td>
            </tr>
          ))}
        </tbody>
      </table>

      {adding ? (
        <div className="bg-p-alt p-4 rounded-card space-y-3">
          <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <FormField label="Rev Number"><TextInput value={newRev.revisionNumber} onChange={v => setNewRev(p=>({...p,revisionNumber:v}))} required placeholder="e.g. 1.3.0" /></FormField>
            <FormField label="Date"><TextInput type="date" value={newRev.revisionDate} onChange={v => setNewRev(p=>({...p,revisionDate:v}))} /></FormField>
            <FormField label="User"><TextInput value={newRev.user} onChange={v => setNewRev(p=>({...p,user:v}))} /></FormField>
          </div>
          <FormField label="Description"><textarea value={newRev.description} onChange={e => setNewRev(p=>({...p,description:e.target.value}))} rows={2} className="w-full px-3 py-2 border border-p-light rounded-btn text-sm resize-y" /></FormField>
          <div className="flex gap-2">
            <Btn onClick={addRevision} size="sm">Save Revision</Btn>
            <Btn variant="secondary" size="sm" onClick={() => setAdding(false)}>Cancel</Btn>
          </div>
        </div>
      ) : (
        <Btn onClick={() => setAdding(true)} size="sm">+ Add Revision</Btn>
      )}
    </Card>
  );
}

function App() {
  const [state, setState] = React.useState(initialState);
  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);
  const [mobileOpen, setMobileOpen] = React.useState(false);

  React.useEffect(() => {
    function handleResize() {
      const w = window.innerWidth;
      if (w < 1024 && w >= 768) setSidebarCollapsed(true);
      else if (w >= 1024) setSidebarCollapsed(false);
    }
    handleResize();
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  function renderTab() {
    const { activeTab } = state;
    switch (activeTab) {
      case 'rfq': return <RFQTab state={state} setState={setState} />;
      case 'cpp': return <CPPTab state={state} setState={setState} />;
      case 'facility': return <FacilityTab state={state} setState={setState} />;
      case 'specs': return <SpecsTab state={state} setState={setState} />;
      case 'booking': return <BookingTab state={state} setState={setState} />;
      case 'tandc': return <TandCTab state={state} setState={setState} />;
      case 'revisions': return <RevisionsTab state={state} setState={setState} />;
      default:
        if (activeTab.startsWith('machine-')) {
          const slotNum = parseInt(activeTab.split('-')[1]);
          return <MachineTab state={state} setState={setState} slotNumber={slotNum} />;
        }
        return <div>Unknown tab</div>;
    }
  }

  return (
    <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gridTemplateRows:'auto 1fr',height:'100dvh',overflow:'hidden'}}>
      <Sidebar
        state={state} setState={setState}
        collapsed={sidebarCollapsed} setCollapsed={setSidebarCollapsed}
        mobileOpen={mobileOpen} setMobileOpen={setMobileOpen}
      />
      <TopBar state={state} setState={setState} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} />
      <main style={{gridColumn:'2',overflowY:'auto',overscrollBehavior:'contain',background:'#f8f9fa',padding:'24px',minHeight:0}}>

          {renderTab()}

      </main>
      <RACIModal state={state} setState={setState} />

  );
}
