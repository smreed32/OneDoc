function CPPDataGrid({ title, gridId, columns, rows, updateRow, onAddRow, onDeleteRows, measurementUnit, weightUnit, onMeasurementChange, onWeightChange, showMeasurement, showWeight, collapsed, onToggleCollapse }) {
  const [selected, setSelected] = React.useState(new Set());
  const selCount = selected.size;
  const allSelected = rows.length > 0 && selCount === rows.length;
  const someSelected = selCount > 0 && !allSelected;

  function toggleOne(idx) {
    setSelected(prev => {
      const next = new Set(prev);
      next.has(idx) ? next.delete(idx) : next.add(idx);
      return next;
    });
  }
  function toggleAll() {
    setSelected(allSelected ? new Set() : new Set(rows.map((_,i) => i)));
  }
  function deleteSelected() {
    if (selCount === 0) return;
    if (selCount === rows.length) {
      if (!confirm('Delete all rows? At least one empty row will remain.')) return;
    }
    onDeleteRows([...selected]);
    setSelected(new Set());
  }

  React.useEffect(() => { setSelected(new Set()); }, [rows.length]);

  return (
    <div id={gridId} className="bg-white rounded-card border border-gray-200 shadow-sm mb-4">
      {/* Grid section header — always blurple */}
      <div
        className="grid-section-header flex items-center justify-between px-4 py-2.5 rounded-t-card"
        style={{background: selCount > 0 ? '#e04426' : '#343551'}}
        onClick={() => !selCount && onToggleCollapse && onToggleCollapse()}
      >
        {selCount > 0 ? (
          <React.Fragment>
            <div className="flex items-center gap-3">
              <span className="font-heading font-semibold text-sm text-white">{selCount} row{selCount > 1 ? 's' : ''} selected</span>
              <button onClick={e => { e.stopPropagation(); setSelected(new Set()); }} className="text-xs text-white/80 hover:text-white underline underline-offset-2 font-body">Clear</button>
            </div>
            <button onClick={e => { e.stopPropagation(); deleteSelected(); }} className="flex items-center gap-1.5 text-xs text-white bg-white/20 border border-white/30 rounded px-3 py-1 hover:bg-white/30 transition-colors font-heading font-semibold">
              <span>✕</span> Delete Selected
            </button>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <div className="flex items-center gap-2">
              {onToggleCollapse && (
                <span className={`text-white/60 transition-transform duration-200 ${collapsed ? '' : 'rotate-90'}`}>
                  <Icons.chevronRight />
                </span>
              )}
              <h3 className="font-heading font-semibold text-sm text-white tracking-wide">
                {title}
                <span className="text-white/50 font-body font-normal text-xs ml-2">({rows.length} {rows.length === 1 ? 'row' : 'rows'})</span>
              </h3>
            </div>
            <div className="flex items-center gap-3" onClick={e => e.stopPropagation()}>
              {showMeasurement && (
                <label className="flex items-center gap-1.5 text-xs text-white/80 font-body">
                  <span>Units:</span>
                  <select value={measurementUnit} onChange={e => onMeasurementChange(e.target.value)} className="bg-white/15 text-white text-xs border border-white/25 rounded px-2 py-1 focus:outline-none focus:border-white/60">
                    <option value="inches" className="text-p-charcoal">inches</option>
                    <option value="mm" className="text-p-charcoal">mm</option>
                    <option value="cm" className="text-p-charcoal">cm</option>
                  </select>
                </label>
              )}
              {showWeight && (
                <label className="flex items-center gap-1.5 text-xs text-white/80 font-body">
                  <span>Weight:</span>
                  <select value={weightUnit} onChange={e => onWeightChange(e.target.value)} className="bg-white/15 text-white text-xs border border-white/25 rounded px-2 py-1 focus:outline-none focus:border-white/60">
                    <option value="lbs" className="text-p-charcoal">lbs</option>
                    <option value="kg" className="text-p-charcoal">kg</option>
                  </select>
                </label>
              )}
              <button onClick={onAddRow} className="flex items-center gap-1 text-xs text-white/90 bg-white/15 border border-white/25 rounded px-3 py-1 hover:bg-white/25 transition-colors font-heading font-semibold">
                + Add Row
              </button>
            </div>
          </React.Fragment>
        )}
      </div>

      {/* Collapsible body */}
      {!collapsed && (
        <div className="grid-scroll">
          <table className="text-[13px] border-collapse w-full" style={{minWidth: columns.reduce((s,c) => s + parseInt(c.w), 0) + 36 + 'px'}}>
            <thead>
              <tr className="bg-p-blurple/90">
                <th className="px-1 py-2.5 text-center border-r border-white/10" style={{width:'36px', minWidth:'36px'}}>
                  <input type="checkbox" checked={allSelected} ref={el => { if (el) el.indeterminate = someSelected; }} onChange={toggleAll} className="w-3.5 h-3.5 rounded border-white/40 accent-p-orange cursor-pointer" title="Select all" />
                </th>
                {columns.map(c => (
                  <th key={c.key} className="text-white font-heading font-semibold px-3 py-2.5 text-center text-xs border-r border-white/10 whitespace-nowrap" style={{minWidth:c.w, width:c.w}}>
                    {c.label}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map((row, ri) => {
                const isSel = selected.has(ri);
                return (
                  <tr key={ri} className={`${isSel ? 'bg-orange-50/60' : (ri%2===0?'bg-white':'bg-p-alt')} hover:bg-orange-50/30 transition-colors`} style={{height:'40px'}}>
                    <td className={`px-1 py-1 text-center border-r border-gray-100 ${isSel ? 'bg-orange-50/80' : 'bg-gray-50'}`} style={{width:'36px', minWidth:'36px'}}>
                      <input type="checkbox" checked={isSel} onChange={() => toggleOne(ri)} className="w-3.5 h-3.5 rounded accent-p-orange cursor-pointer" />
                    </td>
                    {columns.map(col => {
                      if (col.type === 'auto') {
                        return <td key={col.key} className={`px-3 py-2 text-center border-r border-gray-100 text-p-gray/70 ${isSel ? 'bg-orange-50/40' : 'bg-gray-50'} text-[13px]`}>{row[col.key]??''}</td>;
                      }
                      if (col.type === 'autoCalc') {
                        const val = col.display ? col.display(row) : (row[col.key] ?? '');
                        return <td key={col.key} className="px-3 py-2 text-center border-r border-gray-100 text-p-gray/70 bg-amber-50/40 text-[13px] font-medium">{val}</td>;
                      }
                      if (col.type === 'calc') {
                        return (
                          <td key={col.key} className="px-1 py-1 border-r border-gray-100">
                            <input
                              type="number"
                              value={row[col.key]||''}
                              onChange={e => updateRow(ri, col.key, e.target.value)}
                              className={`w-full px-2 py-1.5 text-[13px] border rounded text-center ${row[col.key+'Override']?'border-p-orange bg-orange-50':'border-transparent bg-transparent'} focus:border-p-orange focus:ring-1 focus:ring-p-orange/20 focus:bg-white`}
                              title={row[col.key+'Override'] ? 'Manually overridden (edit to change)' : 'Auto-calculated (edit to override)'}
                            />
                          </td>
                        );
                      }
                      if (col.type === 'select') {
                        return (
                          <td key={col.key} className="px-1 py-1 border-r border-gray-100">
                            <select value={row[col.key]||''} onChange={e => updateRow(ri, col.key, e.target.value||null)} className="w-full px-1.5 py-1.5 text-[13px] border border-transparent rounded bg-transparent focus:border-p-orange focus:ring-1 focus:ring-p-orange/20 focus:bg-white cursor-pointer">
                              <option value="">—</option>
                              {col.options.map(o => <option key={o} value={o}>{o}</option>)}
                            </select>
                          </td>
                        );
                      }
                      if (col.type === 'num') {
                        return (
                          <td key={col.key} className="px-1 py-1 border-r border-gray-100">
                            <input type="number" step="any" value={row[col.key]??''} onChange={e => updateRow(ri, col.key, e.target.value)} className="w-full px-2 py-1.5 text-[13px] border border-transparent rounded bg-transparent text-center focus:border-p-orange focus:ring-1 focus:ring-p-orange/20 focus:bg-white" />
                          </td>
                        );
                      }
                      return (
                        <td key={col.key} className="px-1 py-1 border-r border-gray-100">
                          <input type="text" value={row[col.key]||''} onChange={e => updateRow(ri, col.key, e.target.value)} className="w-full px-2 py-1.5 text-[13px] border border-transparent rounded bg-transparent focus:border-p-orange focus:ring-1 focus:ring-p-orange/20 focus:bg-white" />
                        </td>
                      );
                    })}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function CPPTab({ state, setState }) {
  const { caseProductPallet: cpp } = state;
  const [collapsedGrids, setCollapsedGrids] = React.useState({});

  const TEXT_FIELDS = ['description','caseStyle','caseHand','incomingOrientation','packPattern','forkliftEntry','palletType','incomingCaseOrientation','baseSheet','layerSheet','topCover','caseNotes','productNotes','packingNotes','palletNotes','patternNotes'];

  function makeGridUpdater(gridKey) {
    return (rowIdx, field, value) => {
      setState(prev => {
        const rows = [...prev.caseProductPallet[gridKey]];
        const row = {...rows[rowIdx]};
        if (field === 'kdl' || field === 'kdw') {
          row[field] = value === '' ? 0 : Number(value);
          row[field+'Override'] = true;
        } else {
          row[field] = value === '' ? null : (typeof value === 'string' && !isNaN(value) && value !== '' && !TEXT_FIELDS.includes(field) ? Number(value) : value);
        }
        if (gridKey === 'caseRows') {
          if (!row.kdlOverride) row.kdl = (row.length||0) + (row.width||0);
          if (!row.kdwOverride) row.kdw = (row.width||0) + (row.depth||0);
          if (row.caseStyle === 'RSC' && row.depth != null && row.width != null) {
            row.openDepth = Math.round(((row.depth || 0) + ((row.width || 0) / 2)) * 10000) / 10000;
          } else {
            row.openDepth = null;
          }
        }
        if (gridKey === 'packingRows') {
          row.productsPerCase = (row.patternRows||0) * (row.patternColumns||0) * (row.layersPerCase||0);
        }
        rows[rowIdx] = row;
        return {...prev, caseProductPallet:{...prev.caseProductPallet, [gridKey]: rows}};
      });
    };
  }

  function makeGridAdder(gridKey, factory) {
    return () => {
      setState(prev => {
        const rows = [...prev.caseProductPallet[gridKey], factory(prev.caseProductPallet[gridKey].length + 1)];
        return {...prev, caseProductPallet:{...prev.caseProductPallet, [gridKey]: rows}};
      });
    };
  }

  function makeGridDeleter(gridKey, factory) {
    return (indices) => {
      setState(prev => {
        const idxSet = new Set(indices);
        let rows = prev.caseProductPallet[gridKey].filter((_,i) => !idxSet.has(i));
        if (rows.length === 0) rows = [factory(1)];
        rows = rows.map((r,i) => ({...r, rowNumber: i+1}));
        return {...prev, caseProductPallet:{...prev.caseProductPallet, [gridKey]: rows}};
      });
    };
  }

  const updateCaseRow = makeGridUpdater('caseRows');
  const updateProductRow = makeGridUpdater('productRows');
  const updatePackingRow = makeGridUpdater('packingRows');
  const updatePalletRow = makeGridUpdater('palletRows');
  const updatePatternRow = makeGridUpdater('patternRows');

  const addCaseRow = makeGridAdder('caseRows', createCaseRow);
  const addProductRow = makeGridAdder('productRows', createProductRow);
  const addPackingRow = makeGridAdder('packingRows', createPackingRow);
  const addPalletRow = makeGridAdder('palletRows', createPalletRow);
  const addPatternRow = makeGridAdder('patternRows', createPatternRow);

  const deleteCaseRows = makeGridDeleter('caseRows', createCaseRow);
  const deleteProductRows = makeGridDeleter('productRows', createProductRow);
  const deletePackingRows = makeGridDeleter('packingRows', createPackingRow);
  const deletePalletRows = makeGridDeleter('palletRows', createPalletRow);
  const deletePatternRows = makeGridDeleter('patternRows', createPatternRow);

  const caseDataCols = [
    {key:'rowNumber',label:'No.',w:'40px',type:'auto'},
    {key:'description',label:'Description',w:'150px',type:'text'},
    {key:'caseStyle',label:'Case Style',w:'90px',type:'select',options:['RSC','HSC','Bliss']},
    {key:'caseHand',label:'Case Hand',w:'85px',type:'select',options:['Left','Right']},
    {key:'length',label:'Length',w:'75px',type:'num'},
    {key:'width',label:'Width',w:'75px',type:'num'},
    {key:'depth',label:'Depth',w:'75px',type:'num'},
    {key:'openDepth',label:'Open Depth',w:'90px',type:'autoCalc', display: r => r.caseStyle === 'RSC' ? (r.openDepth != null ? r.openDepth : '—') : 'NA'},
    {key:'kdl',label:'KDL',w:'75px',type:'calc'},
    {key:'kdw',label:'KDW',w:'75px',type:'calc'},
    {key:'caseRate',label:'Case Rate (CPM)',w:'105px',type:'num'},
    {key:'caseWeight',label:'Case Weight',w:'90px',type:'num'},
    {key:'caseNotes',label:'Notes',w:'160px',type:'text'},
  ];

  const productDataCols = [
    {key:'rowNumber',label:'No.',w:'40px',type:'auto'},
    {key:'description',label:'Description',w:'150px',type:'text'},
    {key:'productWeight',label:'Product Weight',w:'100px',type:'num'},
    {key:'productLength',label:'Product Length',w:'100px',type:'num'},
    {key:'productWidth',label:'Product Width',w:'100px',type:'num'},
    {key:'productHeight',label:'Product Height',w:'100px',type:'num'},
    {key:'incomingOrientation',label:'Incoming Orientation',w:'130px',type:'select',options:['A','B','VA','VB','AOE','BOE','AI','BI']},
    {key:'productNotes',label:'Notes',w:'160px',type:'text'},
  ];

  const packingDataCols = [
    {key:'rowNumber',label:'No.',w:'40px',type:'auto'},
    {key:'description',label:'Description',w:'150px',type:'text'},
    {key:'packPattern',label:'Pack Pattern',w:'120px',type:'text'},
    {key:'patternRows',label:'Pattern Rows',w:'95px',type:'num'},
    {key:'patternColumns',label:'Pattern Columns',w:'110px',type:'num'},
    {key:'layersPerCase',label:'Layers per Case',w:'110px',type:'num'},
    {key:'productsPerCase',label:'Products/Case',w:'100px',type:'autoCalc'},
    {key:'packingNotes',label:'Notes',w:'160px',type:'text'},
  ];

  const palletInfoCols = [
    {key:'rowNumber',label:'No.',w:'40px',type:'auto'},
    {key:'description',label:'Description',w:'150px',type:'text'},
    {key:'palletLength',label:'Pallet Length',w:'100px',type:'num'},
    {key:'palletWidth',label:'Pallet Width',w:'100px',type:'num'},
    {key:'palletHeight',label:'Pallet Height',w:'100px',type:'num'},
    {key:'forkliftEntry',label:'Forklift Entry',w:'100px',type:'select',options:['2-Way','4-Way']},
    {key:'palletType',label:'Pallet Type',w:'100px',type:'select',options:['Block','iGPS','Chep','GMA','PICO','Other']},
    {key:'incomingCaseOrientation',label:'Incoming Case Orient.',w:'140px',type:'select',options:['EW','HW']},
    {key:'palletNotes',label:'Notes',w:'160px',type:'text'},
  ];

  const palletPatternCols = [
    {key:'rowNumber',label:'No.',w:'40px',type:'auto'},
    {key:'description',label:'Description',w:'150px',type:'text'},
    {key:'casesPerLayer',label:'Cases per Layer',w:'110px',type:'num'},
    {key:'numberOfLayers',label:'Number of Layers',w:'115px',type:'num'},
    {key:'baseSheet',label:'Base Sheet',w:'130px',type:'select',options:['N/A','Same as layer sheet','Other']},
    {key:'layerSheet',label:'Layer Sheet',w:'140px',type:'select',options:['N/A','Every layer','Every other layer','Other']},
    {key:'topCover',label:'Top Cover',w:'155px',type:'select',options:['N/A','Same as layer sheet','Formed top cap','Unformed top cap','Other']},
    {key:'patternNotes',label:'Notes',w:'160px',type:'text'},
  ];

  const setMeasurement = v => setState(p=>({...p,caseProductPallet:{...p.caseProductPallet,measurementUnit:v}}));
  const setWeight = v => setState(p=>({...p,caseProductPallet:{...p.caseProductPallet,weightUnit:v}}));

  function toggleGrid(key) {
    setCollapsedGrids(prev => ({...prev, [key]: !prev[key]}));
  }

  function scrollTo(id) {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }

  const anchors = [
    {id:'grid-case', label:'Case'},
    {id:'grid-product', label:'Product'},
    {id:'grid-packing', label:'Packing'},
    {id:'grid-pallet', label:'Pallet'},
    {id:'grid-pattern', label:'Pattern'},
  ];

  return (
    <div>
      {/* Anchor nav strip */}
      <div className="cpp-anchor-nav flex items-center gap-1 mb-4 bg-white rounded-card border border-gray-200 px-3 py-2 no-print">

        {anchors.map((a, i) => (

      <CPPDataGrid title="Case Data" gridId="grid-case"
        columns={caseDataCols} rows={cpp.caseRows} updateRow={updateCaseRow}

function MachineTab({ state, setState, slotNumber }) {
  const slot = state.rfq.machines[slotNumber - 1];
  if (!slot || !slot.selectedModel) return <div className="text-center py-10 text-p-gray">No machine selected</div>;

  const model = slot.selectedModel;
  const templateType = getModelToTemplate(state.machineRegistry)[model];
  const config = slot.configuration || { templateType, model };
  const limits = getEquipmentLimits(state.machineRegistry)[model] || {};

  function updateConfig(path, value) {
    setState(prev => {
      const machines = [...prev.rfq.machines];
      const mc = {...machines[slotNumber-1]};
      if (!path.includes('.')) {
        mc.configuration = {...(mc.configuration || {}), [path]: value};
      } else {
        const keys = path.split('.');
        const newConf = {...(mc.configuration || {})};
        let obj = newConf;
        for (let i = 0; i < keys.length - 1; i++) {
          obj[keys[i]] = {...(obj[keys[i]] || {})};
          obj = obj[keys[i]];
        }
        obj[keys[keys.length-1]] = value;
        mc.configuration = newConf;
      }
      machines[slotNumber-1] = mc;
      return {...prev, rfq:{...prev.rfq, machines}};
    });
  }

  if (['CaseErector','CaseSealer','BlissFormer','CompactPal','BagInserter','BagUncuffer'].includes(templateType)) {
    return <StandardMachineConfig model={model} templateType={templateType} config={config} updateConfig={updateConfig} limits={limits} state={state} />;
  }
  if (templateType === 'Pack' || templateType === 'Insert' || templateType === 'RPCMX') {
    return <PackMachineConfig model={model} templateType={templateType} config={config} updateConfig={updateConfig} limits={limits} state={state} />;
  }
  if (templateType === 'OEM') {
    return <OEMConfig model={model} config={config} updateConfig={updateConfig} />;
  }
  if (templateType === 'Conveyance') {
    return <ConveyanceConfig model={model} config={config} updateConfig={updateConfig} />;
  }
  return <div className="text-center py-10">Machine template: {templateType}</div>;
}

function CaseTableCheckerPanel({ model, limits, state }) {
  const rows = (state.caseProductPallet.caseRows || []).filter(r => r.description || r.length || r.width || r.depth);
  if (rows.length === 0) {
    return (<Card title="Case Table Checker"><p className="text-sm text-p-gray/60">No case data entered. Add data in the Case/Product/Pallet tab.</p></Card>);
  }
  function checkVal(val, min, max) {
    if (val == null || val === '') return 'none';
    const num = Number(val);
    if (isNaN(num)) return 'none';
    if (num === 0 && min == null && max == null) return 'none';
    if (min != null && num < min) return 'fail';
    if (max != null && num > max) return 'fail';
    if (min != null && num <= min * 1.05) return 'warn';
    if (max != null && num >= max * 0.95) return 'warn';
    return 'pass';
  }
  const cellColor = (s) => s==='pass'?'bg-p-sage/30 text-p-forest':s==='fail'?'bg-p-red/15 text-p-red font-bold':s==='warn'?'bg-orange-100 text-p-orange':'';
  const dims = [
    {key:'length',label:'Length',min:limits.lengthMin,max:limits.lengthMax},
    {key:'width',label:'Width',min:limits.widthMin,max:limits.widthMax},
    {key:'depth',label:'Depth',min:limits.depthMin,max:limits.depthMax},
    {key:'openDepth',label:'Open Depth',min:limits.openDepthMin,max:limits.openDepthMax},
    {key:'kdl',label:'KDL',min:limits.kdlMin,max:limits.kdlMax},
    {key:'kdw',label:'KDW',min:limits.kdwMin,max:limits.kdwMax},
    {key:'caseWeight',label:'Case Wt',min:limits.weightMin,max:limits.weightMax},
    {key:'caseRate',label:'Rate',min:limits.rateMin,max:limits.rateMax},
  ];
  return (
    <Card title={`Case Table Checker — ${model}`} accent>
      <div className="mb-3 text-xs text-p-gray flex gap-4 flex-wrap">
        <span className="inline-flex items-center gap-1"><span className="w-3 h-3 rounded bg-p-sage/40"></span> In Spec</span>
        <span className="inline-flex items-center gap-1"><span className="w-3 h-3 rounded bg-orange-200"></span> Near Boundary</span>
        <span className="inline-flex items-center gap-1"><span className="w-3 h-3 rounded bg-p-red/20"></span> Out of Spec</span>
      </div>
      <div className="grid-scroll">
        <table className="w-full text-xs border-collapse">
          <thead>
            <tr className="bg-p-blurple text-white">
              <th className="px-2 py-2 text-left font-heading font-semibold">#</th>
              <th className="px-2 py-2 text-left font-heading font-semibold">Description</th>
              {dims.map(d => (
                <th key={d.key} className="px-2 py-2 text-center font-heading font-semibold">
                  {d.label}
                  {(d.min != null || d.max != null) && (
                    <div className="text-[9px] font-normal opacity-70">{d.min??'—'} – {d.max??'—'}</div>
                  )}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map((row, i) => (
              <tr key={i} className={i%2===0?'bg-white':'bg-p-alt'}>
                <td className="px-2 py-1.5">{row.rowNumber}</td>
                <td className="px-2 py-1.5">{row.description || '—'}</td>
                {dims.map(d => {
                  const val = row[d.key];
                  const s = checkVal(val, d.min, d.max);
                  const titleStr = (d.min!=null||d.max!=null) ? ('Valid: ' + (d.min??'—') + ' – ' + (d.max??'—')) : '';
                  return (
                    <td key={d.key} className={`px-2 py-1.5 text-center ${cellColor(s)}`} title={titleStr}>
                      {val ?? '—'}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </Card>
  );
}

}

function AdminToast({ message, onDismiss }) {
  const [exiting, setExiting] = React.useState(false);
  React.useEffect(() => {
    if (!message) return;
    const t1 = setTimeout(() => setExiting(true), 3500);
    const t2 = setTimeout(() => { onDismiss(); setExiting(false); }, 3800);
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, [message]);
  if (!message) return null;
  const isError = message.type === 'error';
  return (
    <div
      className={`fixed bottom-5 right-5 z-[200] flex items-center gap-2.5 px-4 py-3 rounded-card shadow-xl text-white text-sm font-body font-medium max-w-sm ${isError ? 'bg-red-600' : 'bg-p-forest'} ${exiting ? 'toast-exit' : 'toast-enter'}`}
      style={{minWidth:'240px'}}
    >
      <span className="flex-1">{message.text}</span>
      <button onClick={() => { setExiting(true); setTimeout(onDismiss, 300); }} className="text-white/70 hover:text-white ml-1 flex-shrink-0" style={{fontSize:'16px',lineHeight:1}}>&times;</button>
    </div>
  );
}

// Session-scoped admin unlock flag (resets on page refresh)
let __adminUnlocked = false;
const __ADMIN_HASH = '2390a1819633ceb1ade6d471d8f69e39d82bbaa43489c593c7e5dffab85f4466';
async function __checkAdminPw(pw) {
  const enc = new TextEncoder().encode(pw);
  const buf = await crypto.subtle.digest('SHA-256', enc);
  const hex = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  return hex === __ADMIN_HASH;
}

function MachineAdminTab({ state, setState }) {
  const [unlocked, setUnlocked] = React.useState(__adminUnlocked);
  const [pwInput, setPwInput] = React.useState('');
  const [pwError, setPwError] = React.useState(false);
  const [searchTerm, setSearchTerm] = React.useState('');
  const [editingModel, setEditingModel] = React.useState(null);
  const [showForm, setShowForm] = React.useState(false);
  const [toast, setToast] = React.useState(null);
  const [confirmDelete, setConfirmDelete] = React.useState(null);

  const emptyForm = { model:'', category:'', customCategory:'', templateType:'', limits:{} };
  const [form, setForm] = React.useState(emptyForm);

  const allCategories = React.useMemo(() => {
    const cats = DEFAULT_MACHINE_GROUPS.map(g => g.label);
    const customs = (state.machineRegistry && state.machineRegistry.customMachines) || [];
    customs.forEach(cm => { if (cm.category && !cats.includes(cm.category)) cats.push(cm.category); });
    return cats;
  }, [state.machineRegistry]);

  const allMachines = React.useMemo(() => {
    const customs = (state.machineRegistry && state.machineRegistry.customMachines) || [];
    const customModels = new Set(customs.map(c => c.model));
    const machines = [];
    DEFAULT_MACHINE_GROUPS.forEach(group => {
      group.models.forEach(model => {
        if (!customModels.has(model)) {
          machines.push({
            model, category: group.label,
            templateType: DEFAULT_MODEL_TO_TEMPLATE[model] || '',
            limits: DEFAULT_EQUIPMENT_LIMITS[model] || {},
            source: 'Built-in'
          });
        }
      });
    });
    customs.forEach(cm => {
      machines.push({
        model: cm.model, category: cm.category,
        templateType: cm.templateType,
        limits: cm.limits || {},
        source: 'Custom'
      });
    });
    return machines;
  }, [state.machineRegistry]);

  const filteredMachines = React.useMemo(() => {
    if (!searchTerm.trim()) return allMachines;
    const term = searchTerm.toLowerCase();
    return allMachines.filter(m =>
      m.model.toLowerCase().includes(term) ||
      m.category.toLowerCase().includes(term) ||
      m.templateType.toLowerCase().includes(term)
    );
  }, [allMachines, searchTerm]);

  // --- Password gate ---
  async function handleUnlock(e) {
    if (e) e.preventDefault();
    const ok = await __checkAdminPw(pwInput);
    if (ok) {
      __adminUnlocked = true;
      setUnlocked(true);
      setPwError(false);
    } else {
      setPwError(true);
    }
  }

  if (!unlocked) {
    return (
      <div className="flex items-center justify-center" style={{minHeight:'60vh'}}>
        <div className="bg-white rounded-card border border-gray-200 shadow-sm p-8 w-full" style={{maxWidth:'380px'}}>
          <div className="flex justify-center mb-4">
            <div className="w-12 h-12 rounded-lg flex items-center justify-center text-white" style={{background:'#343551'}}>
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0110 0v4"/>
              </svg>
            </div>
          </div>
          <h3 className="font-heading font-bold text-base text-p-blurple text-center mb-1">Machine Setup</h3>
          <p className="text-sm text-p-gray text-center mb-5">Enter the admin password to continue.</p>
          <form onSubmit={handleUnlock}>
            <input
              type="password"
              value={pwInput}
              onChange={e => { setPwInput(e.target.value); setPwError(false); }}
              placeholder="Password"
              autoFocus
              className={`w-full px-3 py-2.5 border rounded-btn text-sm mb-3 ${pwError ? 'border-red-500 bg-red-50' : 'border-p-light bg-white'}`}
            />
            {pwError && <p className="text-xs text-red-600 mb-3 text-center">Incorrect password. Please try again.</p>}
            <button type="submit"
              className="w-full px-4 py-2.5 text-sm font-heading font-semibold rounded-btn text-white transition-colors"
              style={{background:'#e54102'}}
              onMouseOver={e => e.currentTarget.style.background='#c73802'}
              onMouseOut={e => e.currentTarget.style.background='#e54102'}
            >Unlock</button>
          </form>
        </div>
      </div>
    );
  }

  // --- Admin page (unlocked) ---

  function getTemplateLabel(v) {
    const o = TEMPLATE_TYPE_OPTIONS.find(x => x.value === v);
    return o ? o.label : (v || '—');
  }

  function formatLimit(limits, minK, maxK) {
    const mn = limits[minK], mx = limits[maxK];
    if (mn == null && mx == null) return '—';
    if (mn != null && mx != null) return mn + ' – ' + mx;
    if (mn != null) return '≥ ' + mn;
    return '≤ ' + mx;
  }

  function openAddForm() {
    setForm(emptyForm);
    setEditingModel(null);
    setShowForm(true);
  }

  function openEditForm(m) {
    setForm({ model: m.model, category: m.category, customCategory:'', templateType: m.templateType, limits:{...m.limits} });
    setEditingModel(m.model);
    setShowForm(true);
  }

  function cancelForm() {
    setForm(emptyForm);
    setEditingModel(null);
    setShowForm(false);
  }

  function validateForm() {
    if (!form.model.trim()) return 'Model name is required.';
    const cat = form.category === '__new__' ? form.customCategory.trim() : form.category;
    if (!cat) return 'Category is required.';
    if (!form.templateType) return 'Configuration template is required.';
    const existing = allMachines.map(m => m.model.toUpperCase());
    const checkName = form.model.trim().toUpperCase();
    if (editingModel) {
      if (existing.filter(n => n !== editingModel.toUpperCase()).includes(checkName))
        return 'A machine with model name "' + form.model.trim() + '" already exists.';
    } else {
      if (existing.includes(checkName))
        return 'A machine with model name "' + form.model.trim() + '" already exists.';
    }
    for (const pair of LIMITS_PAIRS) {
      const mnV = form.limits[pair.key], mxV = form.limits[pair.pair];
      if (mnV != null && mnV !== '' && mxV != null && mxV !== '') {
        if (Number(mnV) > Number(mxV)) return pair.group + ': Min value cannot exceed Max value.';
      }
    }
    return null;
  }

  function saveMachine() {
    const err = validateForm();
    if (err) { setToast({ type:'error', text: err }); return; }
    const cat = form.category === '__new__' ? form.customCategory.trim() : form.category;
    const cleanLimits = {};
    Object.entries(form.limits).forEach(([k,v]) => { if (v != null && v !== '') cleanLimits[k] = Number(v); });
    const newM = { model: form.model.trim(), category: cat, templateType: form.templateType, limits: cleanLimits };
    setState(prev => {
      const reg = {...(prev.machineRegistry || { customMachines:[] })};
      let customs = [...(reg.customMachines || [])];
      if (editingModel) {
        customs = customs.map(cm => cm.model === editingModel ? newM : cm);
      } else {
        customs.push(newM);
      }
      return {...prev, machineRegistry: {...reg, customMachines: customs}};
    });
    setToast({ type:'success', text: editingModel ? '"' + newM.model + '" updated successfully.' : '"' + newM.model + '" added successfully.' });
    cancelForm();
  }

  function deleteMachine(model) {
    setState(prev => {
      const reg = {...(prev.machineRegistry || { customMachines:[] })};
      const customs = (reg.customMachines || []).filter(cm => cm.model !== model);
      return {...prev, machineRegistry: {...reg, customMachines: customs}};
    });
    setToast({ type:'success', text: '"' + model + '" deleted.' });
    setConfirmDelete(null);
  }

  function updateLimit(key, value) {
    setForm(prev => ({...prev, limits: {...prev.limits, [key]: value === '' ? '' : value}}));
  }

  return (
    <div className="space-y-4">
      {/* Page header */}
      <Card>
        <div className="flex items-start gap-3">
          <div className="flex-shrink-0 w-10 h-10 rounded-lg flex items-center justify-center text-white" style={{background:'#343551'}}>
            {Icons.settings()}
          </div>
          <div>
            <h2 className="font-heading font-bold text-lg text-p-blurple mb-1">Machine Setup</h2>
            <p className="text-sm font-body text-p-gray leading-relaxed">
              Add new machine models or review existing ones. Each machine needs a model name, category
              assignment, configuration template, and Case Table Checker limits. When you add a machine
              here, it becomes available in the machine dropdowns on the RFQ tab and the Case Table Checker
              will validate case dimensions against the limits you define.
            </p>
          </div>
        </div>
      </Card>

      {/* Existing Machines Table */}
      <Card title="All Machine Models">
        <div className="flex flex-col sm:flex-row gap-3 mb-4">
          <div className="flex-1 relative">
            <input
              type="text" value={searchTerm}
              onChange={e => setSearchTerm(e.target.value)}
              placeholder="Search by model, category, or template..."
              className="w-full px-3 py-2 pl-9 border border-p-light rounded-btn text-sm bg-white"
            />
            <svg className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
          </div>
          <Btn onClick={openAddForm} size="sm">+ Add Machine</Btn>
        </div>

        <div className="overflow-x-auto -mx-4 px-4">
          <table className="w-full text-sm border-collapse" style={{minWidth:'880px'}}>
            <thead>
              <tr className="bg-p-blurple text-white">
                <th className="px-3 py-2.5 text-left font-heading font-semibold text-xs">Model</th>
                <th className="px-3 py-2.5 text-left font-heading font-semibold text-xs">Category</th>
                <th className="px-3 py-2.5 text-left font-heading font-semibold text-xs">Template</th>
                <th className="px-3 py-2.5 text-center font-heading font-semibold text-xs">Length</th>
                <th className="px-3 py-2.5 text-center font-heading font-semibold text-xs">Width</th>
                <th className="px-3 py-2.5 text-center font-heading font-semibold text-xs">Depth</th>
                <th className="px-3 py-2.5 text-center font-heading font-semibold text-xs">Rate</th>
                <th className="px-3 py-2.5 text-center font-heading font-semibold text-xs">Source</th>
                <th className="px-3 py-2.5 text-center font-heading font-semibold text-xs w-28">Actions</th>
              </tr>
            </thead>
            <tbody>
              {filteredMachines.length === 0 ? (
                <tr><td colSpan={9} className="px-3 py-8 text-center text-p-gray text-sm">
                  {searchTerm ? 'No machines match your search.' : 'No machines configured.'}

                  <tr key={m.model} className={i % 2 === 0 ? 'bg-white' : 'bg-p-alt'}>
                    <td className="px-3 py-2 font-heading font-semibold text-p-blurple">{m.model}</td>
                    <td className="px-3 py-2 font-body">{m.category}</td>
                    <td className="px-3 py-2 font-body">{getTemplateLabel(m.templateType)}</td>

                      )}
                    </td>
                  </tr>

            </tbody>
          </table>
        </div>
        <div className="mt-3 text-xs text-p-gray">
          Showing {filteredMachines.length} of {allMachines.length} machines
          {(state.machineRegistry?.customMachines?.length || 0) > 0 && (
            <span> &middot; {state.machineRegistry.customMachines.length} custom</span>

            {/* Limits */}
            <div>
              <div className="flex items-center gap-2 mb-3 pb-2 border-b border-gray-100">
                <h4 className="font-heading font-semibold text-sm text-p-blurple">Case Table Checker Limits</h4>
                <span className="text-xs text-p-gray">(Leave blank if not applicable)</span>

              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-3">
                {LIMITS_PAIRS.map(pair => (
                  <div key={pair.key} className="space-y-1">
                    <label className="block text-xs font-body font-medium text-p-charcoal">
                      {pair.group} Range <span className="text-p-gray font-normal">({pair.unit})</span>
                    </label>
                    <div className="flex items-center gap-2">
                      <input type="number" step="any" value={form.limits[pair.key] ?? ''}

                        placeholder="Min" className="flex-1 px-2.5 py-1.5 border border-p-light rounded-btn text-sm bg-white min-w-0" />
                      <span className="text-xs text-p-gray flex-shrink-0">to</span>
                      <input type="number" step="any" value={form.limits[pair.pair] ?? ''}
                        onChange={e => updateLimit(pair.pair, e.target.value)}
                        placeholder="Max" className="flex-1 px-2.5 py-1.5 border border-p-light rounded-btn text-sm bg-white min-w-0" />
                    </div>
                    <p className="text-xs text-gray-400">{pair.desc}</p>
                  </div>
                ))}
              </div>
            </div>

            {/* Actions */}
            <div className="flex items-center gap-3 pt-3 border-t border-gray-100">
              <Btn onClick={saveMachine}>{editingModel ? 'Update Machine' : 'Save Machine'}</Btn>
              <Btn variant="secondary" onClick={cancelForm}>Cancel</Btn>
            </div>
          </div>
        </Card>
      )}

      <AdminToast message={toast} onDismiss={() => setToast(null)} />
    </div>
  );
}

// ============================================================================
// TOAST COMPONENT
// ============================================================================

function Toast({ message, onDismiss }) {
  const [exiting, setExiting] = React.useState(false);

  React.useEffect(() => {
    if (!message) return;
    const exitTimer = setTimeout(() => setExiting(true), 2700);
    const dismissTimer = setTimeout(() => { onDismiss(); setExiting(false); }, 3000);
    return () => { clearTimeout(exitTimer); clearTimeout(dismissTimer); };
  }, [message]);

  if (!message) return null;
  const isError = message && message.type === 'error';
  const text = (message && typeof message === 'object') ? message.text : message;

  return (
    <div
      className={`fixed bottom-5 right-5 z-[200] flex items-center gap-2.5 px-4 py-3 rounded-card shadow-xl text-white text-sm font-body font-medium max-w-xs ${isError ? 'bg-p-red' : 'bg-p-forest'} ${exiting ? 'toast-exit' : 'toast-enter'}`}
      style={{minWidth:'220px'}}
    >
      <span className="flex-1">{text}</span>
      <button onClick={() => { setExiting(true); setTimeout(onDismiss, 300); }} className="text-white/70 hover:text-white ml-1 flex-shrink-0" style={{fontSize:'16px',lineHeight:1}}>&times;</button>
    </div>
  );
}

function formatProjectDate(isoStr) {
  if (!isoStr) return '—';
  try {
    const d = new Date(isoStr);
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' });
  } catch(e) { return isoStr; }
}

function extractFormData(state) {
  const { activeTab, showRaci, exportMenuOpen, ...formData } = state;
  return formData;
}

// ============================================================================
// FILE-BASED SAVE / LOAD HELPERS
// ============================================================================

function buildProjectRecord(opts) {
  const now = new Date().toISOString();
  return {
    _format: 'onedoc-project-v1',
    id: opts.id || crypto.randomUUID(),
    projectName: opts.projectName || 'Untitled Project',
    customerName: opts.customerName || '',
    opportunityNumber: opts.opportunityNumber || '',
    createdAt: opts.createdAt || now,
    updatedAt: now,
    createdBy: opts.createdBy || '',
    version: opts.version || 1,
    tags: opts.tags || [],
    formData: opts.formData,
  };
}

function downloadProjectFile(record) {
  var safeName = (record.projectName || 'project').replace(/[^a-zA-Z0-9_\- ]/g, '').replace(/\s+/g, '-').substring(0, 60);
  var fileName = safeName + '.onedoc';
  var blob = new Blob([JSON.stringify(record, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function openProjectFilePicker() {
  return new Promise(function(resolve, reject) {
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = '.onedoc,.json';
    input.style.display = 'none';
    input.onchange = function(e) {
      var file = e.target.files && e.target.files[0];
      if (!file) { resolve(null); return; }
      var reader = new FileReader();
      reader.onload = function(ev) {
        try {
          var data = JSON.parse(ev.target.result);
          if (!data.formData) {
            reject(new Error('This file does not contain valid OneDoc project data.'));
            return;
          }
          resolve(data);
        } catch(err) {
          reject(new Error('Could not read project file. Make sure it is a valid .onedoc file.'));
        }
      };
      reader.onerror = function() { reject(new Error('Failed to read file.')); };
      reader.readAsText(file);
    };
    document.body.appendChild(input);
    input.click();
    document.body.removeChild(input);
  });
}

function ProjectManagerModal({
  open, onClose,
  state, setState,
  currentProjectId, setCurrentProjectId,
  currentProjectName, setCurrentProjectName,
  lastSavedSnapshot, setLastSavedSnapshot,
  isDirty,
  onToast,
}) {
  const [activeModalTab, setActiveModalTab] = React.useState('list');
  const [projects, setProjects] = React.useState([]);
  const [searchQuery, setSearchQuery] = React.useState('');
  const [sortBy, setSortBy] = React.useState('newest');
  const [formProjectName, setFormProjectName] = React.useState('');
  const [formCreatedBy, setFormCreatedBy] = React.useState('');
  const [formTags, setFormTags] = React.useState('');
  const [formNameError, setFormNameError] = React.useState(false);
  const [saveSuccess, setSaveSuccess] = React.useState(false);
  const [currentProjectMeta, setCurrentProjectMeta] = React.useState(null);

  React.useEffect(() => {
    if (open) {
      loadProjects();
      if (currentProjectId) {
        ProjectDB.get(currentProjectId).then(function(rec) {
          if (rec) {
            setFormProjectName(rec.projectName || '');
            setFormCreatedBy(rec.createdBy || '');
            setFormTags(rec.tags ? rec.tags.join(', ') : '');
            setCurrentProjectMeta(rec);
          }
        });
      } else {
        setFormProjectName(currentProjectName || '');
        setFormCreatedBy('');
        setFormTags('');
        setCurrentProjectMeta(null);
      }
    }
  }, [open, currentProjectId]);

  function loadProjects() {
    ProjectDB.getAll().then(function(all) {
      setProjects(all || []);
    });
  }

  if (!open) return null;

  const q = searchQuery.toLowerCase();
  const filtered = projects.filter(function(p) {
    if (!q) return true;
    return (
      (p.projectName || '').toLowerCase().indexOf(q) >= 0 ||
      (p.customerName || '').toLowerCase().indexOf(q) >= 0 ||
      (p.opportunityNumber || '').toLowerCase().indexOf(q) >= 0
    );
  });

  const sorted = filtered.slice().sort(function(a, b) {
    if (sortBy === 'name') return (a.projectName || '').localeCompare(b.projectName || '');
    if (sortBy === 'customer') return (a.customerName || '').localeCompare(b.customerName || '');
    if (sortBy === 'oldest') return (a.createdAt || '').localeCompare(b.createdAt || '');
    return (b.updatedAt || '').localeCompare(a.updatedAt || '');
  });

  function handleLoad(proj) {
    function doLoad() {
      const restoredState = Object.assign({}, proj.formData, {
        activeTab: 'rfq',
        showRaci: false,
        exportMenuOpen: false,
      });
      setState(restoredState);
      setCurrentProjectId(proj.id);
      setCurrentProjectName(proj.projectName);
      setLastSavedSnapshot(JSON.stringify(extractFormData(restoredState)));
      onToast({ text: 'Project loaded: ' + proj.projectName, type: 'success' });
      onClose();
    }
    if (isDirty) {
      if (window.confirm('You have unsaved changes. Load project anyway? Unsaved changes will be lost.')) {
        doLoad();
      }
    } else {
      doLoad();
    }
  }

  function handleDelete(proj) {
    if (!window.confirm('Delete "' + proj.projectName + '"? This cannot be undone.')) return;
    ProjectDB.delete(proj.id).then(function() {
      loadProjects();
      onToast({ text: 'Project deleted.', type: 'success' });
      if (proj.id === currentProjectId) {
        setCurrentProjectId(null);
        setCurrentProjectName('');
        setLastSavedSnapshot(null);
        setCurrentProjectMeta(null);
      }
    });
  }

  function handleDuplicate(proj) {
    const newId = crypto.randomUUID();
    const now = new Date().toISOString();
    const newProj = Object.assign({}, proj, {
      id: newId,
      projectName: proj.projectName + ' (Copy)',
      createdAt: now,
      updatedAt: now,
      version: 1,
    });
    ProjectDB.save(newProj).then(function() {
      loadProjects();
      onToast({ text: 'Project duplicated.', type: 'success' });
    });
  }

  function handleNewProject() {
    function doNew() {
      const blank = Object.assign({}, getBlankStateForAll(state), {
        activeTab: 'rfq', showRaci: false, exportMenuOpen: false
      });
      setState(blank);
      setCurrentProjectId(null);
      setCurrentProjectName('');
      setLastSavedSnapshot(null);
      setCurrentProjectMeta(null);
      setFormProjectName('');
      setFormCreatedBy('');
      setFormTags('');
      onClose();
    }
    if (isDirty) {
      if (window.confirm('Start a new project? All unsaved changes will be lost.')) doNew();
    } else {
      doNew();
    }
  }

  function handleSave(asCopy) {
    if (!formProjectName.trim()) { setFormNameError(true); return; }
    setFormNameError(false);
    const now = new Date().toISOString();
    const formDataSnapshot = extractFormData(state);
    const id = asCopy ? crypto.randomUUID() : (currentProjectId || crypto.randomUUID());
    const existing = currentProjectMeta;
    const newVersion = asCopy ? 1 : (existing ? (existing.version || 1) + 1 : 1);
    const record = buildProjectRecord({
      id: id,
      projectName: formProjectName.trim(),
      customerName: (state.rfq && state.rfq.customerName) || '',
      opportunityNumber: (state.rfq && state.rfq.opportunityNumber) || '',
      createdAt: (asCopy || !existing) ? now : existing.createdAt,
      createdBy: formCreatedBy.trim(),
      version: newVersion,
      tags: formTags.split(',').map(function(t){ return t.trim(); }).filter(Boolean),
      formData: formDataSnapshot,
    });
    // Download to local computer
    try {
      downloadProjectFile(record);
    } catch(err) {
      onToast({ text: 'Download failed: ' + ((err && err.message) ? err.message : 'Unknown error'), type: 'error' });
      return;
    }
    // Also cache in IndexedDB for session persistence
    ProjectDB.save(record).catch(function() {});
    if (!asCopy) {
      setCurrentProjectId(record.id);
      setCurrentProjectName(record.projectName);
      setLastSavedSnapshot(JSON.stringify(formDataSnapshot));
      setCurrentProjectMeta(record);
    }
    setSaveSuccess(true);
    loadProjects();
    onToast({ text: asCopy ? 'Downloaded copy: ' + record.projectName : 'Project saved to your computer!', type: 'success' });
    setTimeout(function() { setSaveSuccess(false); }, 2500);
  }

  function handleOpenFile() {
    openProjectFilePicker().then(function(data) {
      if (!data) return;
      function doLoad() {
        const restoredState = Object.assign({}, data.formData, {
          activeTab: 'rfq',
          showRaci: false,
          exportMenuOpen: false,
        });
        setState(restoredState);
        setCurrentProjectId(data.id || crypto.randomUUID());
        setCurrentProjectName(data.projectName || 'Loaded Project');
        setLastSavedSnapshot(JSON.stringify(extractFormData(restoredState)));
        setCurrentProjectMeta(data);
        // Cache in IndexedDB
        ProjectDB.save(data).catch(function() {});
        loadProjects();
        onToast({ text: 'Opened: ' + (data.projectName || 'Project'), type: 'success' });
        onClose();
      }
      if (isDirty) {
        if (window.confirm('You have unsaved changes. Open this project anyway?')) doLoad();
      } else {
        doLoad();
      }
    }).catch(function(err) {
      onToast({ text: (err && err.message) || 'Failed to open file.', type: 'error' });
    });
  }

  const isExistingProject = !!currentProjectId;

  return (
    <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4" onClick={onClose}>
      <div
        className="bg-white rounded-card shadow-2xl w-full max-w-2xl flex flex-col"
        style={{maxHeight:'88vh'}}
        onClick={function(e) { e.stopPropagation(); }}
      >
        {/* Header */}
        <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
          <div className="flex items-center gap-2.5">
            <span className="text-p-orange"><Icons.projects /></span>
            <h2 className="font-heading font-bold text-p-blurple" style={{fontSize:'16px'}}>Project Manager</h2>
          </div>
          <button onClick={onClose} className="w-7 h-7 rounded flex items-center justify-center text-p-gray hover:bg-p-alt transition-colors">
            <Icons.close />
          </button>
        </div>

        {/* Tab bar */}
        <div className="flex border-b border-gray-100 px-5">
          <button
            onClick={function() { setActiveModalTab('list'); }}
            className={'px-4 py-2.5 text-sm font-heading font-semibold border-b-2 transition-colors ' + (activeModalTab === 'list' ? 'border-p-orange text-p-orange' : 'border-transparent text-p-gray hover:text-p-blurple')}
          >Recent</button>
          <button
            onClick={function() { setActiveModalTab('current'); }}
            className={'px-4 py-2.5 text-sm font-heading font-semibold border-b-2 transition-colors ' + (activeModalTab === 'current' ? 'border-p-orange text-p-orange' : 'border-transparent text-p-gray hover:text-p-blurple')}
          >Save</button>
        </div>

        {/* Tab content */}
        <div className="flex-1 overflow-y-auto">

          {/* RECENT PROJECTS TAB */}
          {activeModalTab === 'list' && (
            <div className="p-5">
              {/* Open from File — prominent action */}
              <button
                onClick={handleOpenFile}
                className="w-full mb-4 py-3 border-2 border-p-orange rounded-btn text-sm font-heading font-semibold text-p-orange hover:bg-p-orange hover:text-white transition-colors flex items-center justify-center gap-2"
              >
                <Icons.upload />
                Open Project from File
              </button>
              <p className="text-[11px] font-body text-p-gray/40 text-center mb-4">
                Open a .onedoc file from your computer
              </p>

              {projects.length > 0 && (
                <div className="border-t border-gray-100 pt-4">
                  <h3 className="text-xs font-heading font-semibold text-p-gray/60 uppercase tracking-wider mb-3">Recent Session Cache</h3>
                  <div className="flex gap-2 mb-3">
                    <div className="flex-1 flex items-center gap-2 px-3 py-2 border border-gray-200 rounded-btn bg-p-alt">
                      <span className="text-p-gray/60 flex-shrink-0"><Icons.search /></span>
                      <input
                        type="text"
                        value={searchQuery}
                        onChange={function(e) { setSearchQuery(e.target.value); }}
                        placeholder="Search..."
                        className="flex-1 min-w-0 text-sm font-body text-p-gray bg-transparent border-none"
                        style={{outline:'none',boxShadow:'none'}}
                      />
                    </div>
                    <select
                      value={sortBy}
                      onChange={function(e) { setSortBy(e.target.value); }}
                      className="px-3 py-2 border border-gray-200 rounded-btn text-sm font-body text-p-gray bg-white"
                    >
                      <option value="newest">Newest</option>
                      <option value="oldest">Oldest</option>
                      <option value="name">Name</option>
                      <option value="customer">Customer</option>
                    </select>
                  </div>

                  {sorted.length === 0 ? (
                    <div className="text-center py-6">
                      <p className="text-sm font-body text-p-gray/60">
                        {searchQuery ? 'No projects match your search.' : 'No recent projects in this session.'}
                      </p>
                    </div>
                  ) : (
                    <div className="space-y-2">
                      {sorted.map(function(proj) {
                        const isLoaded = proj.id === currentProjectId;
                        return (
                          <div
                            key={proj.id}
                            className={'border rounded-card p-3.5 ' + (isLoaded ? 'border-p-orange bg-orange-50' : 'border-gray-200 bg-white hover:border-gray-300')}
                          >
                            <div className="flex items-start justify-between gap-3">
                              <div className="flex-1 min-w-0">
                                <div className="flex items-center gap-2 mb-0.5">
                                  <span className="font-heading font-semibold text-p-blurple text-sm truncate">{proj.projectName || 'Unnamed'}</span>
                                  <span className="flex-shrink-0 text-[10px] font-heading font-semibold px-1.5 py-0.5 rounded bg-p-blurple/10 text-p-blurple">v{proj.version || 1}</span>
                                  {isLoaded && <span className="flex-shrink-0 text-[10px] font-heading font-semibold px-1.5 py-0.5 rounded bg-p-orange text-white">LOADED</span>}
                                </div>
                                <p className="text-xs font-body text-p-gray/70 truncate">
                                  {proj.customerName ? proj.customerName : 'No customer'}
                                  {proj.opportunityNumber ? ' · ' + proj.opportunityNumber : ''}
                                </p>
                                <p className="text-[11px] font-body text-p-gray/40 mt-1">
                                  Created {formatProjectDate(proj.createdAt)} · Modified {formatProjectDate(proj.updatedAt)}
                                </p>
                              </div>
                              <div className="flex items-center gap-1 flex-shrink-0">
                                <button
                                  onClick={function() { handleLoad(proj); }}
                                  className="flex items-center gap-1 px-2.5 py-1.5 text-xs font-heading font-semibold bg-p-orange text-white rounded-btn hover:bg-p-orange-hover transition-colors"
                                >Load</button>
                                <button
                                  onClick={function() { downloadProjectFile(proj); onToast({ text: 'Downloaded: ' + proj.projectName, type: 'success' }); }}
                                  title="Download to file"
                                  className="flex items-center gap-1 px-2 py-1.5 text-xs font-heading font-semibold border border-gray-200 text-p-gray rounded-btn hover:bg-p-alt transition-colors"
                                ><Icons.download /></button>
                                <button
                                  onClick={function() { handleDelete(proj); }}
                                  title="Remove from cache"
                                  className="flex items-center gap-1 px-2 py-1.5 text-xs font-heading font-semibold border border-p-red/30 text-p-red rounded-btn hover:bg-red-50 transition-colors"
                                ><Icons.trash /></button>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}

              <div className="mt-4 pt-3 border-t border-gray-100">
                <button
                  onClick={handleNewProject}

                >

                </button>
              </div>

          {activeModalTab === 'current' && (

              <div className="space-y-3 mb-5">
                <div>
                  <label className="block text-xs font-heading font-semibold text-p-blurple mb-1">
                    Project Name <span className="text-p-red">*</span>

                  <input
                    type="text"

                  <div className="flex justify-between text-xs font-body">
                    <span className="text-p-gray/60 font-medium">Created</span>
                    <span className="text-p-gray">{formatProjectDate(currentProjectMeta.createdAt)}</span>
                  </div>
                  <div className="flex justify-between text-xs font-body">
                    <span className="text-p-gray/60 font-medium">Last Modified</span>
                    <span className="text-p-gray">{formatProjectDate(currentProjectMeta.updatedAt)}</span>
                  </div>
                  <div className="flex justify-between text-xs font-body">
                    <span className="text-p-gray/60 font-medium">Version</span>
                    <span className="text-p-gray font-semibold">v{currentProjectMeta.version || 1}</span>
                  </div>
                </div>
              )}

              {saveSuccess && (
                <div className="mb-4 px-3 py-2 rounded-btn bg-green-50 border border-green-200 text-sm text-p-forest font-body font-medium flex items-center gap-2">
                  <span>&#10003;</span> Project saved to your Downloads folder!
                </div>
              )}

              <div className="space-y-2">
                <button
                  onClick={function() { handleSave(false); }}
                  className="w-full py-3 bg-p-orange text-white font-heading font-semibold rounded-btn text-sm hover:bg-p-orange-hover transition-colors flex items-center justify-center gap-2"
                >
                  <Icons.download />
                  {isExistingProject ? 'Save to File' : 'Save to File'}
                </button>
                {isExistingProject && (
                  <button
                    onClick={function() { handleSave(true); }}
                    className="w-full py-2.5 border border-gray-200 text-p-gray font-heading font-semibold rounded-btn text-sm hover:bg-p-alt transition-colors flex items-center justify-center gap-2"
                  >
                    <Icons.duplicate />
                    Save as New Copy
                  </button>
                )}
              </div>

              <p className="text-[11px] font-body text-p-gray/40 text-center mt-3">
                Downloads a .onedoc file to your computer. You can share it or re-open it later.
              </p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ============================================================================
// RACI MODAL
// ============================================================================

function RACIModal({ state, setState }) {
  if (!state.showRaci) return null;
  return (
    <div className="fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-4" onClick={() => setState(p=>({...p,showRaci:false}))}>
      <div className="bg-white rounded-card shadow-xl max-w-3xl w-full max-h-[80vh] overflow-auto" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between p-4 border-b">
          <h2 className="font-heading font-bold text-lg">RACI Matrix Reference</h2>
          <button onClick={() => setState(p=>({...p,showRaci:false}))} className="text-p-gray hover:text-p-red text-xl">&times;</button>
        </div>
        <div className="p-4">
          <div className="mb-3 flex gap-4 text-xs flex-wrap">
            <span><strong className="text-p-orange">R</strong> = Responsible</span>
            <span><strong className="text-p-teal">A</strong> = Accountable</span>
            <span><strong className="text-p-sage">C</strong> = Consulted</span>
            <span><strong className="text-p-light">I</strong> = Informed</span>
          </div>
          <table className="w-full text-sm border-collapse">
            <thead>
              <tr className="bg-p-blurple text-white">
                <th className="px-3 py-2 text-left font-heading font-semibold">Activity</th>
                <th className="px-3 py-2 text-center font-heading font-semibold">RSM</th>
                <th className="px-3 py-2 text-center font-heading font-semibold">SSR</th>
                <th className="px-3 py-2 text-center font-heading font-semibold">Estimator</th>
                <th className="px-3 py-2 text-center font-heading font-semibold">AE</th>
                <th className="px-3 py-2 text-center font-heading font-semibold">PM</th>
                <th className="px-3 py-2 text-center font-heading font-semibold">Eng</th>
              </tr>
            </thead>
            <tbody>
              {RACI_DATA.map((row, i) => (
                <tr key={i} className={i%2===0?'bg-white':'bg-p-alt'}>
                  <td className="px-3 py-2 font-heading font-semibold text-xs">{row.activity}</td>
                  {['rsm','ssr','est','ae','pm','eng'].map(k => (
                    <td key={k} className="px-3 py-2 text-center text-xs font-heading font-semibold">
                      <span className={row[k].includes('R') ? 'text-p-orange' : row[k].includes('A') ? 'text-p-teal' : 'text-p-light'}>
                        {row[k] || '—'}
                      </span>
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ============================================================================
// MAIN APP
// ============================================================================

function App() {
  const [state, setState] = React.useState(initialState);
  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);
  const [mobileOpen, setMobileOpen] = React.useState(false);

  // Project Manager state
  const [currentProjectId, setCurrentProjectId] = React.useState(null);
  const [currentProjectName, setCurrentProjectName] = React.useState('');
  const [lastSavedSnapshot, setLastSavedSnapshot] = React.useState(null);
  const [projectManagerOpen, setProjectManagerOpen] = React.useState(false);
  const [toastMessage, setToastMessage] = React.useState(null);

  // Dirty detection — compare current formData to last saved snapshot
  const isDirty = React.useMemo(() => {
    if (!lastSavedSnapshot) return false;
    const current = extractFormData(state);
    return JSON.stringify(current) !== lastSavedSnapshot;
  }, [state, lastSavedSnapshot]);

  // Quick save: download project file; open modal if no name yet
  function handleQuickSave() {
    if (!currentProjectName) {
      setProjectManagerOpen(true);
      return;
    }
    // Build record and download
    const now = new Date().toISOString();
    const formDataSnapshot = extractFormData(state);
    const id = currentProjectId || crypto.randomUUID();
    ProjectDB.get(id).then(function(existing) {
      const record = buildProjectRecord({
        id: id,
        projectName: currentProjectName,
        customerName: (state.rfq && state.rfq.customerName) || '',
        opportunityNumber: (state.rfq && state.rfq.opportunityNumber) || '',
        createdAt: (existing && existing.createdAt) ? existing.createdAt : now,
        createdBy: (existing && existing.createdBy) || '',
        version: existing ? (existing.version || 1) + 1 : 1,
        tags: (existing && existing.tags) || [],
        formData: formDataSnapshot,
      });
      downloadProjectFile(record);
      ProjectDB.save(record).catch(function() {});
      if (!currentProjectId) setCurrentProjectId(record.id);
      setLastSavedSnapshot(JSON.stringify(formDataSnapshot));
      setToastMessage({ text: 'Project saved to your computer!', type: 'success' });
    }).catch(function(err) {
      setToastMessage({ text: 'Save failed: ' + ((err && err.message) ? err.message : 'error'), type: 'error' });
    });
  }

  // Init IndexedDB on mount
  React.useEffect(() => {
    ProjectDB.init();
  }, []);

  React.useEffect(() => {
    function handleResize() {
      const w = window.innerWidth;
      if (w < 1024 && w >= 768) setSidebarCollapsed(true);
      else if (w >= 1024) setSidebarCollapsed(false);
    }
    handleResize();
    window.addEventListener('resize', handleResize);
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  function renderTab() {
    const { activeTab } = state;
    switch (activeTab) {
      case 'rfq': return <RFQTab state={state} setState={setState} />;
      case 'cpp': return <CPPTab state={state} setState={setState} />;
      case 'facility': return <FacilityTab state={state} setState={setState} />;
      case 'specs': return <SpecsTab state={state} setState={setState} />;
      case 'booking': return <BookingTab state={state} setState={setState} />;
      case 'tandc': return <TandCTab state={state} setState={setState} />;
      case 'revisions': return <RevisionsTab state={state} setState={setState} />;
      case 'machine-admin': return <MachineAdminTab state={state} setState={setState} />;
      default:
        if (activeTab.startsWith('machine-')) {
          const slotNum = parseInt(activeTab.split('-')[1]);
          return <MachineTab state={state} setState={setState} slotNumber={slotNum} />;
        }
        return <div>Unknown tab</div>;
    }
  }

  return (
    <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gridTemplateRows:'auto 1fr',height:'100dvh',overflow:'hidden'}}>
      <Sidebar
        state={state} setState={setState}
        collapsed={sidebarCollapsed} setCollapsed={setSidebarCollapsed}
        mobileOpen={mobileOpen} setMobileOpen={setMobileOpen}
        currentProjectName={currentProjectName}
      />
      <TopBar
        state={state} setState={setState}
        mobileOpen={mobileOpen} setMobileOpen={setMobileOpen}
        currentProjectId={currentProjectId}
        currentProjectName={currentProjectName}
        isDirty={isDirty}
        onOpenProjectManager={() => setProjectManagerOpen(true)}
        onQuickSave={handleQuickSave}
      />
      <main style={{gridColumn:'2',overflowY:'auto',overscrollBehavior:'contain',background:'#f8f9fa',padding:'24px',minHeight:0}}>
        <PageToolbar
          state={state} setState={setState}
          onResetProject={() => { setCurrentProjectId(null); setCurrentProjectName(''); setLastSavedSnapshot(null); }}
        />
        <div className="tab-content">
          {renderTab()}
        </div>
        <footer className="mt-8 pt-5 border-t border-gray-200 no-print">
          <div className="flex flex-col sm:flex-row items-center justify-between gap-3">
            <div className="flex items-center gap-3">
              <img src="assets/logos/Horizontal Full Color.png" alt="Pearson Packaging Systems" className="h-5" />
              <span className="text-xs text-p-gray font-body">Real Partners. That Simple.</span>
            </div>
            <div className="text-xs text-p-gray/50 font-body text-right">
              <p>8120 W Sunset Hwy, Spokane, WA 99224 &middot; 800.732.7766</p>
              <p><a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer" className="text-p-orange hover:underline">Created with Perplexity Computer</a></p>
            </div>
          </div>
        </footer>
      </main>
      <RACIModal state={state} setState={setState} />
      <ProjectManagerModal
        open={projectManagerOpen}
        onClose={() => setProjectManagerOpen(false)}
        state={state} setState={setState}
        currentProjectId={currentProjectId} setCurrentProjectId={setCurrentProjectId}
        currentProjectName={currentProjectName} setCurrentProjectName={setCurrentProjectName}
        lastSavedSnapshot={lastSavedSnapshot} setLastSavedSnapshot={setLastSavedSnapshot}
        isDirty={isDirty}
        onToast={setToastMessage}
      />
      <Toast message={toastMessage} onDismiss={() => setToastMessage(null)} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
